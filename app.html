<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Harvey Taxi</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #111;
      text-align: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    p {
      color: #666;
      margin-bottom: 30px;
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 300px;
      margin: 10px auto;
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: #111;
      color: #fff;
    }

    .secondary {
      background: #f3f3f3;
      color: #111;
    }
  </style>
</head>
<body>

  <h1>🚕 Harvey Taxi</h1>
  <p>Your ride, your way.</p>

  <button class="btn primary" onclick="window.location.href='/request-ride'">
    Book a Ride
  </button>

  <button class="btn secondary" onclick="window.location.href='/driver'">
    Driver Dashboard
  </button>

</body>
</html>
