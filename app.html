<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f3f3;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    button {
      background: black;
      color: white;
      padding: 15px;
      font-size: 18px;
      border: none;
      width: 90%;
      max-width: 400px;
      margin: 20px auto;
      display: block;
      cursor: pointer;
    }

    #map {
      width: 100%;
      height: 400px; /* 🔥 THIS FIXES BLANK MAP */
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h1>Harvey Taxi</h1>

  <button onclick="requestRide()">Request Ride</button>

  <div id="map"></div>

  <script>
    let map;

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 36.1627, lng: -86.7816 }, // Nashville
        zoom: 12,
      });

      // Try to get user location
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const userLocation = {
              lat: position.coords.latitude,
              lng: position.coords.longitude,
            };

            map.setCenter(userLocation);

            new google.maps.Marker({
              position: userLocation,
              map: map,
              title: "You are here",
            });
          },
          () => {
            alert("Location access denied");
          }
        );
      } else {
        alert("Geolocation not supported");
      }
    }

    function requestRide() {
      alert("Ride requested! 🚖");
    }
  </script>

  <!-- 🔥 THIS IS THE ONLY PLACE YOUR KEY GOES -->
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_REAL_KEY&libraries=places&callback=initMap" async defer></script>

</body>
</html>
