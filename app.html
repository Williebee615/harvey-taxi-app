<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Harvey Taxi</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f3f3;
      text-align: center;
    }

    h1 {
      margin: 20px;
      font-size: 40px;
      font-weight: bold;
    }

    button {
      background: black;
      color: white;
      padding: 15px;
      font-size: 18px;
      border: none;
      width: 90%;
      max-width: 400px;
      margin: 20px auto;
      display: block;
      cursor: pointer;
      border-radius: 8px;
    }

    #map {
      width: 100%;
      height: 400px;
      margin-top: 20px;
    }

    #status {
      margin-top: 10px;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <h1>Harvey Taxi</h1>

  <button onclick="requestRide()">Request Ride</button>

  <div id="status">Ready to request a ride.</div>
  <div id="map"></div>

  <script>
    let map;
    let marker;

    function initMap() {
      const defaultLocation = { lat: 36.1627, lng: -86.7816 };

      map = new google.maps.Map(document.getElementById("map"), {
        center: defaultLocation,
        zoom: 12,
      });

      marker = new google.maps.Marker({
        position: defaultLocation,
        map: map,
        title: "Default location",
      });

      document.getElementById("status").innerText = "Map loaded.";
    }

    function requestRide() {
      document.getElementById("status").innerText = "Getting your location...";

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const userLocation = {
              lat: position.coords.latitude,
              lng: position.coords.longitude,
            };

            map.setCenter(userLocation);
            map.setZoom(15);

            marker.setPosition(userLocation);
            marker.setTitle("You are here");

            document.getElementById("status").innerText = "Ride requested! 🚕";
          },
          () => {
            document.getElementById("status").innerText = "Location access denied.";
          }
        );
      } else {
        document.getElementById("status").innerText = "Geolocation not supported.";
      }
    }
  </script>

  <!-- ✅ GOOGLE MAPS SCRIPT WITH YOUR API KEY -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD56PAbk1OAUQRqY2aVQJm4XCrMy6e173k&callback=initMap" async defer></script>

</body>
</html>
