<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
      padding-bottom: 100px;
    }

    .header {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .subheader {
      font-size: 22px;
      color: #555;
      margin-bottom: 20px;
    }

    .search-box {
      background: #f1f1f1;
      border-radius: 14px;
      padding: 15px;
      font-size: 16px;
      margin-bottom: 20px;
    }

    .services {
      display: flex;
      justify-content: space-between;
      margin-bottom: 25px;
    }

    .service {
      flex: 1;
      margin: 0 5px;
      background: #f8f8f8;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
    }

    .service span {
      display: block;
      font-size: 22px;
      margin-bottom: 5px;
    }

    .section {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .ride-card {
      background: #f8f8f8;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .ride-title {
      font-weight: 700;
    }

    .ride-sub {
      font-size: 14px;
      color: #666;
    }

    .price {
      font-weight: 800;
      font-size: 18px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: space-around;
      padding: 15px 0;
    }

    .nav-item {
      font-size: 14px;
      color: #777;
    }

    .nav-item.active {
      color: #000;
      font-weight: 700;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="header">🚕 Harvey Taxi</div>
    <div class="subheader">Where to?</div>

    <div class="search-box">
      Enter pickup or destination
    </div>

    <div class="services">
      <div class="service">
        <span>🚕</span>
        Ride
      </div>

      <div class="service">
        <span>📦</span>
        Delivery
      </div>

      <div class="service">
        <span>🪪</span>
        Verify
      </div>
    </div>

    <div class="section">Popular rides</div>

    <div class="ride-card">
      <div>
        <div class="ride-title">Harvey Standard</div>
        <div class="ride-sub">Affordable everyday ride</div>
      </div>
      <div class="price">$12</div>
    </div>

    <div class="ride-card">
      <div>
        <div class="ride-title">Harvey XL</div>
        <div class="ride-sub">More space for passengers</div>
      </div>
      <div class="price">$18</div>
    </div>

    <div class="ride-card">
      <div>
        <div class="ride-title">Airport Ride</div>
        <div class="ride-sub">Easy rides to BNA</div>
      </div>
      <div class="price">$25</div>
    </div>

  </div>

  <div class="bottom-nav">
    <div class="nav-item active">Home</div>
    <div class="nav-item">Activity</div>
    <div class="nav-item">Account</div>
  </div>

</body>
</html>
