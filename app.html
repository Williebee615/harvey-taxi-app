<div id="status">Tap "Request Ride" to detect your pickup location.</div>

<div id="map" style="width:100%; height:400px; border-radius:20px; margin-top:15px;"></div>

<div id="pickupAddress" style="margin-top:10px; font-weight:bold;"></div>

<button onclick="requestRide()" style="
  margin-top:20px;
  padding:15px;
  width:100%;
  background:black;
  color:gold;
  font-size:18px;
  border:none;
  border-radius:20px;
">
  Request Ride
</button><script>
let map;
let marker;
let geocoder;

function initMap() {
  const defaultLocation = { lat: 36.1627, lng: -86.7816 };

  map = new google.maps.Map(document.getElementById("map"), {
    center: defaultLocation,
    zoom: 12
  });

  marker = new google.maps.Marker({
    position: defaultLocation,
    map: map
  });

  geocoder = new google.maps.Geocoder();

  document.getElementById("status").innerText = "Map ready. Tap Request Ride.";
}

function requestRide() {
  const status = document.getElementById("status");
  const pickup = document.getElementById("pickupAddress");

  if (!navigator.geolocation) {
    status.innerText = "Geolocation not supported.";
    return;
  }

  status.innerText = "Getting your location...";

  navigator.geolocation.getCurrentPosition(
    function(position) {
      const userLoc = {
        lat: position.coords.latitude,
        lng: position.coords.longitude
      };

      map.setCenter(userLoc);
      map.setZoom(16);
      marker.setPosition(userLoc);

      geocoder.geocode({ location: userLoc }, function(results, statusCode) {
        if (statusCode === "OK" && results[0]) {
          pickup.innerText = results[0].formatted_address;
          status.innerText = "Location found.";
        } else {
          pickup.innerText = userLoc.lat + ", " + userLoc.lng;
          status.innerText = "Location found (address unavailable).";
        }
      });
    },
    function(error) {
      status.innerText = "Location failed. Enable permissions.";
    }
  );
}

window.initMap = initMap;
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY_HERE&callback=initMap" async defer></script>
