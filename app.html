<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Harvey Taxi App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f3f3;
      color: #111;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 15px;
      background: black;
      color: white;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    #map {
      width: 100%;
      height: 400px;
      margin-top: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Harvey Taxi</h1>

    <button onclick="initMap()">Request Ride</button>

    <div id="map"></div>
  </div>

  <script>
    let map;

    function initMap() {
      const defaultLocation = { lat: 36.1627, lng: -86.7816 };

      map = new google.maps.Map(document.getElementById("map"), {
        center: defaultLocation,
        zoom: 13,
      });

      // Get user's location
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const userLocation = {
              lat: position.coords.latitude,
              lng: position.coords.longitude,
            };

            map.setCenter(userLocation);

            new google.maps.Marker({
              position: userLocation,
              map: map,
              title: "You are here",
            });
          },
          () => {
            alert("Location access denied.");
          }
        );
      } else {
        alert("Geolocation not supported.");
      }
    }
  </script>

</body>
</html>
