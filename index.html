<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Harvey Taxi</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
      text-align: center;
    }

    .container {
      padding: 60px 20px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      margin-bottom: 40px;
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 300px;
      margin: 10px auto;
      padding: 18px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    .primary {
      background: white;
      color: black;
    }

    .secondary {
      background: #222;
      color: white;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🚖 Harvey Taxi</h1>
    <p>Fast, reliable rides in Nashville</p>

    <button class="btn primary" onclick="goToRide()">
      Request a Ride
    </button>

    <button class="btn secondary" onclick="goToDriver()">
      Driver Dashboard
    </button>
  </div>

  <script>
    function goToRide() {
      window.location.href = "/request-ride.html";
    }

    function goToDriver() {
      window.location.href = "/driver.html";
    }
  </script>
</body>
</html>
