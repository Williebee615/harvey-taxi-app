<!DOCTYPE html>
<html>

<head>

<title>Dispatch Dashboard</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

#map{
height:350px;
border-radius:10px;
margin-bottom:20px;
}

.ride{
background:#222;
padding:15px;
border-radius:10px;
margin:10px 0;
}

</style>

</head>

<body>

<h1>🚕 Dispatch Dashboard</h1>

<div id="map"></div>

<div id="rides"></div>

<script>

const map = L.map("map").setView([36.1627,-86.7816],11)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map)

let rideMarkers=[]
let driverMarkers=[]

async function loadRides(){

const res = await fetch("/rides")

const rides = await res.json()

const container = document.getElementById("rides")

container.innerHTML=""

rideMarkers.forEach(m=>map.removeLayer(m))
rideMarkers=[]

rides.forEach(r=>{

const div = document.createElement("div")

div.className="ride"

div.innerHTML=`
<b>${r.name}</b><br>
Pickup: ${r.pickup}<br>
Dropoff: ${r.dropoff}<br>
Status: ${r.status}<br>
Driver: ${r.acceptedBy || "-"}
`

container.appendChild(div)

})

}

async function loadDrivers(){

const res = await fetch("/driver-locations")

const drivers = await res.json()

driverMarkers.forEach(m=>map.removeLayer(m))
driverMarkers=[]

drivers.forEach(d=>{

const marker = L.marker([d.lat,d.lng]).addTo(map)

.bindPopup("Driver: "+d.name)

driverMarkers.push(marker)

})

}

setInterval(loadRides,8000)

setInterval(loadDrivers,5000)

loadRides()

loadDrivers()

</script>

</body>
</html>
