<!DOCTYPE html>
<html>
<head>
  <title>Harvey Taxi Dispatch Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#111;
      color:white;
      padding:20px;
    }

    h1{
      color:#ffd700;
      font-size:48px;
      margin-bottom:15px;
    }

    .topbar{
      margin-bottom:15px;
    }

    button{
      background:#ffd700;
      color:black;
      border:none;
      padding:10px 14px;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    }

    #map{
      width:100%;
      height:350px;
      border-radius:12px;
      margin-bottom:20px;
      overflow:hidden;
    }

    .ride{
      background:#222;
      padding:15px;
      margin:12px 0;
      border-radius:12px;
    }

    .muted{
      color:#bbb;
    }

    .badge{
      display:inline-block;
      margin-top:8px;
      padding:6px 10px;
      border-radius:8px;
      font-size:13px;
      font-weight:bold;
    }

    .waiting{
      background:#444;
      color:white;
    }

    .accepted{
      background:#1e90ff;
      color:white;
    }

    .completed{
      background:#28a745;
      color:white;
    }
  </style>
</head>
