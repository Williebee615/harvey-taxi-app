<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Signup</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 30px 20px;
}

h1 {
  color: gold;
}

form {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

input, select, button {
  padding: 15px;
  border-radius: 12px;
  border: none;
}

input, select {
  background: #eee;
}

button {
  background: #1e88ff;
  color: white;
  font-weight: bold;
}

#message {
  margin-top: 15px;
  font-weight: bold;
}

.success { color: lime; }
.error { color: red; }
</style>
</head>

<body>

<div class="container">
  <h1>🚕 Harvey Taxi Driver Signup</h1>

  <form id="driverForm">
    <input id="fullName" placeholder="Full Name" required>
    <input id="phone" placeholder="Phone" required>
    <input id="email" placeholder="Email" required>
    <input id="city" placeholder="City" required>
    <input id="state" placeholder="State" required>

    <select id="vehicleType">
      <option value="">Vehicle</option>
      <option>Car</option>
      <option>SUV</option>
      <option>Van</option>
    </select>

    <select id="driverType">
      <option value="">Driver Type</option>
      <option>Independent Driver</option>
      <option>Fleet Driver</option>
    </select>

    <button type="submit">Apply Now</button>
  </form>

  <div id="message"></div>
</div>

<script>
const form = document.getElementById("driverForm");
const message = document.getElementById("message");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  message.textContent = "Submitting...";

  const data = {
    fullName: fullName.value,
    phone: phone.value,
    email: email.value,
    city: city.value,
    state: state.value,
    vehicleType: vehicleType.value,
    driverType: driverType.value
  };

  try {
    const res = await fetch("https://harvey-taxi-api2.onrender.com/api/driver/apply", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (result.success) {
      message.textContent = "Application submitted successfully 🚕";
      message.className = "success";
      form.reset();
    } else {
      message.textContent = result.message;
      message.className = "error";
    }

  } catch (err) {
    console.error(err);
    message.textContent = "Server not responding. Try again.";
    message.className = "error";
  }
});
</script>

</body>
</html>
