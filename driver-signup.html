<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Driver Signup - Harvey Taxi</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 30px 20px;
    }

    h1 {
      color: gold;
      font-size: 2.2rem;
    }

    p {
      margin-bottom: 25px;
      color: #ccc;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input, select, button {
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
    }

    input, select {
      background: #f2f2f2;
      color: black;
    }

    button {
      background: #1e88ff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    #message {
      margin-top: 15px;
      font-weight: bold;
    }

    .success { color: #4caf50; }
    .error { color: #ff4d4d; }
  </style>
</head>

<body>
  <div class="container">
    <h1>🚕 Drive With Harvey Taxi</h1>
    <p>Join our growing transportation network.</p>

    <form id="driverForm">
      <input type="text" id="fullName" placeholder="Full Name" required />
      <input type="tel" id="phone" placeholder="Phone Number" required />
      <input type="email" id="email" placeholder="Email" required />
      <input type="text" id="city" placeholder="City" required />
      <input type="text" id="state" placeholder="State" required />

      <select id="vehicleType" required>
        <option value="">Select Vehicle</option>
        <option>Car</option>
        <option>SUV</option>
        <option>Van</option>
      </select>

      <select id="driverType" required>
        <option value="">Driver Type</option>
        <option>Independent Driver</option>
        <option>Fleet Driver</option>
      </select>

      <button type="submit">Apply Now</button>
    </form>

    <div id="message"></div>
  </div>

  <script>
    const form = document.getElementById("driverForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      message.textContent = "Submitting...";
      message.className = "";

      const data = {
        fullName: document.getElementById("fullName").value,
        phone: document.getElementById("phone").value,
        email: document.getElementById("email").value,
        city: document.getElementById("city").value,
        state: document.getElementById("state").value,
        vehicleType: document.getElementById("vehicleType").value,
        driverType: document.getElementById("driverType").value
      };

      try {
        const res = await fetch("https://harvey-taxi-api2.onrender.com/api/driver/apply", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        const result = await res.json();

        if (result.success) {
          message.textContent = "Application submitted successfully 🚕";
          message.className = "success";
          form.reset();
        } else {
          message.textContent = result.message;
          message.className = "error";
        }

      } catch (err) {
        console.error(err);
        message.textContent = "Submission failed";
        message.className = "error";
      }
    });
  </script>
</body>
</html>
