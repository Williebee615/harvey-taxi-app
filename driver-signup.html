<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi Driver Signup</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 15px;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    h1 {
      text-align: center;
      color: #ffd700;
      font-size: 2.2rem;
      font-weight: bold;
      margin-bottom: 30px;
      line-height: 1.2;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    input,
    select,
    button {
      width: 100%;
      padding: 18px;
      border-radius: 18px;
      border: none;
      font-size: 1rem;
    }

    input,
    select {
      background: #dfe5ef;
      color: #000;
    }

    button {
      background: #1e88ff;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      font-size: 1.1rem;
    }

    button:hover {
      opacity: 0.95;
    }

    #message {
      text-align: center;
      margin-top: 20px;
      font-size: 1.1rem;
      font-weight: bold;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 2rem;
      }

      input,
      select,
      button {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚕 Harvey Taxi Driver Signup</h1>

    <form id="driverSignupForm">
      <input id="name" type="text" placeholder="Full Name" required />
      <input id="phone" type="text" placeholder="Phone Number" required />
      <input id="email" type="email" placeholder="Email Address" required />
      <input id="city" type="text" placeholder="City" required />
      <input id="state" type="text" placeholder="State" required />

      <select id="vehicleType" required>
        <option value="">Select Vehicle Type</option>
        <option value="Sedan">Sedan</option>
        <option value="SUV">SUV</option>
        <option value="Van">Van</option>
        <option value="Truck">Truck</option>
      </select>

      <select id="driverType" required>
        <option value="">Select Driver Type</option>
        <option value="Independent Driver">Independent Driver</option>
        <option value="Fleet Driver">Fleet Driver</option>
      </select>

      <button type="submit">Apply Now</button>
    </form>

    <p id="message"></p>    <script>
      const form = document.getElementById("driverSignupForm");
      const messageBox = document.getElementById("message");

      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        messageBox.textContent = "Submitting application...";
        messageBox.style.color = "#fff";

        const payload = {
          name: document.getElementById("name").value.trim(),
          phone: document.getElementById("phone").value.trim(),
          email: document.getElementById("email").value.trim(),
          city: document.getElementById("city").value.trim(),
          state: document.getElementById("state").value.trim(),
          vehicleType: document.getElementById("vehicleType").value,
          driverType: document.getElementById("driverType").value
        };

        try {
          const response = await fetch("/api/drivers/signup", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });

          const data = await response.json();

          if (response.ok) {
            messageBox.textContent = data.message || "Application submitted successfully.";
            messageBox.style.color = "lime";
            form.reset();
          } else {
            messageBox.textContent = data.message || "Submission failed.";
            messageBox.style.color = "red";
          }
        } catch (error) {
          console.error("Submit error:", error);
          messageBox.textContent = "Server not responding. Try again.";
          messageBox.style.color = "red";
        }
      });
    </script>
  </div>
</body>
</html>
