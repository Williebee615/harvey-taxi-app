<!DOCTYPE html>
<html>
<head>
  <title>Driver Signup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      background: #000;
      color: white;
      font-family: Arial;
      padding: 20px;
    }
    h1 {
      font-size: 42px;
      margin-bottom: 20px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    input, select {
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
    }
    button {
      background: #2ac65a;
      color: white;
      border: none;
      padding: 18px;
      border-radius: 14px;
      font-size: 20px;
      font-weight: bold;
    }
    #status {
      margin-top: 18px;
      color: #ffd400;
    }
  </style>
</head>
<body>
  <h1>Drive With Harvey</h1>

  <form id="driverForm">
    <input id="name" placeholder="Full Name" required />
    <input id="phone" placeholder="Phone Number" required />
    <input id="email" placeholder="Email Address" required />
    <input id="city" placeholder="City" required />
    <input id="state" placeholder="State" required />

    <select id="vehicleType" required>
      <option value="">Select Vehicle Type</option>
      <option>Sedan</option>
      <option>SUV</option>
      <option>Van</option>
      <option>Truck</option>
    </select>

    <select id="driverType" required>
      <option value="">Select Driver Type</option>
      <option>Independent Driver</option>
      <option>Fleet Driver</option>
    </select>

    <button type="submit">Apply Now</button>
  </form>

  <div id="status"></div>

  <script>
    document.getElementById("driverForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const payload = {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        email: document.getElementById("email").value,
        city: document.getElementById("city").value,
        state: document.getElementById("state").value,
        vehicleType: document.getElementById("vehicleType").value,
        driverType: document.getElementById("driverType").value
      };

      const res = await fetch("/apply-driver", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      document.getElementById("status").innerText = data.success
        ? "Application submitted successfully."
        : "Something went wrong.";
    });
  </script>
</body>
</html>
