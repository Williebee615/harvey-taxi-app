<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver App</title>

<style>
body {
  background: #0b0b0d;
  color: white;
  font-family: Arial;
  padding: 10px;
}

/* SCREENS */
.screen { display: none; }
.active { display: block; }

/* MAP */
.map {
  height: 300px;
  border-radius: 20px;
  background: #222;
  margin-bottom: 20px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* BUTTON */
.go-btn {
  width: 100%;
  background: #3f69c9;
  padding: 20px;
  border-radius: 30px;
  font-size: 24px;
  font-weight: bold;
  border: none;
  margin-top: 20px;
}

/* MENU */
.profile {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:20px;
}

.profile img {
  width:60px;
  height:60px;
  border-radius:50%;
}

.menu-item {
  font-size: 28px;
  margin: 20px 0;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #111;
  display: flex;
  justify-content: space-around;
  padding: 10px;
}

.nav button {
  background:none;
  border:none;
  color:white;
  font-size:16px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="map">Map Area</div>

  <h2>Opportunities</h2>
  <p>Peak hours at airport</p>

  <button class="go-btn" onclick="goOnline()">Go Online</button>
</div>

<!-- EARNINGS -->
<div id="earnings" class="screen">
  <h2>Earnings</h2>
  <p>$0 Today</p>
  <p>Rides: 0</p>
  <p>Deliveries: 0</p>
</div>

<!-- INBOX -->
<div id="inbox" class="screen">
  <h2>Inbox</h2>
  <p>No messages</p>
</div>

<!-- MENU -->
<div id="menu" class="screen">
  <div class="profile">
    <img src="https://via.placeholder.com/60">
    <div>
      <h3>Willie</h3>
      <p>⭐ 4.96</p>
    </div>
  </div>

  <div class="menu-item">Refer Friends</div>
  <div class="menu-item">Opportunities</div>
  <div class="menu-item">Harvey Pro</div>
  <div class="menu-item">Wallet</div>
  <div class="menu-item">Account</div>

  <hr>

  <div class="menu-item">Help</div>
  <div class="menu-item">Learning Center</div>
</div><!-- NAV -->
<div class="nav">
  <button onclick="show('home')">Home</button>
  <button onclick="show('earnings')">Earnings</button>
  <button onclick="show('inbox')">Inbox</button>
  <button onclick="show('menu')">Menu</button>
</div>

<script>
function show(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screen).classList.add('active');
}

function goOnline() {
  alert("You are now online!");
}
</script>

</body>
</html>
