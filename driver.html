<!DOCTYPE html>
<html>
<head>
  <title>Harvey Taxi Driver App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family:Arial,sans-serif;
      background:#111;
      color:white;
      padding:20px;
      margin:0;
    }

    h1{
      color:#ffd700;
      font-size:48px;
      margin-bottom:20px;
    }

    input{
      width:100%;
      max-width:500px;
      padding:16px;
      border:none;
      border-radius:12px;
      font-size:18px;
      margin-bottom:16px;
      box-sizing:border-box;
    }

    button{
      background:#ffd700;
      color:#007bff;
      border:none;
      padding:16px 24px;
      border-radius:12px;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      margin-bottom:20px;
    }

    .ride{
      background:#222;
      padding:16px;
      border-radius:12px;
      margin:14px 0;
    }

    .accept{
      background:#28a745;
      color:white;
      margin-top:12px;
    }

    .muted{
      color:#bbb;
    }

    .status{
      display:inline-block;
      margin-top:10px;
      padding:8px 12px;
      border-radius:10px;
      background:#444;
      font-weight:bold;
    }
  </style>
</head>
<body>

  <h1>🚕 Harvey Taxi Driver App</h1>

  <input id="driverName" placeholder="Enter driver name">

  <button onclick="loadRides()">Refresh Rides</button>

  <div id="locationStatus" class="muted">Location tracking not started.</div>

  <div id="rides"></div>

  <script>
    async function loadRides() {
      const res = await fetch("/rides");
      const rides = await res.json();

      const container = document.getElementById("rides");
      container.innerHTML = "";

      if (!rides.length) {
        container.innerHTML = "<p class='muted'>No rides yet.</p>";
        return;
      }

      rides.forEach((ride) => {
        const div = document.createElement("div");
        div.className = "ride";

        div.innerHTML = `
          <b>Name:</b> ${ride.name}<br>
          <b>Phone:</b> ${ride.phone}<br>
          <b>Pickup:</b> ${ride.pickup}<br>
          <b>Dropoff:</b> ${ride.dropoff}<br>
          <div class="status">Status: ${ride.status}</div>
        `;

        container.appendChild(div);
      });
    }

    function sendLocation() {
      const name = document.getElementById("driverName").value.trim();

      if (!name) {
        document.getElementById("locationStatus").innerText = "Enter driver name to start location tracking.";
        return;
      }

      if (!navigator.geolocation) {
        document.getElementById("locationStatus").innerText = "Geolocation is not supported on this device.";
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;

          await fetch("/driver-location", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              name,
              lat,
              lng
            })
          });

          document.getElementById("locationStatus").innerText =
            "Location shared: " + lat.toFixed(5) + ", " + lng.toFixed(5);
        },
        (error) => {
          document.getElementById("locationStatus").innerText =
            "Location error: " + error.message;
        },
        {
          enableHighAccuracy: true
        }
      );
    }

    setInterval(sendLocation, 5000);
    setInterval(loadRides, 10000);

    loadRides();
  </script>

</body>
</html>
