<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Driver Profile</title>
  <style>
    body {
      background: #0f0f10;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
    }

    .card {
      background: #151518;
      padding: 20px;
      border-radius: 20px;
      margin-bottom: 15px;
      border: 1px solid #2a2a31;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    h2 {
      margin: 0 0 10px 0;
    }

    .big {
      font-size: 40px;
      font-weight: bold;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    button {
      padding: 12px 16px;
      margin: 5px 5px 0 0;
      border: none;
      border-radius: 10px;
      background: #2979ff;
      color: white;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.9;
    }

    .small-text {
      color: #aaa;
      font-size: 14px;
      margin-top: 6px;
    }

    @media (max-width: 700px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 32px;
      }

      .big {
        font-size: 30px;
      }
    }
  </style>
</head>

<body>
  <h1>Driver Profile</h1>

  <div class="card">
    <h2 id="name">Loading...</h2>
    <p id="tier">Tier: Starter</p>
    <p class="small-text">Live stats from your Harvey Taxi platform</p>
  </div>

  <div class="stats-grid">
    <div class="card">
      <div>Acceptance Rate</div>
      <div class="big"><span id="acceptance">0</span>%</div>
    </div>

    <div class="card">
      <div>Cancellation Rate</div>
      <div class="big"><span id="cancel">0</span>%</div>
    </div>

    <div class="card">
      <div>Completion Rate</div>
      <div class="big"><span id="completion">0</span>%</div>
    </div>

    <div class="card">
      <div>Ride Rating</div>
      <div class="big"><span id="rating">5.00</span></div>
    </div>

    <div class="card">
      <div>Delivery Satisfaction</div>
      <div class="big"><span id="delivery">100</span>%</div>
    </div>

    <div class="card">
      <div>Total Earnings</div>
      <div class="big">$<span id="earnings">0.00</span></div>
    </div>
  </div>

  <div class="card">
    <div>Rides Completed: <strong id="rides">0</strong></div>
    <div style="margin-top:10px;">Deliveries Completed: <strong id="deliveries">0</strong></div>
  </div>

  <div class="card">
    <button onclick="completeRide()">Test Ride</button>
    <button onclick="completeDelivery()">Test Delivery</button>
  </div>  <script>
    async function loadStats() {
      try {
        const res = await fetch('/api/driver/stats');
        const data = await res.json();

        document.getElementById("name").innerText = data.name;
        document.getElementById("tier").innerText = "Tier: " + data.tier;

        document.getElementById("acceptance").innerText = data.acceptanceRate;
        document.getElementById("cancel").innerText = data.cancellationRate;
        document.getElementById("completion").innerText = data.completionRate;
        document.getElementById("rating").innerText = data.rideRating;
        document.getElementById("delivery").innerText = data.deliverySatisfaction;
        document.getElementById("rides").innerText = data.ridesCompleted;
        document.getElementById("deliveries").innerText = data.deliveriesCompleted;
        document.getElementById("earnings").innerText = data.totalEarnings;
      } catch (error) {
        console.error("Failed to load stats:", error);
      }
    }

    async function completeRide() {
      try {
        await fetch('/api/driver/complete-ride', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          }
        });
        loadStats();
      } catch (error) {
        console.error("Failed to complete ride:", error);
      }
    }

    async function completeDelivery() {
      try {
        await fetch('/api/driver/complete-delivery', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          }
        });
        loadStats();
      } catch (error) {
        console.error("Failed to complete delivery:", error);
      }
    }

    loadStats();
  </script>
</body>
</html>
