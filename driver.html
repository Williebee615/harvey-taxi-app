<script>
let driverStats = {};

/* LOAD DRIVER DATA FROM BACKEND */
async function loadDriverStats() {
  try {
    const res = await fetch('/api/driver/stats');
    const data = await res.json();

    driverStats = data;

    // UPDATE UI
    document.getElementById("driverName").innerText = data.name;
    document.getElementById("driverTier").innerText = data.tier;

    document.getElementById("acceptanceRate").innerText = data.acceptanceRate + "%";
    document.getElementById("cancellationRate").innerText = data.cancellationRate + "%";

    document.getElementById("rideRating").innerText = data.rideRating + "★";
    document.getElementById("deliverySatisfaction").innerText = data.deliverySatisfaction + "%";

    document.getElementById("ridesCompleted").innerText = data.ridesCompleted;
    document.getElementById("deliveriesCompleted").innerText = data.deliveriesCompleted;

    document.getElementById("totalEarnings").innerText = "$" + data.totalEarnings;
    document.getElementById("completionRate").innerText = data.completionRate + "%";

  } catch (err) {
    console.error("Error loading stats:", err);
  }
}

/* ACTIONS */
async function completeRide() {
  await fetch('/api/driver/complete-ride', { method: 'POST' });
  loadDriverStats();
}

async function completeDelivery() {
  await fetch('/api/driver/complete-delivery', { method: 'POST' });
  loadDriverStats();
}

/* LOAD ON PAGE START */
loadDriverStats();
</script>
