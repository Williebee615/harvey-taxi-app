<!DOCTYPE html>
<html>
<head>
  <title>Harvey Taxi Driver App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      font-family:Arial,sans-serif;
      background:#111;
      color:white;
      padding:20px;
      margin:0;
    }

    h1{
      color:#ffd700;
      font-size:42px;
      margin-bottom:20px;
    }

    input{
      width:100%;
      max-width:420px;
      padding:16px;
      border:none;
      border-radius:12px;
      font-size:18px;
      margin-bottom:12px;
      box-sizing:border-box;
    }

    button{
      background:#ffd700;
      color:#0b57d0;
      border:none;
      padding:14px 22px;
      border-radius:12px;
      font-weight:bold;
      font-size:18px;
      cursor:pointer;
      margin-bottom:14px;
      margin-right:8px;
    }

    .ride{
      background:#222;
      padding:16px;
      border-radius:12px;
      margin:12px 0;
    }

    .accept{
      background:#28a745;
      color:white;
    }

    .complete{
      background:#1e90ff;
      color:white;
    }

    .muted{
      color:#bbb;
      margin:8px 0 16px;
    }

    .status{
      display:inline-block;
      margin-top:10px;
      padding:8px 12px;
      border-radius:10px;
      background:#444;
      font-weight:bold;
    }
  </style>
</head>
<body>

  <h1>🚕 Harvey Taxi Driver App</h1>

  <input id="driverName" placeholder="Enter driver name" />

  <button onclick="loadRides()">Refresh Rides</button>

  <div id="locationStatus" class="muted">Location tracking not started.</div>

  <div id="rides"></div>

  <script>
    async function loadRides() {
      const res = await fetch("/rides");
      const rides = await res.json();

      const container = document.getElementById("rides");
      container.innerHTML = "";

      if (!rides.length) {
        container.innerHTML = "<p class='muted'>No rides yet.</p>";
        return;
      }

      rides.forEach((ride) => {
        const div = document.createElement("div");
        div.className = "ride";

        let buttons = "";

        if (ride.status === "waiting") {
          buttons += `<button class="accept" onclick="acceptRide(${ride.id})">Accept Ride</button>`;
        }

        if (ride.status === "accepted" && ride.acceptedBy === getDriverName()) {
          buttons += `<button class="complete" onclick="completeRide(${ride.id})">Complete Ride</button>`;
        }

        div.innerHTML = `
          <b>Name:</b> ${ride.name}<br>
          <b>Phone:</b> ${ride.phone}<br>
          <b>Pickup:</b> ${ride.pickup}<br>
          <b>Dropoff:</b> ${ride.dropoff}<br>
          <b>Accepted By:</b> ${ride.acceptedBy || "-"}<br>
          <div class="status">Status: ${ride.status}</div><br>
          ${buttons}
        `;

        container.appendChild(div);
      });
    }

    function getDriverName() {
      return document.getElementById("driverName").value.trim();
    }

    async function acceptRide(id) {
      const driverName = getDriverName();

      if (!driverName) {
        alert("Enter driver name first");
        return;
      }

      await fetch("/accept-ride/" + id, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ driverName })
      });

      loadRides();
    }

    async function completeRide(id) {
      await fetch("/complete-ride/" + id, {
        method: "POST"
      });

      loadRides();
    }

    function sendLocation() {
      const name = getDriverName();

      if (!name) {
        document.getElementById("locationStatus").innerText = "Enter driver name to start location tracking.";
        return;
      }

      if (!navigator.geolocation) {
        document.getElementById("locationStatus").innerText = "Geolocation is not supported on this device.";
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          await fetch("/driver-location", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name,
              lat: pos.coords.latitude,
              lng: pos.coords.longitude
            })
          });

          document.getElementById("locationStatus").innerText =
            "Location shared: " +
            pos.coords.latitude.toFixed(5) +
            ", " +
            pos.coords.longitude.toFixed(5);
        },
        (err) => {
          document.getElementById("locationStatus").innerText = "Location error: " + err.message;
        },
        { enableHighAccuracy: true }
      );
    }

    setInterval(sendLocation, 5000);
    setInterval(loadRides, 8000);

    loadRides();
  </script>

</body>
</html>
