<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver App</title>

<style>
body {
  font-family: Arial;
  padding: 16px;
  background: #111;
  color: white;
}

h1 {
  margin-top: 0;
}

button {
  padding: 14px;
  font-size: 18px;
  background: gold;
  color: black;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
}

#status {
  margin-top: 15px;
  font-size: 16px;
}
</style>
</head>

<body>

<h1>🚕 Driver App</h1>

<button id="startBtn">Start Tracking</button>

<p id="status">Driver not active</p>

<script>
let tracking = false;document.getElementById("startBtn").onclick = function(){

  if(!navigator.geolocation){
    document.getElementById("status").innerText = "Geolocation not supported";
    return;
  }

  tracking = true;
  document.getElementById("status").innerText = "Tracking started...";

  navigator.geolocation.watchPosition(async function(pos){

    if(!tracking) return;

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    document.getElementById("status").innerText =
      "Sending location: " + lat + ", " + lng;

    try{
      await fetch("/api/driver/update",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          driverId: "driver1",
          lat,
          lng
        })
      });
    } catch(e){
      document.getElementById("status").innerText = "Error sending location";
    }

  });

};
</script>

</body>
</html>
