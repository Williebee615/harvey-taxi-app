<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      color: #ffd600;
      font-size: 36px;
    }

    .subtitle {
      color: #aaa;
      margin-bottom: 20px;
    }

    button {
      background: #ffd600;
      color: black;
      border: none;
      padding: 14px 20px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .card {
      background: #151518;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 15px;
    }

    .name {
      font-size: 18px;
      font-weight: bold;
    }

    .actions {
      margin-top: 10px;
    }

    .approve {
      background: green;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      margin-right: 10px;
      cursor: pointer;
    }

    .reject {
      background: red;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
    }

    .error {
      color: red;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>Harvey Taxi Admin Dashboard</h1>
<p class="subtitle">Review driver applications</p>

<button onclick="loadApplications()">Refresh Applications</button>

<div id="applications"></div>
<div id="error" class="error"></div><script>
const API = "https://harvey-taxi-api2.onrender.com";

async function loadApplications() {
  document.getElementById("error").innerText = "";
  document.getElementById("applications").innerHTML = "Loading...";

  try {
    const res = await fetch(API + "/api/admin/applications");

    if (!res.ok) throw new Error("API failed");

    const data = await res.json();

    if (!data.length) {
      document.getElementById("applications").innerHTML = "No applications found.";
      return;
    }

    let html = "";

    data.forEach(app => {
      html += `
        <div class="card">
          <div class="name">${app.name}</div>
          <div>Phone: ${app.phone}</div>
          <div>Email: ${app.email}</div>
          <div>Vehicle: ${app.vehicleType}</div>

          <div class="actions">
            <button class="approve" onclick="approve('${app.id}')">Approve</button>
            <button class="reject" onclick="reject('${app.id}')">Reject</button>
          </div>
        </div>
      `;
    });

    document.getElementById("applications").innerHTML = html;

  } catch (err) {
    document.getElementById("applications").innerHTML = "";
    document.getElementById("error").innerText = "Could not load applications.";
    console.error(err);
  }
}

async function approve(id) {
  await fetch(API + "/api/admin/approve/" + id, { method: "POST" });
  loadApplications();
}

async function reject(id) {
  await fetch(API + "/api/admin/reject/" + id, { method: "POST" });
  loadApplications();
}

loadApplications();
</script>

</body>
</html>
