<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      padding: 20px;
    }
    h1 {
      color: #ffd600;
      font-size: 36px;
      margin-bottom: 10px;
    }
    p {
      color: #aaa;
      margin-bottom: 20px;
    }
    button {
      background: #ffd600;
      color: black;
      border: none;
      padding: 14px 18px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .card {
      background: #151518;
      padding: 16px;
      border-radius: 16px;
      margin-bottom: 14px;
    }
    .name {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .row-btn {
      margin-right: 8px;
      margin-top: 12px;
    }
    .approve { background: green; color: white; }
    .reject { background: red; color: white; }
  </style>
</head>
<body>
  <h1>Harvey Taxi Admin Dashboard</h1>
  <p>Review driver applications</p>

  <button onclick="loadApplications()">Refresh Applications</button>

  <div id="applications">Loading...</div>

  <script>
    async function loadApplications() {
      const res = await fetch("/applications");
      const data = await res.json();

      if (!data.length) {
        document.getElementById("applications").innerHTML = "No applications found.";
        return;
      }

      let html = "";

      data.forEach(app => {
        html += `
          <div class="card">
            <div class="name">${app.name}</div>
            <div>${app.email}</div>
            <div>${app.phone}</div>
            <div>${app.vehicleType}</div>
            <div>Status: ${app.status}</div>
            <button class="row-btn approve" onclick="approve('${app.id}')">Approve</button>
            <button class="row-btn reject" onclick="reject('${app.id}')">Reject</button>
          </div>
        `;
      });

      document.getElementById("applications").innerHTML = html;
    }

    async function approve(id) {
      await fetch("/approve/" + id, { method: "POST" });
      loadApplications();
    }

    async function reject(id) {
      await fetch("/reject/" + id, { method: "POST" });
      loadApplications();
    }

    loadApplications();
  </script>
</body>
</html>
