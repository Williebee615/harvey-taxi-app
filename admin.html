<!DOCTYPE html>
<html>
<head>
  <title>Harvey Taxi Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body{
      font-family:Arial,sans-serif;
      background:#111;
      color:white;
      margin:0;
      padding:20px;
    }

    h1,h2{
      color:#ffd700;
      margin-top:0;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
      margin-bottom:20px;
    }

    .card{
      background:#222;
      padding:14px;
      border-radius:12px;
      margin-bottom:12px;
    }

    .stat{
      background:#1b1b1b;
      padding:14px;
      border-radius:12px;
    }

    button{
      border:none;
      padding:10px 14px;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
      margin-right:8px;
      margin-top:10px;
    }

    .approve{ background:#28a745; color:white; }
    .reject{ background:#dc3545; color:white; }
    .refresh{ background:#ffd700; color:black; }

    .badge{
      display:inline-block;
      margin-top:8px;
      padding:6px 10px;
      border-radius:8px;
      font-size:13px;
      font-weight:bold;
    }

    .pending{ background:#6c757d; color:white; }
    .approved{ background:#28a745; color:white; }
    .rejected{ background:#dc3545; color:white; }
    .waiting{ background:#444; color:white; }
    .accepted{ background:#1e90ff; color:white; }
    .completed{ background:#28a745; color:white; }

    .section{
      margin-top:24px;
    }

    #map{
      height:420px;
      border-radius:14px;
      overflow:hidden;
      margin-top:12px;
      margin-bottom:18px;
    }

    .map-note{
      color:#bbb;
      margin-top:8px;
      margin-bottom:8px;
      font-size:14px;
    }
  </style>
</head>
<body>

  <h1>🚕 Harvey Taxi Admin Panel</h1>

  <button class="refresh" onclick="loadEverything()">Refresh Everything</button>

  <div class="stats" id="stats"></div>

  <div class="section">
    <h2>Live Driver Map</h2>
    <div class="map-note">Approved drivers sharing location will appear below and update automatically.</div>
    <div id="map"></div>
  </div>

  <div class="section">
    <h2>Driver Applications</h2>
    <div id="drivers"></div>
  </div>

  <div class="section">
    <h2>Ride Activity</h2>
    <div id="rides"></div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    const map = L.map("map").setView([36.1627, -86.7816], 11);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const driverIcon = L.icon({
      iconUrl: "https://cdn-icons-png.flaticon.com/512/61/61168.png",
      iconSize: [32, 32],
      iconAnchor: [16, 32],
      popupAnchor: [0, -28]
    });

    let driverMarkers = {};
    let rideMarkers = [];

    async function geocodeLocation(locationText) {
      try {
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(locationText)}`;
        const res = await fetch(url, {
          headers: { "Accept": "application/json" }
        });
        const data = await res.json();

        if (data && data.length > 0) {
          return {
            lat: parseFloat(data[0].lat),
            lon: parseFloat(data[0].lon)
          };
        }
      } catch (err) {
        console.error("Geocode error:", err);
      }

      return null;
    }

    function clearRideMarkers() {
      rideMarkers.forEach(marker => map.removeLayer(marker));
      rideMarkers = [];
    }

    async function loadAnalytics() {
      const res = await fetch("/analytics");
      const data = await res.json();

      document.getElementById("stats").innerHTML = `
        <div class="stat"><b>Total Rides:</b><br>${data.totalRides || 0}</div>
        <div class="stat"><b>Completed Rides:</b><br>${data.completedRides || 0}</div>
        <div class="stat"><b>Total Drivers:</b><br>${data.totalDrivers || 0}</div>
        <div class="stat"><b>Approved Drivers:</b><br>${data.approvedDrivers || 0}</div>
        <div class="stat"><b>Waiting Rides:</b><br>${data.waitingRides || 0}</div>
        <div class="stat"><b>Gross Revenue:</b><br>$${Number(data.grossRevenue || 0).toFixed(2)}</div>
      `;
    }

    async function loadDrivers() {
      const [driversRes, locationsRes] = await Promise.all([
        fetch("/drivers"),
        fetch("/driver-locations")
      ]);

      const drivers = await driversRes.json();
      const locations = await locationsRes.json();

      const container = document.getElementById("drivers");
      container.innerHTML = "";

      if (!drivers.length) {
        container.innerHTML = "<div class='card'>No driver applications yet.</div>";
      } else {
        drivers.forEach(driver => {
          const div = document.createElement("div");
          div.className = "card";

          let buttons = "";
          if (driver.status === "pending") {
            buttons = `
              <button class="approve" onclick="approveDriver(${driver.id})">Approve</button>
              <button class="reject" onclick="rejectDriver(${driver.id})">Reject</button>
            `;
          }

          div.innerHTML = `
            <b>${driver.name}</b><br>
            Phone: ${driver.phone}<br>
            Email: ${driver.email}<br>
            City: ${driver.city}, ${driver.state}<br>
            Vehicle: ${driver.vehicle}<br>
            Type: ${driver.type}<br>
            Earnings: $${Number(driver.earnings || 0).toFixed(2)}<br>
            <div class="badge ${driver.status}">${driver.status}</div><br>
            ${buttons}
          `;

          container.appendChild(div);
        });
      }

      const approvedNames = new Set(
        drivers.filter(driver => driver.status === "approved").map(driver => driver.name)
      );

      const activeLocations = locations.filter(loc => approvedNames.has(loc.name));
      const seenNames = new Set();

      activeLocations.forEach(loc => {
        seenNames.add(loc.name);

        if (driverMarkers[loc.name]) {
          driverMarkers[loc.name].setLatLng([loc.lat, loc.lng]);
          driverMarkers[loc.name].setPopupContent(
            `<b>${loc.name}</b><br>Live location active`
          );
        } else {
          driverMarkers[loc.name] = L.marker([loc.lat, loc.lng], {
            icon: driverIcon
          })
            .addTo(map)
            .bindPopup(`<b>${loc.name}</b><br>Live location active`);
        }
      });

      Object.keys(driverMarkers).forEach(name => {
        if (!seenNames.has(name)) {
          map.removeLayer(driverMarkers[name]);
          delete driverMarkers[name];
        }
      });
    }

    async function loadRides() {
      const res = await fetch("/rides");
      const rides = await res.json();

      const container = document.getElementById("rides");
      container.innerHTML = "";

      clearRideMarkers();

      if (!rides.length) {
        container.innerHTML = "<div class='card'>No rides yet.</div>";
        return;
      }

      for (const ride of rides) {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <b>${ride.name}</b><br>
          Phone: ${ride.phone}<br>
          Pickup: ${ride.pickup}<br>
          Dropoff: ${ride.dropoff}<br>
          Accepted By: ${ride.acceptedBy || "-"}<br>
          Fare: $${Number(ride.fare || 0).toFixed(2)}<br>
          <div class="badge ${ride.status}">${ride.status}</div>
        `;
        container.appendChild(div);

        if (ride.pickup) {
          const coords = await geocodeLocation(ride.pickup + ", Nashville, TN");
          if (coords) {
            const marker = L.marker([coords.lat, coords.lon])
              .addTo(map)
              .bindPopup(
                `<b>${ride.name}</b><br>` +
                `Pickup: ${ride.pickup}<br>` +
                `Dropoff: ${ride.dropoff}<br>` +
                `Status: ${ride.status}<br>` +
                `Accepted By: ${ride.acceptedBy || "-"}`
              );

            rideMarkers.push(marker);
          }
        }
      }
    }

    async function approveDriver(id) {
      await fetch("/approve-driver/" + id, { method: "POST" });
      loadEverything();
    }

    async function rejectDriver(id) {
      await fetch("/reject-driver/" + id, { method: "POST" });
      loadEverything();
    }

    async function loadEverything() {
      await loadAnalytics();
      await loadDrivers();
      await loadRides();
    }

    loadEverything();
    setInterval(loadEverything, 5000);
  </script>

</body>
</html>
