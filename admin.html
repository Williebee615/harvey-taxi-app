<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi Admin</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      color: gold;
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    p {
      color: #ddd;
      margin-bottom: 20px;
    }

    button {
      background: gold;
      color: #000;
      border: none;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .section {
      background: #111;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .section h2 {
      color: gold;
      margin-top: 0;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 16px;
      margin-top: 14px;
    }

    .card p {
      margin: 8px 0;
      color: #fff;
    }

    .empty {
      color: #bbb;
      margin-top: 10px;
    }

    .error {
      color: #ff5c5c;
      white-space: pre-wrap;
    }

    .success {
      color: #42d26b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Harvey Taxi Admin Dashboard</h1>
    <p>Review driver applications and monitor your system.</p>

    <button onclick="loadApplications()">Refresh Applications</button>

    <div class="section">
      <h2>Pending Driver Applications</h2>
      <div id="applicationsList" class="empty">Loading applications...</div>
    </div>
  </div>

  <script>
    async function loadApplications() {
      const list = document.getElementById("applicationsList");
      list.innerHTML = "Loading applications...";

      try {
        const response = await fetch("https://harvey-taxi-api2.onrender.com/api/driver/applications");
        const data = await response.json();

        if (!response.ok || !data.success) {
          list.innerHTML = '<div class="error">Applications failed to load.</div>';
          return;
        }

        if (!data.applications || data.applications.length === 0) {
          list.innerHTML = '<div class="empty">No driver applications yet.</div>';
          return;
        }

        list.innerHTML = data.applications.map(app => `
          <div class="card">
            <p><strong>Name:</strong> ${app.fullName}</p>
            <p><strong>Phone:</strong> ${app.phone}</p>
            <p><strong>Email:</strong> ${app.email}</p>
            <p><strong>City:</strong> ${app.city}</p>
            <p><strong>State:</strong> ${app.state}</p>
            <p><strong>Vehicle:</strong> ${app.vehicleType}</p>
            <p><strong>Driver Type:</strong> ${app.driverType}</p>
            <p><strong>Status:</strong> <span class="success">${app.status}</span></p>
            <p><strong>Submitted:</strong> ${app.createdAt || "N/A"}</p>
          </div>
        `).join("");
      } catch (error) {
        console.error(error);
        list.innerHTML = `<div class="error">Could not load applications.</div>`;
      }
    }

    loadApplications();
  </script>
</body>
</html>
