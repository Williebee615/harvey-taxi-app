<!DOCTYPE html>
<html>
<head>
  <title>Harvey Taxi Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      font-family:Arial,sans-serif;
      background:#111;
      color:white;
      margin:0;
      padding:20px;
    }
    h1,h2{
      color:#ffd700;
    }
    .section{
      margin-bottom:30px;
    }
    .card{
      background:#222;
      padding:15px;
      border-radius:12px;
      margin:12px 0;
    }
    button{
      background:#1e90ff;
      color:white;
      border:none;
      padding:10px 14px;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
      margin-top:10px;
      margin-right:8px;
    }
    .approve{
      background:#28a745;
    }
    .refresh{
      background:#ffd700;
      color:black;
    }
    .muted{
      color:#bbb;
    }
    .badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:8px;
      font-size:13px;
      font-weight:bold;
      margin-top:8px;
    }
    .pending{ background:#6c757d; }
    .approved{ background:#28a745; }
    .waiting{ background:#444; }
    .accepted{ background:#1e90ff; }
    .completed{ background:#28a745; }
  </style>
</head>
