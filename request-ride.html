<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Ride</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: black;
    }

    h1 {
      margin-top: 0;
      font-size: 42px;
    }

    button {
      padding: 16px 28px;
      font-size: 20px;
      font-weight: bold;
      background: black;
      color: gold;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      margin-bottom: 16px;
    }

    #status,
    #driver {
      font-size: 18px;
      margin: 10px 0;
      word-break: break-word;
    }

    #map {
      width: 100%;
      height: 420px;
      margin-top: 20px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #ccc;
      background: #ddd;
    }
  </style>
</head>
<body>
  <h1>Request a Ride</h1>

  <button id="requestBtn" type="button">Request Ride</button>

  <p id="status">Waiting...</p>
  <p id="driver"></p>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const requestBtn = document.getElementById("requestBtn");
    const statusEl = document.getElementById("status");
    const driverEl = document.getElementById("driver");

    let map = null;
    let riderMarker = null;
    let driverMarker = null;
    let currentRideId = null;
    let riderLatLng = null;
    let polling = false;

    function initMap(lat, lng) {
      if (!map) {
        map = L.map("map").setView([lat, lng], 15);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19,
          attribution: "&copy; OpenStreetMap"
        }).addTo(map);
      } else {
        map.setView([lat, lng], 15);
      }
    }

    function setRiderMarker(lat, lng) {
      riderLatLng = [lat, lng];

      if (!riderMarker) {
        riderMarker = L.marker([lat, lng]).addTo(map)
          .bindPopup("You are here")
          .openPopup();
      } else {
        riderMarker.setLatLng([lat, lng]);
      }
    }

    function setDriverMarker(lat, lng) {
      if (!driverMarker) {
        driverMarker = L.marker([lat, lng]).addTo(map)
          .bindPopup("Driver");
      } else {
        driverMarker.setLatLng([lat, lng]);
      }
    }    function fitMapToMarkers(driverLat, driverLng) {
      if (!map || !riderLatLng) return;

      const bounds = L.latLngBounds([
        riderLatLng,
        [driverLat, driverLng]
      ]);

      map.fitBounds(bounds, { padding: [40, 40] });
    }

    function requestRide() {
      if (!navigator.geolocation) {
        statusEl.innerText = "Geolocation not supported";
        return;
      }

      statusEl.innerText = "Getting your location...";

      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;

          initMap(lat, lng);
          setRiderMarker(lat, lng);

          try {
            const res = await fetch("/api/ride/request", {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                riderId: "rider1",
                pickup: { lat, lng }
              })
            });

            const data = await res.json();

            if (!data.success && !data.rideId) {
              statusEl.innerText = "Ride request failed";
              return;
            }

            currentRideId = data.rideId;
            statusEl.innerText = "Ride requested. Checking for driver...";

            if (!polling) {
              polling = true;
              trackRide();
            }
          } catch (err) {
            console.error(err);
            statusEl.innerText = "Error requesting ride";
          }
        },
        (err) => {
          console.error(err);
          statusEl.innerText = "Location error: " + err.message;
        },
        {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 15000
        }
      );
    }

    async function trackRide() {
      if (!currentRideId) return;

      try {
        const res = await fetch("/api/ride/" + currentRideId);
        const data = await res.json();

        if (data.driver) {
          statusEl.innerText = "Driver assigned!";
          driverEl.innerText =
            "Driver at: " + data.driver.lat + ", " + data.driver.lng;

          setDriverMarker(data.driver.lat, data.driver.lng);
          fitMapToMarkers(data.driver.lat, data.driver.lng);
        } else {
          statusEl.innerText = "Waiting for available driver...";
        }
      } catch (err) {
        console.error(err);
        statusEl.innerText = "Error checking ride";
      }

      setTimeout(trackRide, 2000);
    }

    requestBtn.onclick = function () {
      requestRide();
    };

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        initMap(pos.coords.latitude, pos.coords.longitude);
        setRiderMarker(pos.coords.latitude, pos.coords.longitude);
        statusEl.innerText = "Ready to request ride";
      },
      () => {
        statusEl.innerText = "Allow location to request a ride";
      }
    );
  </script>
</body>
</html>
