<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Ride</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { font-family: Arial; padding:16px; }
button {
  padding:12px;
  font-size:18px;
  background:black;
  color:gold;
  border:none;
  border-radius:10px;
}
#map { height:400px; margin-top:20px; }
</style>
</head>

<body>

<h1>Request a Ride</h1>
<button onclick="requestRide()">Request Ride</button>

<p id="status">Waiting...</p>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map, userMarker, driverMarker;
let rideId = null;

navigator.geolocation.getCurrentPosition((pos)=>{
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;

  map = L.map('map').setView([lat,lng],14);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    .addTo(map);

  userMarker = L.marker([lat,lng]).addTo(map)
    .bindPopup("You are here").openPopup();
});

function requestRide(){
  document.getElementById("status").innerText = "Requesting ride...";navigator.geolocation.getCurrentPosition(async(pos)=>{
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;

  const res = await fetch("/api/ride/request",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify({
      riderId:"rider1",
      pickup:{lat,lng}
    })
  });

  const data = await res.json();
  rideId = data.rideId;

  startTracking();
});
}

function startTracking(){
  setInterval(async()=>{
    if(!rideId) return;

    const res = await fetch("/api/ride/"+rideId);
    const data = await res.json();

    if(data.driver){
      document.getElementById("status").innerText="Driver assigned!";

      const {lat,lng} = data.driver;

      if(!driverMarker){
        driverMarker = L.marker([lat,lng]).addTo(map)
          .bindPopup("Driver");
      } else {
        driverMarker.setLatLng([lat,lng]);
      }
    } else {
      document.getElementById("status").innerText="Waiting for driver...";
    }

  },2000);
}
</script>

</body>
</html>
