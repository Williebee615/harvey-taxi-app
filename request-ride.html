<!DOCTYPE html>
<html>
<head>
  <title>Harvey Taxi - Request Ride</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body{
      font-family:Arial,sans-serif;
      background:#111;
      color:white;
      padding:20px;
      margin:0;
    }

    h1{
      color:#ffd700;
      font-size:40px;
      margin-bottom:10px;
      text-align:center;
    }

    p{
      text-align:center;
      color:#ccc;
      margin-bottom:20px;
    }

    .card{
      background:#1f1f1f;
      border-radius:16px;
      padding:18px;
      max-width:520px;
      margin:0 auto 20px auto;
    }

    input,button{
      width:100%;
      box-sizing:border-box;
      padding:14px;
      margin:10px 0;
      border-radius:12px;
      border:none;
      font-size:16px;
    }

    button{
      background:#1e90ff;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    #fare{
      margin-top:10px;
      font-size:18px;
      color:#ffd700;
      font-weight:bold;
      text-align:center;
      background:#222;
      border-radius:12px;
      padding:14px;
    }

    #map{
      height:350px;
      margin-top:20px;
      border-radius:10px;
      overflow:hidden;
    }

    .success{
      margin-top:15px;
      color:#00ff99;
      text-align:center;
      min-height:20px;
    }

    .secondary{
      background:#ffd700;
      color:black;
    }
  </style>
</head>
<body>

  <h1>🚕 Request a Ride</h1>
  <p>Request a ride in seconds.</p>

  <div class="card">
    <input id="name" placeholder="Your Name">
    <input id="phone" placeholder="Phone Number">
    <input id="pickup" placeholder="Pickup Location">
    <input id="dropoff" placeholder="Dropoff Location">

    <button class="secondary" onclick="useCurrentLocation()">Use My Current Location</button>

    <div id="fare">Estimated Fare: --</div>

    <button onclick="requestRide()">Request Ride</button>

    <div class="success" id="success"></div>

    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    const map = L.map("map").setView([36.1627, -86.7816], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap"
    }).addTo(map);

    let driverMarker = null;
    let pickupMarker = null;
    let currentRideAssignedDriver = null;

    function updateFare() {
      const pickup = document.getElementById("pickup").value.trim();
      const dropoff = document.getElementById("dropoff").value.trim();

      if (!pickup || !dropoff) {
        document.getElementById("fare").innerText = "Estimated Fare: --";
        return;
      }

      const distanceHint = Math.max(1, Math.ceil((pickup.length + dropoff.length) / 20));
      const fare = (5 + distanceHint * 2).toFixed(2);
      document.getElementById("fare").innerText = "Estimated Fare: $" + fare;
    }

    document.getElementById("pickup").addEventListener("input", updateFare);
    document.getElementById("dropoff").addEventListener("input", updateFare);

    async function useCurrentLocation() {
      navigator.geolocation.getCurrentPosition(function(pos) {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        document.getElementById("pickup").value = lat + "," + lng;
        updateFare();

        map.setView([lat, lng], 14);

        if (pickupMarker) {
          map.removeLayer(pickupMarker);
        }

        pickupMarker = L.marker([lat, lng]).addTo(map)
          .bindPopup("Pickup Location")
          .openPopup();
      });
    }

    async function requestRide() {
      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const pickup = document.getElementById("pickup").value.trim();
      const dropoff = document.getElementById("dropoff").value.trim();

      const res = await fetch("/request-ride", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, phone, pickup, dropoff })
      });

      const data = await res.json();

      if (!data.success) {
        document.getElementById("success").innerText = "Ride request failed.";
        return;
      }

      if (data.autoAssigned && data.assignedDriver) {
        currentRideAssignedDriver = data.assignedDriver;
        document.getElementById("success").innerText =
          "Ride sent successfully! Driver assigned: " + data.assignedDriver;
      } else {
        currentRideAssignedDriver = null;
        document.getElementById("success").innerText =
          "Ride request sent successfully! Waiting for driver assignment.";
      }

      trackDriver();
    }

    async function trackDriver() {
      setInterval(async () => {
        const res = await fetch("/driver-locations");
        const drivers = await res.json();

        if (!drivers.length) return;

        let targetDriver = null;

        if (currentRideAssignedDriver) {
          targetDriver = drivers.find((d) => d.name === currentRideAssignedDriver);
        }

        if (!targetDriver) {
          targetDriver = drivers[0];
        }

        if (!targetDriver) return;

        const lat = targetDriver.lat;
        const lng = targetDriver.lng;

        if (driverMarker) {
          driverMarker.setLatLng([lat, lng]);
          driverMarker.setPopupContent("🚕 Your Driver: " + targetDriver.name);
        } else {
          driverMarker = L.marker([lat, lng]).addTo(map)
            .bindPopup("🚕 Your Driver: " + targetDriver.name);
        }
      }, 3000);
    }
  </script>

</body>
</html>
