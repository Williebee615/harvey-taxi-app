<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Ride - Harvey Taxi</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #111;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 22px 18px 40px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 18px;
      text-decoration: none;
      color: #111;
      font-weight: 700;
      font-size: 14px;
    }

    .title {
      font-size: 28px;
      font-weight: 800;
      margin: 0 0 8px;
    }

    .subtext {
      color: #6b7280;
      font-size: 15px;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 16px;
    }

    .label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .input {
      width: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      background: #fafafa;
      outline: none;
    }

    .section-title {
      font-size: 20px;
      font-weight: 800;
      margin: 20px 0 12px;
    }

    .ride-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .ride-card.active {
      border: 2px solid #111;
      background: #f3f4f6;
    }

    .ride-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ride-emoji {
      font-size: 28px;
    }

    .ride-title {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .ride-sub {
      font-size: 13px;
      color: #6b7280;
    }

    .ride-price {
      font-size: 18px;
      font-weight: 800;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn-primary {
      background: #111;
      color: #fff;
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #111;
    }

    .result {
      display: none;
      margin-top: 18px;
      background: #f9fafb;
      border-radius: 14px;
      padding: 14px;
      line-height: 1.5;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back-link" href="/">← Back</a>

    <h1 class="title">Request a Ride</h1>
    <div class="subtext">
      Enter your ride details below and choose the service you want.
    </div>

    <div class="field">
      <label class="label" for="pickup">Pickup location</label>
      <input class="input" id="pickup" type="text" placeholder="Enter pickup address" />
    </div>

    <div class="field">
      <label class="label" for="destination">Destination</label>
      <input class="input" id="destination" type="text" placeholder="Enter destination" />
    </div>

    <div class="field">
      <label class="label" for="name">Passenger name</label>
      <input class="input" id="name" type="text" placeholder="Enter your full name" />
    </div>

    <div class="section-title">Choose ride type</div>

    <div class="ride-card active" onclick="selectRide('Harvey Standard', this)">
      <div class="ride-left">
        <div class="ride-emoji">🚕</div>
        <div>
          <div class="ride-title">Harvey Standard</div>
          <div class="ride-sub">Affordable everyday ride</div>
        </div>
      </div>
      <div class="ride-price">$12</div>
    </div>

    <div class="ride-card" onclick="selectRide('Harvey XL', this)">
      <div class="ride-left">
        <div class="ride-emoji">🚐</div>
        <div>
          <div class="ride-title">Harvey XL</div>
          <div class="ride-sub">More room for passengers and bags</div>
        </div>
      </div>
      <div class="ride-price">$18</div>
    </div>

    <div class="ride-card" onclick="selectRide('Airport Ride', this)">
      <div class="ride-left">
        <div class="ride-emoji">✈️</div>
        <div>
          <div class="ride-title">Airport Ride</div>
          <div class="ride-sub">Easy rides to and from BNA</div>
        </div>
      </div>
      <div class="ride-price">$25</div>
    </div>

    <button class="btn btn-primary" onclick="requestRide()">Request Ride</button>
    <button class="btn btn-secondary" onclick="window.location.href='/'">Cancel</button>

    <div class="result" id="resultBox"></div>
  </div>

  <script>
    let selectedRide = 'Harvey Standard';

    function selectRide(rideName, element) {
      selectedRide = rideName;
      document.querySelectorAll('.ride-card').forEach(card => {
        card.classList.remove('active');
      });
      element.classList.add('active');
    }

    function requestRide() {
      const pickup = document.getElementById('pickup').value.trim();
      const destination = document.getElementById('destination').value.trim();
      const name = document.getElementById('name').value.trim();
      const resultBox = document.getElementById('resultBox');

      if (!pickup || !destination || !name) {
        resultBox.style.display = 'block';
        resultBox.innerHTML = 'Please complete pickup, destination, and passenger name.';
        return;
      }

      resultBox.style.display = 'block';
      resultBox.innerHTML =
        '<strong>Ride requested successfully.</strong><br><br>' +
        'Passenger: ' + name + '<br>' +
        'Pickup: ' + pickup + '<br>' +
        'Destination: ' + destination + '<br>' +
        'Ride Type: ' + selectedRide;
    }
  </script>
</body>
</html>
