<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request a Ride - Harvey Taxi</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
      padding-bottom: 40px;
    }

    .header {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .subtext {
      color: #666;
      margin-bottom: 20px;
      font-size: 15px;
    }

    .field {
      margin-bottom: 16px;
    }

    .label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 16px;
      background: #fafafa;
    }

    .ride-options {
      margin-top: 20px;
      margin-bottom: 20px;
    }

    .ride-card {
      background: #f8f8f8;
      border: 1px solid #e8e8e8;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .ride-card.active {
      border: 2px solid #111;
      background: #f1f1f1;
    }

    .ride-title {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .ride-sub {
      font-size: 13px;
      color: #666;
    }

    .price {
      font-weight: 800;
      font-size: 18px;
    }

    .button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
    }

    .primary {
      background: #111;
      color: #fff;
    }

    .secondary {
      background: #f3f3f3;
      color: #111;
    }

    .result {
      margin-top: 20px;
      padding: 14px;
      border-radius: 12px;
      background: #f5f5f5;
      display: none;
      font-size: 14px;
      line-height: 1.5;
    }

    a.back-link {
      display: inline-block;
      margin-bottom: 18px;
      color: #111;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back-link" href="/">← Back to Home</a>

    <div class="header">Request a Ride</div>
    <div class="subtext">Enter your trip details and choose your ride type.</div>

    <div class="field">
      <label class="label" for="pickup">Pickup location</label>
      <input class="input" id="pickup" type="text" placeholder="Enter pickup address" />
    </div>

    <div class="field">
      <label class="label" for="destination">Destination</label>
      <input class="input" id="destination" type="text" placeholder="Enter destination" />
    </div>

    <div class="field">
      <label class="label" for="name">Passenger name</label>
      <input class="input" id="name" type="text" placeholder="Your full name" />
    </div>

    <div class="ride-options">
      <div class="ride-card active" onclick="selectRide('Harvey Standard', this)">
        <div>
          <div class="ride-title">🚕 Harvey Standard</div>
          <div class="ride-sub">Affordable everyday ride</div>
        </div>
        <div class="price">$12</div>
      </div>

      <div class="ride-card" onclick="selectRide('Harvey XL', this)">
        <div>
          <div class="ride-title">🚐 Harvey XL</div>
          <div class="ride-sub">More room for passengers</div>
        </div>
        <div class="price">$18</div>
      </div>

      <div class="ride-card" onclick="selectRide('Airport Ride', this)">
        <div>
          <div class="ride-title">✈️ Airport Ride</div>
          <div class="ride-sub">Quick trip to or from BNA</div>
        </div>
        <div class="price">$25</div>
      </div>
    </div>

    <button class="button primary" onclick="requestRide()">Request Ride</button>
    <button class="button secondary" onclick="window.location.href='/'">Cancel</button>

    <div class="result" id="resultBox"></div>
  </div>

  <script>
    let selectedRide = 'Harvey Standard';

    function selectRide(rideName, element) {
      selectedRide = rideName;
      const cards = document.querySelectorAll('.ride-card');
      cards.forEach(card => card.classList.remove('active'));
      element.classList.add('active');
    }

    function requestRide() {
      const pickup = document.getElementById('pickup').value.trim();
      const destination = document.getElementById('destination').value.trim();
      const name = document.getElementById('name').value.trim();
      const resultBox = document.getElementById('resultBox');

      if (!pickup || !destination || !name) {
        resultBox.style.display = 'block';
        resultBox.innerHTML = 'Please fill in pickup location, destination, and passenger name.';
        return;
      }

      resultBox.style.display = 'block';
      resultBox.innerHTML =
        '<strong>Ride requested successfully.</strong><br><br>' +
        'Passenger: ' + name + '<br>' +
        'Pickup: ' + pickup + '<br>' +
        'Destination: ' + destination + '<br>' +
        'Ride Type: ' + selectedRide;
    }
  </script>
</body>
</html>
