<!DOCTYPE html>
<html>
<head>
  <title>Request a Ride</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      background: #e9e9e9;
      font-family: Arial;
      text-align: center;
      padding: 20px;
      color: #111;
    }
    h1 {
      font-size: 62px;
      margin-top: 70px;
      margin-bottom: 30px;
    }
    button {
      background: black;
      color: #ffd400;
      border: none;
      border-radius: 24px;
      padding: 24px 42px;
      font-size: 34px;
      font-weight: bold;
      margin-bottom: 40px;
    }
    p {
      font-size: 24px;
      font-weight: bold;
      line-height: 1.4;
      margin-bottom: 40px;
    }
    .map-box {
      background: #d8d8d8;
      height: 700px;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #777;
      font-size: 30px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Request a Ride</h1>
  <button>Request Ride</button>
  <p>Tap “Request Ride” to detect your pickup location.</p>
  <div class="map-box">Map will appear here</div>
</body>
</html>
