<!DOCTYPE html>
<html>
<head>
<title>Harvey Taxi - Request Ride</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}

h1{
color:#ffd700;
}

input,button{
width:100%;
padding:14px;
margin:10px 0;
border-radius:10px;
border:none;
font-size:16px;
}

button{
background:#1e90ff;
color:white;
font-weight:bold;
}

#fare{
margin-top:10px;
font-size:18px;
color:#ffd700;
}

#map{
height:350px;
margin-top:20px;
border-radius:10px;
}

.success{
margin-top:15px;
color:#00ff99;
}

</style>
</head>

<body>

<h1>🚕 Request a Ride</h1>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">
<input id="pickup" placeholder="Pickup Location">
<input id="dropoff" placeholder="Dropoff Location">

<button onclick="useCurrentLocation()">Use My Current Location</button>

<div id="fare">Estimated Fare: --</div>

<button onclick="requestRide()">Request Ride</button>

<div class="success" id="success"></div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map("map").setView([36.1627,-86.7816],12)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
attribution:"© OpenStreetMap"
}).addTo(map)

let driverMarker = null
let pickupMarker = null

async function useCurrentLocation(){

navigator.geolocation.getCurrentPosition(function(pos){

const lat = pos.coords.latitude
const lng = pos.coords.longitude

document.getElementById("pickup").value = lat + "," + lng

map.setView([lat,lng],14)

if(pickupMarker){
map.removeLayer(pickupMarker)
}

pickupMarker = L.marker([lat,lng]).addTo(map)
.bindPopup("Pickup Location")
.openPopup()

})

}

async function requestRide(){

const name = document.getElementById("name").value
const phone = document.getElementById("phone").value
const pickup = document.getElementById("pickup").value
const dropoff = document.getElementById("dropoff").value

const res = await fetch("/request-ride",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name,
phone,
pickup,
dropoff
})
})

document.getElementById("success").innerText="Ride request sent successfully!"

trackDriver()

}

async function trackDriver(){

setInterval(async ()=>{

const res = await fetch("/driver-locations")
const drivers = await res.json()

if(drivers.length>0){

const d = drivers[0]

const lat = d.lat
const lng = d.lng

if(driverMarker){
driverMarker.setLatLng([lat,lng])
}
else{

driverMarker = L.marker([lat,lng]).addTo(map)
.bindPopup("🚕 Your Driver")

}

}

},3000)

}

</script>

</body>
</html>
