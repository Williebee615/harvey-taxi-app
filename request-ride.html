<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request a Ride - Harvey Taxi</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: 40px auto;
      background: white;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      margin-top: 20px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    #result {
      margin-top: 20px;
      padding: 12px;
      border-radius: 10px;
      display: none;
      white-space: pre-wrap;
    }

    .success {
      background: #e8f9ee;
      color: #146c2e;
    }

    .error {
      background: #fdeaea;
      color: #a32020;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Harvey Taxi Ride Request</h1>

    <form id="rideForm">
      <label for="passengerName">Passenger Name</label>
      <input type="text" id="passengerName" placeholder="Enter your name" required />

      <label for="pickup">Pickup Location</label>
      <input type="text" id="pickup" placeholder="Enter pickup location" required />

      <label for="destination">Destination</label>
      <input type="text" id="destination" placeholder="Enter destination" required />

      <label for="rideType">Ride Type</label>
      <select id="rideType" required>
        <option value="">Select a ride type</option>
        <option value="Standard">Standard</option>
        <option value="XL">XL</option>
        <option value="Luxury">Luxury</option>
      </select>

      <button type="submit">Request Ride</button>
    </form>

    <div id="result"></div>
  </div>

  <script>
    const form = document.getElementById('rideForm');
    const result = document.getElementById('result');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const passengerName = document.getElementById('passengerName').value.trim();
      const pickup = document.getElementById('pickup').value.trim();
      const destination = document.getElementById('destination').value.trim();
      const rideType = document.getElementById('rideType').value;

      result.style.display = 'block';
      result.className = '';
      result.textContent = 'Submitting ride request...';

      try {
        const response = await fetch('/request-ride', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            passengerName,
            pickup,
            destination,
            rideType
          })
        });

        const data = await response.json();

        if (data.success) {
          result.className = 'success';
          result.textContent = `Success: ${data.message}`;
          form.reset();
        } else {
          result.className = 'error';
          result.textContent = `Error: ${data.message}`;
        }
      } catch (error) {
        result.className = 'error';
        result.textContent = 'Error: Could not connect to server';
      }
    });
  </script>
</body>
</html>
