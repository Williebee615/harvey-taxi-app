<script>
async function requestRide(lat, lng) {
  try {
    const res = await fetch("/api/ride/request", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        riderId: "rider1",
        pickup: { lat, lng }
      })
    });

    const data = await res.json();

    if (data.success) {
      document.getElementById("status").innerText = "✅ Ride requested!";
    } else {
      document.getElementById("status").innerText = "❌ Failed";
    }

  } catch (err) {
    document.getElementById("status").innerText = "❌ Error requesting ride";
  }
}
</script>requestBtn.onclick = () => {
  navigator.geolocation.getCurrentPosition((pos) => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    requestRide(lat, lng);
  });
};
