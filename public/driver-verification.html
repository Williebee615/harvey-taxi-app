<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Driver Verification</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b0f1a;
color:white;
}

.container{
max-width:720px;
margin:0 auto;
padding:20px;
}

.card{
background:#111827;
border:1px solid #1f2937;
border-radius:14px;
padding:20px;
margin-bottom:16px;
}

h1{
margin:0 0 10px;
font-size:28px;
}

p{
color:#cbd5e1;
line-height:1.5;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#020617;
color:white;
margin-top:10px;
margin-bottom:14px;
box-sizing:border-box;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:8px;
}

.secondary{
background:#1f2937;
}

.badge{
display:inline-block;
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
margin-top:6px;
}

.pending{ background:#f59e0b; color:#111827; }
.approved{ background:#16a34a; }
.rejected{ background:#dc2626; }
.neutral{ background:#334155; }

.small{
font-size:13px;
color:#94a3b8;
margin-top:8px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>🚗 Driver Verification</h1>
<p>
Drivers must submit verification before going online.
Admin must approve before receiving rides, food, or grocery deliveries.
</p>
</div>

<div class="card">

<input id="name" placeholder="Full legal name" />
<input id="email" placeholder="Driver email" />
<input id="phone" placeholder="Phone number" />
<input id="licenseNumber" placeholder="Driver license number" />
<input id="vehicleInfo" placeholder="Vehicle info (year, make, model)" />
<input id="selfie" placeholder="Selfie image URL or note" />
<input id="licenseImage" placeholder="License image URL or note" />
<input id="vehicleDocument" placeholder="Insurance / registration URL or note" />

<button onclick="submitVerification()">Submit Driver Verification</button>
<button class="secondary" onclick="checkStatus()">Check My Status</button>

<div class="small">
Use same email used for driver account
</div>

</div>

<div class="card">
<div><strong>Status:</strong></div>
<div id="statusBadge" class="badge neutral">Not checked</div>
<div id="statusText" class="small">
Submit verification then admin can approve.
</div>
</div>

</div>

<script>

function setStatus(status, text){

const badge = document.getElementById('statusBadge')
const label = String(status || '').toLowerCase()

badge.className = 'badge neutral'

if(label.includes('approved')) badge.className='badge approved'
else if(label.includes('pending')) badge.className='badge pending'
else if(label.includes('rejected')) badge.className='badge rejected'

badge.textContent = status || 'unknown'
document.getElementById('statusText').textContent = text || ''

}

async function submitVerification(){

const payload = {
name:document.getElementById('name').value,
email:document.getElementById('email').value,
phone:document.getElementById('phone').value,
licenseNumber:document.getElementById('licenseNumber').value,
vehicleInfo:document.getElementById('vehicleInfo').value,
selfie:document.getElementById('selfie').value,
licenseImage:document.getElementById('licenseImage').value,
vehicleDocument:document.getElementById('vehicleDocument').value
}

if(!payload.email){
alert("Enter driver email")
return
}

try{

const res = await fetch('/api/driver/verification',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(payload)
})

const data = await res.json()

if(!res.ok){
alert(data.error || "Verification failed")
return
}

setStatus(
data.status || "pending",
"Verification submitted. Waiting for admin approval."
)

alert("Driver verification submitted")

}catch(e){
alert("Server error submitting verification")
}

}

async function checkStatus(){

const email = document.getElementById('email').value

if(!email){
alert("Enter your email first")
return
}

try{

const res = await fetch('/api/driver/verification-status?email='+email)
const data = await res.json()

setStatus(
data.status || "pending",
data.message || "Waiting for admin approval"
)

}catch(e){
alert("Unable to check status")
}

}

</script>

</body>
</html>
