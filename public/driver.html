<!DOCTYPE html>
<html>
<head>
<title>Driver Dashboard</title>

<style>
body{
font-family:Arial;
background:#02123d;
color:white;
padding:20px;
}

.card{
background:#0c1f5c;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
font-weight:bold;
}

.accept{background:#00cc66;}
.start{background:#3399ff;}
.complete{background:#ffaa00;}
</style>

</head>
<body>

<h2>Driver Dashboard</h2>

<div id="rides"></div>

<script>

const driverId = localStorage.getItem("driverId")

async function loadRides(){
const res = await fetch("/api/service-requests")
const data = await res.json()

const pending = data.requests.filter(r =>
!r.driverId || r.driverId === driverId
)

document.getElementById("rides").innerHTML =
pending.map(r=>`

<div class="card">

<b>${r.pickup}</b><br>
To: ${r.dropoff}<br>
Status: ${r.status}

<br><br>

<button class="accept"
onclick="accept('${r.id}')">
Accept
</button>

<button class="start"
onclick="start('${r.id}')">
Start
</button>

<button class="complete"
onclick="complete('${r.id}')">
Complete
</button>

</div>

`).join("")
}

async function accept(id){
await fetch("/api/driver/accept",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
rideId:id,
driverId:driverId
})
})
loadRides()
}

async function start(id){
await fetch("/api/driver/start",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({rideId:id})
})
loadRides()
}

async function complete(id){
await fetch("/api/driver/complete",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({rideId:id})
})
loadRides()
}

loadRides()
setInterval(loadRides,3000)

</script>

</body>
</html>
