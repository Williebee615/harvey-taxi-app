<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi Driver</title>
  <style>
    body{
      background:#000;
      color:#fff;
      font-family:Arial, sans-serif;
      padding:20px;
      margin:0;
    }
    .app{max-width:700px;margin:0 auto}
    .title{
      font-size:34px;
      font-weight:bold;
      margin:18px 0 24px;
    }
    .card{
      background:#0a0a0a;
      border-radius:24px;
      padding:20px;
      margin-bottom:18px;
    }
    select, button{
      width:100%;
      padding:16px;
      margin-top:12px;
      border:none;
      border-radius:18px;
      font-size:16px;
    }
    select{
      background:#111;
      color:#fff;
    }
    button{
      background:#22c55e;
      color:#fff;
      font-weight:bold;
    }
    button.off{
      background:#1f1f1f;
      border:1px solid #333;
    }
    .status{
      margin-top:14px;
      padding:14px;
      background:#111;
      border-radius:16px;
      color:#d1d5db;
    }
    .ride-box{
      margin-top:16px;
      padding:16px;
      background:#111;
      border-radius:16px;
      border:1px solid #222;
    }
    .small{
      color:#aaa;
      margin-top:6px;
      font-size:14px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">Driver Panel</div>

    <div class="card">
      <h2>Select Driver</h2>
      <select id="driverId"></select>
      <button onclick="goOnline()">Go Online</button>
      <button class="off" onclick="goOffline()">Go Offline</button>
      <div class="status" id="driverStatus">Driver system ready.</div>
    </div>

    <div class="card">
      <h2>Current Ride</h2>
      <button class="off" onclick="loadCurrentRide()">Refresh Current Ride</button>
      <div id="rideArea" class="status">No active ride loaded.</div>
    </div>

    <div class="card">
      <button class="off" onclick="window.location.href='/'">Back to Rider App</button>
    </div>
  </div>

  <script>
    let currentRide = null

    async function loadDrivers() {
      const res = await fetch('/api/drivers')
      const drivers = await res.json()
      const select = document.getElementById('driverId')

      select.innerHTML = drivers.map(driver => `
        <option value="${driver.id}">
          ${driver.name} - ${driver.car} (${driver.online ? 'Online' : 'Offline'}${driver.busy ? ', Busy' : ''})
        </option>
      `).join('')
    }

    async function goOnline() {
      const id = document.getElementById('driverId').value
      const res = await fetch('/api/drivers/go-online', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          id,
          lat: 36.1627 + Math.random() * 0.02,
          lng: -86.7816 + Math.random() * 0.02
        })
      })
      const data = await res.json()
      document.getElementById('driverStatus').innerHTML = data.message || data.error || 'Driver online.'
      loadDrivers()
      loadCurrentRide()
    }

    async function goOffline() {
      const id = document.getElementById('driverId').value
      const res = await fetch('/api/drivers/go-offline', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      })
      const data = await res.json()
      document.getElementById('driverStatus').innerHTML = data.message || data.error || 'Driver offline.'
      loadDrivers()
      loadCurrentRide()
    }

    function renderRide(ride) {
      const rideArea = document.getElementById('rideArea')

      if (!ride) {
        currentRide = null
        rideArea.innerHTML = 'No active ride for this driver.'
        return
      }

      currentRide = ride

      rideArea.innerHTML = `
        <div class="ride-box">
          <div><strong>Ride ID:</strong> ${ride.id}</div>
          <div class="small"><strong>Pickup:</strong> ${ride.pickup}</div>
          <div class="small"><strong>Dropoff:</strong> ${ride.dropoff}</div>
          <div class="small"><strong>Type:</strong> ${ride.rideType}</div>
          <div class="small"><strong>Status:</strong> ${ride.status}</div>
          <div class="small"><strong>ETA:</strong> ${ride.etaLabel}</div>
          <button onclick="updateRideStatus('accepted')">Accept Ride</button>
          <button onclick="updateRideStatus('arriving')">Mark Arriving</button>
          <button onclick="updateRideStatus('arrived')">Mark Arrived</button>
          <button onclick="updateRideStatus('in_progress')">Start Trip</button>
          <button onclick="updateRideStatus('completed')">Complete Trip</button>
        </div>
      `
    }

    async function loadCurrentRide() {
      const driverId = document.getElementById('driverId').value
      if (!driverId) return

      const res = await fetch(`/api/drivers/${driverId}/current-ride`)
      const data = await res.json()
      renderRide(data.ride)
    }

    async function updateRideStatus(status) {
      if (!currentRide) return

      const res = await fetch(`/api/rides/${currentRide.id}/status`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      })

      const data = await res.json()
      document.getElementById('driverStatus').innerHTML = data.message || data.error || 'Ride updated.'
      loadDrivers()
      loadCurrentRide()
    }

    document.getElementById('driverId').addEventListener('change', loadCurrentRide)

    loadDrivers().then(() => {
      setTimeout(loadCurrentRide, 300)
    })
  </script>
</body>
</html>
