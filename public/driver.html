<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#000;
color:white;
font-family:Arial;
padding:20px;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border-radius:10px;
border:none;
background:#1db954;
color:white;
font-weight:bold;
}

.job{
background:#111;
padding:15px;
border-radius:12px;
margin-top:15px;
}

.type{
font-size:18px;
font-weight:bold;
}

.small{
opacity:.7;
font-size:14px;
margin-top:5px;
}
</style>
</head>

<body>

<h2>Driver Dashboard</h2>

<button onclick="goOnline()">Go Online</button>

<div id="jobs"></div>

<script>

let driver = {
id: Math.random().toString(36).substr(2,9),
available:false,
services:["ride","food","grocery","package"]
}

function goOnline(){

driver.available = true

navigator.geolocation.watchPosition(pos=>{

driver.lat = pos.coords.latitude
driver.lng = pos.coords.longitude

fetch('/driver/update',{
method:"POST",
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify(driver)
})

loadJobs()

})

}

function loadJobs(){

fetch('/driver/jobs/'+driver.id)
.then(r=>r.json())
.then(data=>{

let html = ""

data.forEach(job=>{

html += `
<div class="job">

<div class="type">
${getType(job.type)}
</div>

<div class="small">
Pickup Incoming
</div>

<button onclick="accept('${job.id}')">
Accept Job
</button>

</div>
`

})

document.getElementById('jobs').innerHTML = html

})

}

function getType(type){

if(type=="ride") return "🚕 Ride Request"
if(type=="food") return "🍔 Food Delivery"
if(type=="grocery") return "🛒 Grocery Delivery"
if(type=="package") return "📦 Package Delivery"

}

function accept(id){
alert("Job Accepted")
}

</script>

</body>
</html>
