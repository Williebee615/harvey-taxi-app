<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#000;
color:white;
font-family:Arial;
padding:20px;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border-radius:10px;
border:none;
background:#1db954;
color:white;
}
</style>
</head>

<body>

<h2>Driver Dashboard</h2>

<button onclick="goOnline()">Go Online</button>

<div id="jobs"></div>

<script>

let driver = {
id: Math.random().toString(36).substr(2,9),
available:false,
services:["ride","food","grocery","package"]
}

function goOnline(){

driver.available = true

navigator.geolocation.watchPosition(pos=>{

driver.lat = pos.coords.latitude
driver.lng = pos.coords.longitude

fetch('/driver/update',{
method:"POST",
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify(driver)
})

loadJobs()

})

}

function loadJobs(){

fetch('/driver/jobs/'+driver.id)
.then(r=>r.json())
.then(data=>{

document.getElementById('jobs').innerHTML =
JSON.stringify(data,null,2)

})

}

</script>

</body>
</html>
