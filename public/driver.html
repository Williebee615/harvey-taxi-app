<!DOCTYPE html>
<html>
<head>
  <title>Driver Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f4f4;
      margin: 0;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 34px;
    }

    h2 {
      font-size: 24px;
      margin-top: 0;
    }

    button {
      padding: 14px;
      margin-top: 10px;
      background: black;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
    }

    .card {
      background: white;
      padding: 16px;
      margin-top: 14px;
      border-radius: 16px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 16px;
      margin-bottom: 12px;
      border: 2px solid #d8d8d8;
      border-radius: 14px;
      font-size: 16px;
      background: #fff;
    }

    .status {
      margin-top: 10px;
      padding: 8px 14px;
      background: #eee;
      border-radius: 999px;
      display: inline-block;
      font-weight: bold;
    }

    .done {
      color: green;
      font-weight: bold;
      margin-top: 10px;
    }

    .error {
      color: red;
      font-weight: bold;
      margin-top: 12px;
    }

    .muted {
      color: #666;
      font-size: 14px;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<h1>🚖 Driver Dashboard</h1>

<div class="card">
  <h2>Driver Sign Up</h2>
  <input id="signupName" type="text" placeholder="Full name" />
  <input id="signupEmail" type="email" placeholder="Email" />
  <input id="signupPassword" type="password" placeholder="Password" />
  <input id="signupCarType" type="text" placeholder="Car type (Standard, XL, etc.)" />
  <button onclick="driverSignup()">Create Driver Account</button>
</div>

<div class="card">
  <h2>Driver Login</h2>
  <input id="loginEmail" type="email" placeholder="Email" />
  <input id="loginPassword" type="password" placeholder="Password" />
  <button onclick="driverLogin()">Login as Driver</button>
  <div id="authStatus" class="muted"></div>
</div>

<button onclick="loadRides()">Refresh Ride Requests</button>
<div id="error" class="error"></div>
<div id="rides"></div>

<script>
let currentDriver = null

async function driverSignup() {
  const name = document.getElementById('signupName').value.trim()
  const email = document.getElementById('signupEmail').value.trim()
  const password = document.getElementById('signupPassword').value.trim()
  const carType = document.getElementById('signupCarType').value.trim()
  const errorBox = document.getElementById('error')
  const authStatus = document.getElementById('authStatus')

  errorBox.textContent = ''
  authStatus.textContent = ''

  try {
    const res = await fetch('/api/driver/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password, carType })
    })

    const data = await res.json()

    if (!res.ok) {
      errorBox.textContent = data.error || 'Driver signup failed'
      return
    }

    authStatus.textContent = `Driver account created for ${data.driver.name}. Waiting for admin approval.`
  } catch (err) {
    errorBox.textContent = 'Driver signup failed'
  }
}

async function driverLogin() {
  const email = document.getElementById('loginEmail').value.trim()
  const password = document.getElementById('loginPassword').value.trim()
  const errorBox = document.getElementById('error')
  const authStatus = document.getElementById('authStatus')

  errorBox.textContent = ''
  authStatus.textContent = ''

  try {
    const res = await fetch('/api/driver/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    })

    const data = await res.json()

    if (!res.ok) {
      errorBox.textContent = data.error || 'Driver login failed'
      return
    }

    currentDriver = data.driver
    authStatus.textContent = `Logged in as ${data.driver.name} (${data.driver.id})`

    await fetch('/api/driver/location', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        driverId: currentDriver.id,
        lat: 36.1627,
        lng: -86.7816
      })
    })

    loadRides()
  } catch (err) {
    errorBox.textContent = 'Driver login failed'
  }
}

async function acceptRide(id) {
  const errorBox = document.getElementById('error')
  errorBox.textContent = ''

  if (!currentDriver) {
    errorBox.textContent = 'Please log in as a driver first.'
    return
  }

  try {
    const res = await fetch(`/api/rides/${id}/accept`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ driverId: currentDriver.id })
    })

    const data = await res.json()

    if (!res.ok) {
      errorBox.textContent = data.error || 'Failed to accept ride'
      return
    }

    alert(`Ride ${id} accepted`)
    loadRides()
  } catch (err) {
    errorBox.textContent = 'Failed to accept ride'
  }
}

async function loadRides() {
  const container = document.getElementById('rides')
  const errorBox = document.getElementById('error')
  errorBox.textContent = ''
  container.innerHTML = 'Loading...'

  try {
    const res = await fetch('/api/rides')
    const rides = await res.json()

    container.innerHTML = ''

    if (!rides.length) {
      container.innerHTML = '<div class="card">No ride requests yet.</div>'
      return
    }

    rides.forEach(ride => {
      const div = document.createElement('div')
      div.className = 'card'

      div.innerHTML = `
        <div><strong>Ride ID:</strong> ${ride.id}</div>
        <div><strong>Rider:</strong> ${ride.riderId}</div>
        <div><strong>Pickup:</strong> ${ride.pickup.name}</div>
        <div><strong>Dropoff:</strong> ${ride.dropoff.name}</div>
        <div><strong>Ride Type:</strong> ${ride.rideType}</div>
        <div><strong>Status:</strong> ${ride.status}</div>
        <div class="status">${ride.status}</div>
        ${
          ride.status === 'matched'
            ? `<button onclick="acceptRide(${ride.id})">Accept Ride</button>`
            : ''
        }
        ${
          ride.status === 'completed'
            ? `<div class="done">Ride Completed ✅</div>`
            : ''
        }
      `

      container.appendChild(div)
    })
  } catch (err) {
    errorBox.textContent = 'Failed to load rides'
  }
}

loadRides()
</script>

</body>
</html>
