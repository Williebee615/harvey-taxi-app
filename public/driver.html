<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi Driver</title>
  <style>
    body{
      background:#000;
      color:#fff;
      font-family:Arial, sans-serif;
      padding:20px;
      margin:0;
    }
    .app{
      max-width:700px;
      margin:0 auto;
    }
    .title{
      font-size:34px;
      font-weight:bold;
      margin:18px 0 24px;
    }
    .card{
      background:#0a0a0a;
      border-radius:24px;
      padding:20px;
      margin-bottom:18px;
    }
    select, button{
      width:100%;
      padding:16px;
      margin-top:12px;
      border:none;
      border-radius:18px;
      font-size:16px;
    }
    select{
      background:#111;
      color:#fff;
    }
    button{
      background:#22c55e;
      color:#fff;
      font-weight:bold;
    }
    button.off{
      background:#1f1f1f;
      border:1px solid #333;
    }
    .status{
      margin-top:14px;
      padding:14px;
      background:#111;
      border-radius:16px;
      color:#d1d5db;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">Driver Panel</div>

    <div class="card">
      <h2>Select Driver</h2>
      <select id="driverId"></select>
      <button onclick="goOnline()">Go Online</button>
      <button class="off" onclick="goOffline()">Go Offline</button>
      <div class="status" id="driverStatus">Driver system ready.</div>
    </div>

    <div class="card">
      <button class="off" onclick="window.location.href='/'">Back to Rider App</button>
    </div>
  </div>

  <script>
    async function loadDrivers() {
      const res = await fetch('/api/drivers')
      const drivers = await res.json()
      const select = document.getElementById('driverId')

      select.innerHTML = drivers.map(driver => `
        <option value="${driver.id}">
          ${driver.name} - ${driver.car} (${driver.online ? 'Online' : 'Offline'}${driver.busy ? ', Busy' : ''})
        </option>
      `).join('')
    }

    async function goOnline() {
      const id = document.getElementById('driverId').value
      const res = await fetch('/api/drivers/go-online', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          id,
          lat: 36.1627 + Math.random() * 0.02,
          lng: -86.7816 + Math.random() * 0.02
        })
      })
      const data = await res.json()
      document.getElementById('driverStatus').innerHTML = data.message || 'Driver online.'
      loadDrivers()
    }

    async function goOffline() {
      const id = document.getElementById('driverId').value
      const res = await fetch('/api/drivers/go-offline', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      })
      const data = await res.json()
      document.getElementById('driverStatus').innerHTML = data.message || 'Driver offline.'
      loadDrivers()
    }

    loadDrivers()
  </script>
</body>
</html>
