<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Driver Dashboard</title>

<style>
body{
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif;
  padding:20px;
  margin:0;
}

.container{
  max-width:420px;
  margin:0 auto;
}

h1{
  font-size:32px;
  margin:10px 0 20px;
}

.card{
  background:#0b0f1c;
  border-radius:20px;
  padding:20px;
  margin-bottom:16px;
  line-height:1.6;
}

.status-pill{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  background:#1f2937;
  font-size:14px;
  font-weight:bold;
  margin-top:8px;
}

.online{
  background:#123b24;
  color:#7df0a6;
}

.offline{
  background:#3a1616;
  color:#ff9b9b;
}

button{
  width:100%;
  padding:18px;
  border:none;
  border-radius:18px;
  font-size:18px;
  font-weight:bold;
  margin-top:12px;
}

.primary{
  background:#39d273;
  color:#fff;
}

.secondary{
  background:#2b313f;
  color:#fff;
}

.warning{
  background:#8b5e10;
  color:#fff;
}

.danger{
  background:#8b1e1e;
  color:#fff;
}

.muted{
  color:#cfcfcf;
  font-size:15px;
}

.label{
  color:#9ca3af;
}

.big{
  font-size:22px;
  font-weight:bold;
}

.hidden{
  display:none;
}
</style>
</head>
<body>
<div class="container">
  <h1>Driver Dashboard</h1>

  <div class="card">
    <div class="big" id="driverName">Marcus Johnson</div>
    <div id="driverVehicle">Toyota Camry • HTX-101</div>
    <div class="muted" id="driverPhone">615-555-0101</div>
    <div id="onlineBadge" class="status-pill online">Online</div>

    <button id="toggleOnlineBtn" class="secondary" onclick="toggleOnlineStatus()">Go Offline</button>
  </div>

  <div class="card">
    <div class="big">Driver Live Status</div>
    <div><span class="label">Current status:</span> <span id="driverStatus">Waiting for ride</span></div>
    <div><span class="label">Current location:</span> <span id="driverLocation">36.162700, -86.781600</span></div>
    <div><span class="label">Assigned ride:</span> <span id="assignedRide">None</span></div>
  </div>

  <div class="card">
    <div class="big">Assigned Ride</div>
    <div id="rideDetails" class="muted">No active ride yet.</div>

    <button id="acceptBtn" class="primary hidden" onclick="acceptRide()">Accept Ride</button>
    <button id="arriveBtn" class="warning hidden" onclick="arriveRide()">Arrived</button>
    <button id="startBtn" class="secondary hidden" onclick="startTrip()">Start Trip</button>
    <button id="completeBtn" class="primary hidden" onclick="completeTrip()">Complete Trip</button>
    <button id="refreshBtn" class="secondary" onclick="loadAssignedRide()">Refresh Ride</button>
  </div>

  <div class="card">
    <div class="big">System Message</div>
    <div id="messageBox" class="muted">Driver panel ready.</div>
  </div>
</div>

<script>
const DRIVER_ID = 'driver_1'
let currentRide = null
let pollTimer = null
let driverOnline = true

async function loadDriver(){
  try{
    const res = await fetch('/drivers')
    const data = await res.json()

    if(!data.success || !Array.isArray(data.drivers)) return

    const driver = data.drivers.find(d => d.id === DRIVER_ID)
    if(!driver) return

    document.getElementById('driverName').textContent = driver.name || 'Driver'
    document.getElementById('driverVehicle').textContent = `${driver.vehicle || 'Vehicle'} • ${driver.plate || ''}`
    document.getElementById('driverPhone').textContent = driver.phone || ''
    document.getElementById('driverLocation').textContent = `${Number(driver.lat).toFixed(6)}, ${Number(driver.lng).toFixed(6)}`

    driverOnline = !!driver.online
    updateOnlineUi()
  }catch(e){
    setMessage('Could not load driver profile.')
  }
}

function updateOnlineUi(){
  const badge = document.getElementById('onlineBadge')
  const btn = document.getElementById('toggleOnlineBtn')

  if(driverOnline){
    badge.textContent = 'Online'
    badge.className = 'status-pill online'
    btn.textContent = 'Go Offline'
  }else{
    badge.textContent = 'Offline'
    badge.className = 'status-pill offline'
    btn.textContent = 'Go Online'
  }
}

async function toggleOnlineStatus(){
  try{
    const res = await fetch('/driver/update',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        id: DRIVER_ID,
        online: !driverOnline
      })
    })

    const data = await res.json()

    if(!data.success){
      setMessage(data.message || 'Could not update online status.')
      return
    }

    driverOnline = !!data.driver.online
    updateOnlineUi()
    setMessage(driverOnline ? 'Driver is now online.' : 'Driver is now offline.')
    loadDriver()
  }catch(e){
    setMessage('Failed to change online status.')
  }
}

async function loadAssignedRide(){
  try{
    const res = await fetch('/rides')
    const data = await res.json()

    if(!data.success || !Array.isArray(data.rides)){
      setMessage('Could not load rides.')
      return
    }

    const ride = data.rides.find(r =>
      r.driver &&
      r.driver.id === DRIVER_ID &&
      r.status !== 'completed' &&
      r.status !== 'cancelled'
    )

    currentRide = ride || null
    renderRide()
  }catch(e){
    setMessage('Failed to load assigned ride.')
  }
}

function renderRide(){
  const rideDetails = document.getElementById('rideDetails')
  const assignedRide = document.getElementById('assignedRide')
  const driverStatus = document.getElementById('driverStatus')

  hideActionButtons()

  if(!currentRide){
    rideDetails.innerHTML = 'No active ride yet.'
    assignedRide.textContent = 'None'
    driverStatus.textContent = 'Waiting for ride'
    return
  }

  assignedRide.textContent = currentRide.id
  driverStatus.textContent = currentRide.statusLabel || currentRide.status || 'Active ride'

  rideDetails.innerHTML = `
    <div><span class="label">Ride ID:</span> ${currentRide.id}</div>
    <div><span class="label">Status:</span> ${currentRide.statusLabel || currentRide.status}</div>
    <div><span class="label">Pickup:</span> ${currentRide.pickup || ''}</div>
    <div><span class="label">Dropoff:</span> ${currentRide.dropoff || ''}</div>
    <div><span class="label">Ride Type:</span> ${currentRide.rideType || ''}</div>
    <div><span class="label">Total Fare:</span> $${currentRide.fare?.total || '0.00'}</div>
    <div><span class="label">Remaining Miles:</span> ${currentRide.trip?.remainingMiles ?? '--'}</div>
    <div><span class="label">Passenger ETA View:</span> ${currentRide.driver?.etaMinutes ?? '--'} min</div>
  `

  if(currentRide.status === 'matched'){
    document.getElementById('acceptBtn').classList.remove('hidden')
  }

  if(currentRide.status === 'accepted' || currentRide.status === 'en_route'){
    document.getElementById('arriveBtn').classList.remove('hidden')
  }

  if(currentRide.status === 'arrived'){
    document.getElementById('startBtn').classList.remove('hidden')
  }

  if(currentRide.status === 'in_progress'){
    document.getElementById('completeBtn').classList.remove('hidden')
  }
}

function hideActionButtons(){
  document.getElementById('acceptBtn').classList.add('hidden')
  document.getElementById('arriveBtn').classList.add('hidden')
  document.getElementById('startBtn').classList.add('hidden')
  document.getElementById('completeBtn').classList.add('hidden')
}

function setMessage(message){
  document.getElementById('messageBox').textContent = message
}

async function acceptRide(){
  if(!currentRide) return

  try{
    const res = await fetch(`/rides/${currentRide.id}/accept`, {
      method:'POST'
    })
    const data = await res.json()

    if(!data.success){
      setMessage(data.message || 'Could not accept ride.')
      return
    }

    currentRide = data.ride
    renderRide()
    setMessage('Ride accepted.')
  }catch(e){
    setMessage('Failed to accept ride.')
  }
}

async function arriveRide(){
  if(!currentRide) return

  try{
    const res = await fetch(`/rides/${currentRide.id}/arrive`, {
      method:'POST'
    })
    const data = await res.json()

    if(!data.success){
      setMessage(data.message || 'Could not mark arrival.')
      return
    }

    currentRide = data.ride
    renderRide()
    setMessage('Driver marked as arrived.')
    await loadDriver()
  }catch(e){
    setMessage('Failed to mark arrival.')
  }
}

async function startTrip(){
  if(!currentRide) return

  try{
    const res = await fetch(`/rides/${currentRide.id}/start`, {
      method:'POST'
    })
    const data = await res.json()

    if(!data.success){
      setMessage(data.message || 'Could not start trip.')
      return
    }

    currentRide = data.ride
    renderRide()
    setMessage('Trip started.')
  }catch(e){
    setMessage('Failed to start trip.')
  }
}

async function completeTrip(){
  if(!currentRide) return

  try{
    const res = await fetch(`/rides/${currentRide.id}/complete`, {
      method:'POST'
    })
    const data = await res.json()

    if(!data.success){
      setMessage(data.message || 'Could not complete trip.')
      return
    }

    currentRide = data.ride
    renderRide()
    setMessage('Trip completed.')
    await loadDriver()
    await loadAssignedRide()
  }catch(e){
    setMessage('Failed to complete trip.')
  }
}

async function pollRide(){
  if(!currentRide || !currentRide.id) return

  try{
    const res = await fetch(`/rides/${currentRide.id}`)
    const data = await res.json()

    if(!data.success){
      return
    }

    currentRide = data.ride
    renderRide()
  }catch(e){
  }
}

function startPolling(){
  stopPolling()
  pollTimer = setInterval(async () => {
    await loadDriver()
    await loadAssignedRide()
    await pollRide()
  }, 4000)
}

function stopPolling(){
  if(pollTimer){
    clearInterval(pollTimer)
    pollTimer = null
  }
}

async function init(){
  await loadDriver()
  await loadAssignedRide()
  startPolling()
}

init()
</script>
</body>
</html>
