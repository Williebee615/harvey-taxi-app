<!DOCTYPE html>
<html>
<head>
  <title>Driver Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f4f4f4;
      margin: 0;
    }

    h1 {
      margin-bottom: 10px;
    }

    button {
      padding: 12px 16px;
      margin-top: 10px;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-top: 12px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .empty {
      margin-top: 20px;
      color: #666;
    }

    .accepted {
      color: green;
      font-weight: bold;
      margin-top: 8px;
    }

    .status {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: bold;
      background: #eee;
      margin-top: 6px;
    }
  </style>
</head>
<body>

<h1>🚖 Driver Dashboard</h1>
<button onclick="loadRides()">Refresh Ride Requests</button>

<div id="rides"></div>

<script>
const DRIVER_ID = 'driver1'

async function acceptRide(rideId) {
  try {
    const res = await fetch(`/api/rides/${rideId}/accept`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ driverId: DRIVER_ID })
    })

    const data = await res.json()

    if (!res.ok) {
      alert(data.error || 'Failed to accept ride')
      return
    }

    alert(`Ride ${rideId} accepted`)
    loadRides()
  } catch (err) {
    alert('Failed to accept ride')
  }
}

async function updateStatus(rideId, status) {
  try {
    const res = await fetch(`/api/rides/${rideId}/status`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    })

    const data = await res.json()

    if (!res.ok) {
      alert(data.error || 'Failed to update status')
      return
    }

    loadRides()
  } catch (err) {
    alert('Error updating ride')
  }
}

function renderActionButtons(ride) {
  if (ride.status === 'matched') {
    return `<button onclick="acceptRide(${ride.id})">Accept Ride</button>`
  }

  if (ride.status === 'accepted') {
    return `<button onclick="updateStatus(${ride.id}, 'en_route')">Start Trip</button>`
  }

  if (ride.status === 'en_route') {
    return `<button onclick="updateStatus(${ride.id}, 'arrived')">Arrived</button>`
  }

  if (ride.status === 'arrived') {
    return `<button onclick="updateStatus(${ride.id}, 'completed')">Complete Ride</button>`
  }

  return `<div class="accepted">Ride Completed ✅</div>`
}

async function loadRides() {
  const container = document.getElementById('rides')
  container.innerHTML = '<p>Loading rides...</p>'

  try {
    const res = await fetch('/api/rides')
    const rides = await res.json()

    if (!rides.length) {
      container.innerHTML = '<p class="empty">No ride requests yet.</p>'
      return
    }

    container.innerHTML = ''

    rides.forEach(ride => {
      const div = document.createElement('div')
      div.className = 'card'

      div.innerHTML = `
        <div><strong>Ride ID:</strong> ${ride.id}</div>
        <div><strong>Rider ID:</strong> ${ride.riderId}</div>
        <div><strong>Pickup:</strong> ${ride.pickup?.name || ''} ${ride.pickup?.lat}, ${ride.pickup?.lng}</div>
        <div><strong>Dropoff:</strong> ${ride.dropoff?.name || ''} ${ride.dropoff?.lat}, ${ride.dropoff?.lng}</div>
        <div><strong>Ride Type:</strong> ${ride.rideType || 'Standard'}</div>
        <div><strong>Matched Driver:</strong> ${ride.driver ? ride.driver.driverId : 'None yet'}</div>
        <div><strong>Distance:</strong> ${ride.distance !== null ? ride.distance + ' km' : 'N/A'}</div>
        <div class="status">Status: ${ride.status}</div>
        ${ride.acceptedBy ? `<div><strong>Accepted By:</strong> ${ride.acceptedBy}</div>` : ''}
        ${renderActionButtons(ride)}
      `

      container.appendChild(div)
    })
  } catch (err) {
    container.innerHTML = '<p class="empty">Failed to load rides.</p>'
  }
}

loadRides()
</script>

</body>
</html>
