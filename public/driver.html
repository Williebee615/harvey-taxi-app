<!DOCTYPE html>
<html>
<head>
  <title>Driver Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f4f4;
      margin: 0;
    }

    h1 {
      margin-bottom: 10px;
    }

    button {
      padding: 14px;
      margin-top: 10px;
      background: black;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .card {
      background: white;
      padding: 15px;
      margin-top: 12px;
      border-radius: 10px;
    }

    .status {
      margin-top: 8px;
      padding: 6px 12px;
      background: #eee;
      border-radius: 20px;
      display: inline-block;
      font-weight: bold;
    }

    .done {
      color: green;
      font-weight: bold;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<h1>🚖 Driver Dashboard</h1>
<button onclick="loadRides()">Refresh Ride Requests</button>

<div id="rides"></div>

<script>
const DRIVER_ID = "driver1"

async function acceptRide(id) {
  await fetch(`/api/rides/${id}/accept`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ driverId: DRIVER_ID })
  })

  alert("Ride accepted 🚖")
  loadRides()
}

async function loadRides() {
  const container = document.getElementById("rides")
  container.innerHTML = "Loading..."

  const res = await fetch("/api/rides")
  const rides = await res.json()

  container.innerHTML = ""

  rides.forEach(ride => {
    const div = document.createElement("div")
    div.className = "card"

    div.innerHTML = `
      <div><strong>Ride ID:</strong> ${ride.id}</div>
      <div><strong>Rider:</strong> ${ride.riderId}</div>
      <div><strong>Pickup:</strong> ${ride.pickup.name}</div>
      <div><strong>Dropoff:</strong> ${ride.dropoff.name}</div>
      <div><strong>Status:</strong> ${ride.status}</div>
      <div class="status">${ride.status}</div>

      ${
        ride.status === "matched"
          ? `<button onclick="acceptRide(${ride.id})">Accept Ride</button>`
          : ""
      }

      ${
        ride.status === "completed"
          ? `<div class="done">Ride Completed ✅</div>`
          : ""
      }
    `

    container.appendChild(div)
  })
}

loadRides()
</script>

</body>
</html>
