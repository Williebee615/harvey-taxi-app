<!DOCTYPE html>
<html>
<head>
<title>Driver Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
padding:20px;
}

.ride{
background:#020617;
padding:15px;
margin-top:10px;
border-radius:10px;
}

button{
margin-top:10px;
padding:10px;
border:none;
background:#22c55e;
color:white;
border-radius:8px;
}
</style>
</head>

<body>

<h2>Driver Dashboard</h2>

<div id="rides"></div>

<script>

function loadRides(){

fetch('/rides')
.then(res=>res.json())
.then(data=>{

document.getElementById('rides').innerHTML=''

data.forEach(ride=>{

if(ride.status === 'waiting'){

document.getElementById('rides').innerHTML += `
<div class="ride">
Pickup: ${ride.pickup} <br>
Dropoff: ${ride.dropoff} <br>

<button onclick="acceptRide(${ride.id})">
Accept Ride
</button>
</div>
`

}

})

})

}

function acceptRide(id){

fetch('/accept-ride',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({id})
})

}

setInterval(loadRides,2000)

</script>

</body>
</html>
