<!DOCTYPE html>
<html>
<head>
  <title>Driver Console</title>
</head>
<body>
  <h2>Driver Console</h2>

  <button onclick="loadRides()">Refresh</button>

  <div id="rides"></div>

  <script>
    const DRIVER_ID = 'driver_1'
    const DRIVER_NAME = 'Test Driver'

    async function loadRides() {
      const res = await fetch('/api/rides/open')
      const data = await res.json()
      const rides = data.rides || []

      document.getElementById('rides').innerHTML = rides.map(ride => `
        <div style="border:1px solid #ccc;padding:12px;margin:12px 0">
          <strong>${ride.id}</strong><br>
          Rider: ${ride.riderName}<br>
          Pickup: ${ride.pickup}<br>
          Dropoff: ${ride.dropoff}<br>
          Fare: $${ride.fare}<br>
          Status: ${ride.status}<br>
          Driver: ${ride.driverId || 'Unassigned'}<br><br>

          ${ride.status === 'pending'
            ? `<button onclick="acceptRide('${ride.id}')">Accept Ride</button>`
            : ''}

          ${ride.status === 'assigned' && ride.driverId === DRIVER_ID
            ? `<button onclick="markArrived('${ride.id}')">Mark Arrived</button>`
            : ''}

          ${ride.status === 'arrived' && ride.driverId === DRIVER_ID
            ? `<button onclick="markPickedUp('${ride.id}')">Picked Up</button>`
            : ''}

          ${ride.status === 'in_progress' && ride.driverId === DRIVER_ID
            ? `<button onclick="completeRide('${ride.id}')">Complete Ride</button>`
            : ''}

          ${(ride.status === 'assigned' || ride.status === 'arrived' || ride.status === 'in_progress') && ride.driverId === DRIVER_ID
            ? `<button onclick="declineRide('${ride.id}')">Release Ride</button>`
            : ''}
        </div>
      `).join('')
    }

    async function acceptRide(rideId) {
      await fetch('/api/rides/accept', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          rideId,
          driverId: DRIVER_ID,
          driverName: DRIVER_NAME
        })
      })

      loadRides()
    }

    async function declineRide(rideId) {
      await fetch('/api/rides/decline', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rideId })
      })

      loadRides()
    }

    async function markArrived(rideId) {
      await fetch('/api/rides/arrived', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rideId })
      })

      loadRides()
    }

    async function markPickedUp(rideId) {
      await fetch('/api/rides/pickup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rideId })
      })

      loadRides()
    }

    async function completeRide(rideId) {
      await fetch('/api/rides/complete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rideId })
      })

      loadRides()
    }

    loadRides()
  </script>
</body>
</html>
