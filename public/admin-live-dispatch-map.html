<!DOCTYPE html>
<html>
<head>
<title>Harvey Dispatch Control</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
background:#05070d;
color:white;
font-family:Arial;
margin:0;
}

.header{
padding:20px;
font-size:22px;
font-weight:bold;
background:black;
border-bottom:1px solid #111;
}

.map{
height:60vh;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}

.panel{
padding:20px;
}

.card{
background:#0c101c;
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

.button{
background:#00ffa3;
color:black;
padding:10px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
display:inline-block;
}
</style>
</head>

<body>

<div class="header">
Live Dispatch Command Center
</div>

<div class="map" id="map">
Loading fleet map...
</div>

<div class="panel">

<div class="card">
Active Dispatches: <span id="active">0</span>
</div>

<div class="card">
Available Drivers: <span id="drivers">0</span>
</div>

<div class="card">
Autonomous Vehicles: <span id="avs">0</span>
</div>

<div class="button" onclick="refresh()">
Refresh Fleet
</div>

</div>

<script>

async function refresh(){

const res = await fetch('/api/admin/fleet')
const data = await res.json()

document.getElementById('active').innerText = data.active
document.getElementById('drivers').innerText = data.drivers
document.getElementById('avs').innerText = data.avs

document.getElementById('map').innerHTML =
"Live Fleet Tracking Active"
}

refresh()
setInterval(refresh,4000)

</script>

</body>
</html>
