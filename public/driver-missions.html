<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvey Taxi — Driver Missions</title>

<style>
:root{
--bg1:#040814;
--bg2:#091126;
--panel:rgba(10,17,38,.92);
--line:rgba(122,162,255,.16);
--text:#f4f7ff;
--muted:#aab8de;
--blue:#5ea0ff;
--cyan:#63f5ff;
--green:#6dffb3;
--danger:#ff7e97;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:Inter,Arial;
color:var(--text);
min-height:100vh;
background:
radial-gradient(circle at top left, rgba(99,245,255,.12), transparent 26%),
linear-gradient(160deg,var(--bg1),var(--bg2));
}

.shell{
max-width:900px;
margin:auto;
padding:20px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.brand{
font-weight:800;
font-size:1.3rem;
}

.home{
text-decoration:none;
color:white;
border:1px solid var(--line);
padding:8px 14px;
border-radius:999px;
}

.card{
background:var(--panel);
border:1px solid var(--line);
border-radius:20px;
padding:18px;
margin-bottom:16px;
}

.title{
font-weight:800;
margin-bottom:10px;
}

.input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid var(--line);
background:rgba(255,255,255,.04);
color:white;
margin-bottom:10px;
}

.btn{
padding:12px;
border-radius:12px;
border:none;
cursor:pointer;
font-weight:800;
}

.primary{
background:linear-gradient(90deg,var(--blue),var(--cyan));
color:#04121f;
width:100%;
}

.mission{
background:rgba(255,255,255,.03);
border:1px solid var(--line);
border-radius:16px;
padding:14px;
margin-top:12px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.box{
background:rgba(255,255,255,.03);
padding:10px;
border-radius:12px;
border:1px solid var(--line);
}

.k{
font-size:.75rem;
color:var(--muted);
}

.v{
font-weight:700;
margin-top:3px;
}

.actions{
display:flex;
gap:10px;
margin-top:14px;
}

.accept{
flex:1;
background:linear-gradient(90deg,#63f5ff,#6dffb3);
border:none;
padding:12px;
border-radius:12px;
font-weight:800;
cursor:pointer;
}

.decline{
flex:1;
background:rgba(255,255,255,.05);
border:1px solid var(--line);
padding:12px;
border-radius:12px;
font-weight:800;
cursor:pointer;
color:white;
}

</style>
</head>
<body>

<div class="shell">

<div class="top">
<div class="brand">Driver Missions</div>
<a class="home" href="/">Return Home</a>
</div>

<div class="card">
<div class="title">Go Online</div>

<input id="driverId" class="input" placeholder="Driver ID">
<button class="btn primary" onclick="goOnline()">Go Online</button>

</div>

<div id="missions"></div>

</div>

<script>

let currentDriver = null

async function goOnline(){

const driverId = document.getElementById("driverId").value

if(!driverId) return alert("Enter driver ID")

currentDriver = driverId

await fetch("/api/driver/go-online",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
driver_id:driverId,
is_online:true
})
})

loadMissions()

setInterval(loadMissions,4000)

}

async function loadMissions(){

if(!currentDriver) return

const res = await fetch(`/api/driver-missions/${currentDriver}`)
const data = await res.json()

const container = document.getElementById("missions")

container.innerHTML=""

data.missions.forEach(m => {

const el = document.createElement("div")
el.className="mission"

el.innerHTML = `

<div class="title">New Trip Mission</div>

<div><b>${m.pickup_address}</b></div>
<div style="color:#aab8de">${m.dropoff_address}</div>

<div class="grid">

<div class="box">
<div class="k">Passenger</div>
<div class="v">${m.passenger_first_name}</div>
</div>

<div class="box">
<div class="k">Ride Type</div>
<div class="v">${m.ride_type}</div>
</div>

<div class="box">
<div class="k">Distance</div>
<div class="v">${m.estimated_distance_miles} mi</div>
</div>

<div class="box">
<div class="k">Duration</div>
<div class="v">${m.estimated_duration_minutes} min</div>
</div>

<div class="box">
<div class="k">Fare</div>
<div class="v">$${m.estimated_fare}</div>
</div>

<div class="box">
<div class="k">Your Payout</div>
<div class="v">$${m.estimated_driver_payout}</div>
</div>

</div>

<div class="actions">
<button class="accept" onclick="accept('${m.ride_id}')">Accept</button>
<button class="decline" onclick="decline('${m.ride_id}')">Decline</button>
</div>

`

container.appendChild(el)

})

}

async function accept(rideId){

await fetch("/api/driver-missions/accept",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
driver_id:currentDriver,
ride_id:rideId
})
})

alert("Mission accepted")

}

async function decline(rideId){

await fetch("/api/driver-missions/decline",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
driver_id:currentDriver,
ride_id:rideId
})
})

loadMissions()

}

</script>

</body>
</html>
