<!DOCTYPE html>
<html>
<head>
<title>Driver Wallet</title>
</head>

<body>

<h2>Driver Wallet</h2>

<div>
Balance: $<span id="balance">0</span>
</div>

<button onclick="cashout()">
Instant Cash Out
</button>

<script>

const driverId = "driver_1"

async function loadBalance(){

const res = await fetch('/data.json')
const data = await res.json()

const driver = data.drivers.find(d => d.id === driverId)

if(driver && driver.wallet){
document.getElementById('balance').innerText = driver.wallet
}

}

async function cashout(){

alert("Payout sent")

}

loadBalance()

</script>

</body>
</html>
