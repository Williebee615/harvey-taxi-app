<!DOCTYPE html>
<html>
<head>
  <title>Driver Wallet</title>
</head>
<body>
  <h2>Driver Wallet</h2>

  <div>
    Balance: $<span id="balance">0</span>
  </div>

  <button onclick="loadBalance()">Refresh Balance</button>

  <p id="status"></p>

  <script>
    async function loadBalance() {
      try {
        const res = await fetch('/api/driver/wallet/driver_1')
        const data = await res.json()

        document.getElementById('balance').innerText = data.wallet || 0
        document.getElementById('status').innerText =
          'Wallet loaded successfully'
      } catch (error) {
        document.getElementById('status').innerText =
          'Failed to load wallet'
      }
    }

    loadBalance()
  </script>
</body>
</html>
