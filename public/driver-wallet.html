<!DOCTYPE html>
<html>
<head>
  <title>Driver Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <div class="app-header">
      <div class="app-title">Driver Wallet</div>
      <div class="app-subtitle">Track earnings and completed trips</div>
    </div>

    <div class="card">
      <div class="stat-label">Balance</div>
      <div class="stat">$<span id="balance">0</span></div>
    </div>

    <div class="card">
      <div class="stat-label">Total Earnings</div>
      <div class="stat">$<span id="earnings">0</span></div>
    </div>

    <div class="card">
      <div class="stat-label">Total Trips</div>
      <div class="stat"><span id="trips">0</span></div>
    </div>

    <div class="card">
      <button class="button" onclick="loadWallet()">Refresh Balance</button>
      <p class="top-space" id="status"></p>
    </div>
  </div>

  <script>
    async function loadWallet() {
      const res = await fetch('/api/driver/wallet/driver_1')
      const data = await res.json()

      document.getElementById('balance').innerText = data.wallet || 0
      document.getElementById('earnings').innerText = data.totalEarnings || 0
      document.getElementById('trips').innerText = data.totalTrips || 0
      document.getElementById('status').innerText = 'Wallet loaded successfully'
    }

    loadWallet()
  </script>
</body>
</html>
