<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi | Rider Live Trip</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.16), transparent 28%),
        radial-gradient(circle at top right, rgba(16,185,129,0.12), transparent 22%),
        linear-gradient(180deg, #020617 0%, #031133 100%);
      color: white;
      padding: 20px 16px 40px;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 18px;
      color: #cbd5e1;
      text-decoration: none;
      font-size: 18px;
    }

    .card {
      background: rgba(15, 23, 42, 0.94);
      border: 1px solid rgba(59, 130, 246, 0.14);
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .eyebrow {
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 40px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .subtext {
      margin-top: 12px;
      color: #cbd5e1;
      font-size: 15px;
      line-height: 1.6;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.28);
      color: #d1fae5;
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: 700;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #34d399;
      box-shadow: 0 0 12px rgba(52,211,153,0.9);
    }

    .fallback-map {
      width: 100%;
      height: 360px;
      border-radius: 22px;
      background:
        radial-gradient(circle at center, rgba(59,130,246,0.15), transparent 55%),
        #08122f;
      border: 1px solid rgba(59,130,246,0.18);
      position: relative;
      overflow: hidden;
    }

    .road {
      position: absolute;
      left: 9%;
      right: 9%;
      top: 50%;
      height: 5px;
      background: rgba(255,255,255,0.18);
      transform: translateY(-50%);
      border-radius: 999px;
    }

    .road::before {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      top: -7px;
      height: 19px;
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0 18px,
          rgba(255,255,255,0.32) 18px 28px
        );
      opacity: 0.32;
      border-radius: 999px;
    }

    .pin,
    .car {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 24px;
      background: rgba(15,23,42,0.94);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 12px 30px rgba(0,0,0,0.28);
    }

    .pickup-pin { left: 18px; }
    .dropoff-pin { right: 18px; }

    .car {
      left: 22%;
      transition: left 1.1s ease;
      z-index: 2;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .info-box {
      background: #020b28;
      border: 1px solid rgba(148,163,184,0.14);
      border-radius: 18px;
      padding: 16px;
    }

    .label {
      color: #94a3b8;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .value {
      color: #f8fafc;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.35;
    }

    .small {
      font-size: 16px;
      font-weight: 600;
      color: #cbd5e1;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .btn {
      width: 100%;
      padding: 18px;
      border-radius: 18px;
      border: none;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      background: rgba(59,130,246,0.16);
      border: 1px solid rgba(59,130,246,0.24);
      color: #dbeafe;
    }

    .empty {
      text-align: center;
      color: #cbd5e1;
      padding: 28px 10px;
    }

    @media (max-width: 700px) {
      .two-col { grid-template-columns: 1fr; }
      h1 { font-size: 34px; }
      .fallback-map { height: 300px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="/index.html" class="back-link">← Back to Home</a>

    <div class="card">
      <div class="eyebrow">Live Trip Intelligence</div>
      <h1>Rider Live Trip</h1>
      <div class="subtext">
        View your assigned Harvey Taxi unit, route progress, ETA, and trip status in real time.
      </div>
      <div class="status-pill">
        <span class="dot"></span>
        <span id="statusText">Connecting to dispatch...</span>
      </div>
    </div>

    <div class="card">
      <div class="eyebrow">Real Map View</div>
      <div class="fallback-map">
        <div class="road"></div>
        <div class="pin pickup-pin">📍</div>
        <div class="pin dropoff-pin">🏁</div>
        <div class="car" id="carIcon">🚕</div>
      </div>
    </div>

    <div id="contentArea" class="grid">
      <div class="card empty">Loading trip...</div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search)
    const rideId = params.get('ride_id')

    let currentRide = null
    let stepTimer = null

    function humanizeStatus(status) {
      if (!status) return 'Unknown'
      return status.replace(/_/g, ' ')
    }

    function etaForStatus(status) {
      if (status === 'driver_assigned' || status === 'assigned') return '6 min'
      if (status === 'arriving') return '3 min'
      if (status === 'in_progress') return 'On trip'
      if (status === 'completed') return 'Arrived'
      return 'Live'
    }

    function getProgress(status) {
      if (status === 'driver_assigned' || status === 'assigned') return '28%'
      if (status === 'accepted') return '40%'
      if (status === 'arriving') return '58%'
      if (status === 'in_progress') return '78%'
      if (status === 'completed') return '90%'
      return '22%'
    }

    function moveCar(status) {
      const car = document.getElementById('carIcon')
      car.style.left = getProgress(status)
    }

    function renderTrip() {
      const box = document.getElementById('contentArea')

      if (!currentRide) {
        box.innerHTML = '<div class="card empty">Trip not found.</div>'
        return
      }

      document.getElementById('statusText').textContent = humanizeStatus(currentRide.status)
      moveCar(currentRide.status)

      box.innerHTML = `
        <div class="two-col">
          <div class="info-box">
            <div class="label">Ride Status</div>
            <div class="value">${humanizeStatus(currentRide.status)}</div>
            <div class="small">ETA: ${etaForStatus(currentRide.status)}</div>
          </div>

          <div class="info-box">
            <div class="label">Estimated Fare</div>
            <div class="value">$${currentRide.estimated_fare || '0.00'}</div>
            <div class="small">Ride ID: ${currentRide.id}</div>
          </div>
        </div>

        <div class="info-box">
          <div class="label">Assigned Driver</div>
          <div class="value">${currentRide.assigned_driver?.name || 'Nearest Driver'}</div>
          <div class="small">
            ${(currentRide.assigned_driver?.type || 'human')} · ${(currentRide.assigned_driver?.vehicle_type || 'sedan')}
          </div>
        </div>

        <div class="info-box">
          <div class="label">Pickup</div>
          <div class="value">${currentRide.pickup_address || '--'}</div>
        </div>

        <div class="info-box">
          <div class="label">Dropoff</div>
          <div class="value">${currentRide.dropoff_address || '--'}</div>
        </div>

        <button class="btn" onclick="refreshTrip()">Refresh Live Trip</button>
      `
    }

    function simulateProgress() {
      if (!currentRide) return

      const sequence = ['driver_assigned', 'arriving', 'in_progress', 'completed']
      let idx = sequence.indexOf(currentRide.status)
      if (idx === -1) idx = 0

      if (stepTimer) clearInterval(stepTimer)

      stepTimer = setInterval(() => {
        if (idx < sequence.length - 1) {
          idx += 1
          currentRide.status = sequence[idx]
          renderTrip()
        } else {
          clearInterval(stepTimer)
        }
      }, 4000)
    }

    async function loadTrip() {
      if (!rideId) {
        document.getElementById('statusText').textContent = 'Missing ride ID'
        document.getElementById('contentArea').innerHTML =
          '<div class="card empty">No ride ID was provided.</div>'
        return
      }

      try {
        const response = await fetch('/api/rides')
        const rides = await response.json()

        const found = Array.isArray(rides)
          ? rides.find(r => String(r.id) === String(rideId))
          : null

        if (!found) {
          document.getElementById('statusText').textContent = 'Trip not found'
          document.getElementById('contentArea').innerHTML =
            '<div class="card empty">Unable to find this trip.</div>'
          return
        }

        currentRide = found
        renderTrip()
        simulateProgress()
      } catch (error) {
        document.getElementById('statusText').textContent = 'Unable to load trip'
        document.getElementById('contentArea').innerHTML =
          '<div class="card empty">Unable to load live trip data.</div>'
      }
    }

    async function refreshTrip() {
      await loadTrip()
    }

    loadTrip()
  </script>
</body>
</html>
