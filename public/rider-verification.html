<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi Rider Sign Up</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body {
      background: #031735;
      color: white;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      max-width: 760px;
      margin: 0 auto;
    }
    .back {
      color: white;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 18px;
      opacity: 0.9;
    }
    .card {
      background: #102552;
      border: 1px solid #28458f;
      border-radius: 24px;
      padding: 26px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }
    p {
      color: #d7e1ff;
      margin-bottom: 22px;
      line-height: 1.5;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    input {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: 1px solid #3257af;
      background: #091a3e;
      color: white;
      font-size: 16px;
      margin-bottom: 14px;
      outline: none;
    }
    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: #356ee8;
      color: white;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
    }
    .status {
      margin-top: 18px;
      background: #091a3e;
      border: 1px solid #3257af;
      border-radius: 14px;
      padding: 16px;
      white-space: pre-line;
      line-height: 1.5;
      color: #d7e1ff;
    }
    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 34px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="/">← Back</a>

    <div class="card">
      <h1>Rider Sign Up</h1>
      <p>Create your Harvey Taxi rider account and add your emergency contact for safer trips.</p>

      <div class="grid">
        <input id="firstName" placeholder="First name" />
        <input id="lastName" placeholder="Last name" />
      </div>

      <input id="email" placeholder="Email address" />
      <input id="phone" placeholder="Phone number" />
      <input id="password" type="password" placeholder="Create password" />

      <div class="grid">
        <input id="emergencyContactName" placeholder="Emergency contact name" />
        <input id="emergencyContactPhone" placeholder="Emergency contact phone" />
      </div>

      <button onclick="signupRider()">Create Rider Account</button>

      <div id="status" class="status">Your rider account has not been created yet.</div>
    </div>
  </div>

  <script>
    async function signupRider() {
      const payload = {
        firstName: document.getElementById('firstName').value.trim(),
        lastName: document.getElementById('lastName').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        password: document.getElementById('password').value.trim(),
        emergencyContactName: document.getElementById('emergencyContactName').value.trim(),
        emergencyContactPhone: document.getElementById('emergencyContactPhone').value.trim()
      }

      const status = document.getElementById('status')
      status.textContent = 'Creating rider account...'

      try {
        const res = await fetch('/api/signup/rider', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })

        const data = await res.json()

        if (!res.ok) {
          status.textContent = data.error || 'Rider signup failed.'
          return
        }

        status.textContent =
`Rider account created successfully.

Name: ${data.rider.name}
Email: ${data.rider.email}
Phone: ${data.rider.phone}
Verification: ${data.rider.verificationStatus}`
      } catch (err) {
        status.textContent = 'Server error. Please try again.'
      }
    }
  </script>
</body>
</html>
