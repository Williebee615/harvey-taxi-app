<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Driver Sign Up</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #07152b;
      color: white;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: #111f3d;
      border: 1px solid #223a72;
      border-radius: 24px;
      padding: 24px;
    }

    h1 {
      margin-top: 0;
    }

    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: #2a6df4;
      color: white;
      font-size: 18px;
      font-weight: bold;
    }

    .status {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: #0d1831;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Driver Sign Up</h1>

      <label>Full Name</label>
      <input id="fullName" placeholder="Enter full name" />

      <label>Phone</label>
      <input id="phone" placeholder="Enter phone number" />

      <label>Email</label>
      <input id="email" placeholder="Enter email" />

      <label>Password</label>
      <input id="password" type="password" placeholder="Create password" />

      <label>Car Make</label>
      <input id="carMake" placeholder="Toyota" />

      <label>Car Model</label>
      <input id="carModel" placeholder="Camry" />

      <label>Car Color</label>
      <input id="carColor" placeholder="Black" />

      <label>Plate Number</label>
      <input id="plateNumber" placeholder="ABC-1234" />

      <button onclick="signupDriver()">Create Driver Account</button>

      <div class="status" id="statusBox">Fill out the form to create a driver account.</div>
    </div>
  </div>

  <script>
    async function signupDriver() {
      const payload = {
        fullName: document.getElementById('fullName').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value.trim(),
        carMake: document.getElementById('carMake').value.trim(),
        carModel: document.getElementById('carModel').value.trim(),
        carColor: document.getElementById('carColor').value.trim(),
        plateNumber: document.getElementById('plateNumber').value.trim()
      }

      const statusBox = document.getElementById('statusBox')
      statusBox.innerText = 'Creating driver account...'

      try {
        const res = await fetch('/api/driver/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })

        const data = await res.json()
        statusBox.innerText = data.message || 'Done.'
      } catch (err) {
        statusBox.innerText = 'Server error. Please try again.'
      }
    }
  </script>
</body>
</html>
