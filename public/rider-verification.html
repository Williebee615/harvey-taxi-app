<!DOCTYPE html>
<html>
<head>
<title>Rider Signup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#020b2d;
color:white;
font-family:Arial;
padding:20px;
}

.card{
background:#07143a;
padding:20px;
border-radius:20px;
}

input{
width:100%;
padding:16px;
margin-top:10px;
margin-bottom:15px;
border-radius:12px;
border:none;
font-size:16px;
}

button{
width:100%;
padding:18px;
background:#55abd0;
color:white;
border:none;
border-radius:14px;
font-size:18px;
font-weight:bold;
}
</style>
</head>

<body>

<h2>Rider Signup</h2>

<div class="card">

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="email" placeholder="Email">

<button onclick="signup()">Create Rider Account</button>

</div>

<script>
function signup(){
fetch('/signup-rider',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
name:document.getElementById('name').value,
phone:document.getElementById('phone').value,
email:document.getElementById('email').value
})
})

alert("Rider account created")
}
</script>

</body>
</html>
