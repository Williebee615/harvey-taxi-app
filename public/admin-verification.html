<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Verification Review</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      color: #111827;
      margin-top: 0;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .files a {
      display: inline-block;
      margin: 6px 10px 6px 0;
      text-decoration: none;
      color: #2563eb;
      font-weight: bold;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button, textarea, input {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      box-sizing: border-box;
    }

    input, textarea {
      width: 100%;
    }

    button {
      cursor: pointer;
      border: none;
      color: white;
      font-weight: bold;
    }

    .approve { background: #15803d; }
    .reject { background: #b91c1c; }
    .secondary {
      background: #111827;
      color: white;
    }

    textarea {
      min-height: 80px;
      margin-top: 10px;
    }

    .status {
      font-weight: bold;
      text-transform: uppercase;
    }

    .hidden {
      display: none;
    }

    .gate-box {
      max-width: 520px;
      margin: 80px auto;
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .message {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      color: #374151;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="gateScreen" class="gate-box">
    <h1>Admin Access</h1>
    <p>Enter your approved admin email to continue.</p>
    <input type="email" id="adminEmail" placeholder="Admin email" />
    <button class="secondary" style="width:100%; margin-top:12px;" onclick="checkAdminAccess()">Enter Admin</button>
    <div id="gateMessage" class="message hidden"></div>
  </div>

  <div id="adminApp" class="container hidden">
    <h1>Admin Verification Review</h1>
    <div id="verificationList"></div>
  </div>

  <script>
    const gateScreen = document.getElementById('gateScreen')
    const adminApp = document.getElementById('adminApp')
    const gateMessage = document.getElementById('gateMessage')
    const adminEmailInput = document.getElementById('adminEmail')

    function showGateMessage(text) {
      gateMessage.classList.remove('hidden')
      gateMessage.textContent = text
    }

    async function checkAdminAccess() {
      const email = adminEmailInput.value.trim()

      if (!email) {
        showGateMessage('Please enter your admin email.')
        return
      }

      try {
        const res = await fetch('/api/admin/access?email=' + encodeURIComponent(email))
        const data = await res.json()

        if (data.success && data.allowed) {
          localStorage.setItem('harvey_admin_email', email)
          gateScreen.classList.add('hidden')
          adminApp.classList.remove('hidden')
          loadVerifications()
        } else {
          showGateMessage('Access denied. This email is not approved for admin access.')
        }
      } catch (error) {
        showGateMessage('Could not verify admin access.')
      }
    }

    async function loadVerifications() {
      const res = await fetch('/api/admin/verifications')
      const data = await res.json()
      const list = document.getElementById('verificationList')

      if (!Array.isArray(data) || !data.length) {
        list.innerHTML = '<div class="card">No driver verification submissions yet.</div>'
        return
      }

      list.innerHTML = data.map(v => `
        <div class="card">
          <div class="grid">
            <div><strong>Name:</strong> ${v.name || '-'}</div>
            <div><strong>Email:</strong> ${v.email || '-'}</div>
            <div><strong>Phone:</strong> ${v.phone || '-'}</div>
            <div><strong>Status:</strong> <span class="status">${v.status || 'pending'}</span></div>
            <div><strong>Submitted:</strong> ${v.submittedAt ? new Date(v.submittedAt).toLocaleString() : '-'}</div>
            <div><strong>Reviewed:</strong> ${v.reviewedAt ? new Date(v.reviewedAt).toLocaleString() : '-'}</div>
          </div>

          <div class="files" style="margin-top:12px;">
            ${v.license ? `<a href="/uploads/${v.license}" target="_blank">License</a>` : ''}
            ${v.selfie ? `<a href="/uploads/${v.selfie}" target="_blank">Selfie</a>` : ''}
            ${v.vehicle ? `<a href="/uploads/${v.vehicle}" target="_blank">Vehicle</a>` : ''}
          </div>

          <div class="actions">
            <button class="approve" onclick="approveDriver('${v.id}')">Approve</button>
            <button class="reject" onclick="rejectDriver('${v.id}')">Reject</button>
          </div>
        </div>
      `).join('')
    }

    async function approveDriver(id) {
      const res = await fetch('/api/admin/approve/' + id, { method: 'POST' })
      const data = await res.json()

      if (data.success) {
        alert('Driver approved')
        loadVerifications()
      } else {
        alert('Could not approve driver')
      }
    }

    async function rejectDriver(id) {
      const res = await fetch('/api/admin/reject/' + id, { method: 'POST' })
      const data = await res.json()

      if (data.success) {
        alert('Driver rejected')
        loadVerifications()
      } else {
        alert('Could not reject driver')
      }
    }

    async function autoAdminLogin() {
      const saved = localStorage.getItem('harvey_admin_email')
      if (!saved) return

      adminEmailInput.value = saved
      await checkAdminAccess()
    }

    autoAdminLogin()
  </script>
</body>
</html>
