<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi | Request Ride</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(16,185,129,0.12), transparent 22%),
        linear-gradient(180deg, #020617 0%, #031133 100%);
      color: white;
      padding: 24px 16px 40px;
    }

    .card {
      max-width: 560px;
      margin: 0 auto;
      background: #0f172a;
      border-radius: 28px;
      padding: 24px 18px;
      border: 1px solid rgba(59,130,246,0.18);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 10px;
      text-align: center;
      font-size: 52px;
      font-weight: 800;
    }

    .sub {
      text-align: center;
      color: #cbd5e1;
      line-height: 1.6;
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin: 16px 0 8px;
      font-size: 18px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 20px 18px;
      border-radius: 20px;
      border: 1px solid rgba(59,130,246,0.18);
      background: #020b28;
      color: white;
      font-size: 18px;
    }

    button {
      width: 100%;
      padding: 20px 18px;
      border: none;
      border-radius: 20px;
      font-size: 22px;
      font-weight: 800;
      margin-top: 18px;
    }

    .secondary {
      background: #4a86f3;
      color: white;
    }

    .primary {
      background: #25c59a;
      color: #03121d;
    }

    .primary:disabled {
      background: #475569;
      color: #cbd5e1;
    }

    .box {
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      background: #020b28;
      white-space: pre-wrap;
      line-height: 1.6;
      border: 1px solid rgba(148,163,184,0.14);
    }

    .warning {
      margin-top: 16px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(239,68,68,0.16);
      color: #fecaca;
      border: 1px solid rgba(239,68,68,0.24);
      line-height: 1.6;
    }

    .good {
      margin-top: 16px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(16,185,129,0.12);
      color: #d1fae5;
      border: 1px solid rgba(16,185,129,0.24);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Request Ride</h1>
    <div class="sub">
      Riders must be verification-approved before trip booking unlocks.
    </div>

    <label>Rider Name</label>
    <input id="rider_name" placeholder="Enter rider name" />

    <label>Rider Phone</label>
    <input id="rider_phone" placeholder="Enter rider phone number" />

    <label>Pickup Address</label>
    <input id="pickup_address" placeholder="500 Broadway, Nashville, TN 37203" />

    <label>Dropoff Address</label>
    <input id="dropoff_address" placeholder="1 Terminal Dr, Nashville, TN 37214" />

    <button class="secondary" onclick="autofill()">Auto Fill Real Test Addresses</button>
    <button id="requestBtn" class="primary" onclick="requestRide()">Request Ride</button>

    <div id="verifyMsg"></div>
    <div id="result" class="box">Loading rider verification...</div>
  </div>

  <script>
    let currentRider = null

    function autofill() {
      document.getElementById('pickup_address').value = '500 Broadway, Nashville, TN 37203'
      document.getElementById('dropoff_address').value = '1 Terminal Dr, Nashville, TN 37214'
    }

    async function loadRiderVerification() {
      const saved = localStorage.getItem('harvey_rider')
      const result = document.getElementById('result')
      const verifyMsg = document.getElementById('verifyMsg')
      const requestBtn = document.getElementById('requestBtn')

      if (!saved) {
        requestBtn.disabled = true
        verifyMsg.className = 'warning'
        verifyMsg.textContent = 'No rider account found. Complete rider signup first.'
        result.textContent = 'Rider signup required.'
        return
      }

      currentRider = JSON.parse(saved)

      document.getElementById('rider_name').value = currentRider.name || ''
      document.getElementById('rider_phone').value = currentRider.phone || ''

      try {
        const res = await fetch('/api/rider/' + currentRider.id)
        const data = await res.json()

        if (!res.ok) {
          requestBtn.disabled = true
          verifyMsg.className = 'warning'
          verifyMsg.textContent = data.error || 'Rider not found.'
          result.textContent = 'Unable to load rider.'
          return
        }

        currentRider = data
        localStorage.setItem('harvey_rider', JSON.stringify(data))

        if (data.verification_status !== 'approved') {
          requestBtn.disabled = true
          verifyMsg.className = 'warning'
          verifyMsg.textContent = 'Verification pending. Ride requests unlock after approval.'
        } else {
          requestBtn.disabled = false
          verifyMsg.className = 'good'
          verifyMsg.textContent = 'Verification approved. Ride requests are unlocked.'
        }

        result.textContent =
`Rider ID: ${data.id}
Verification Status: ${data.verification_status}
Name: ${data.name}
Email: ${data.email || ''}`
      } catch (error) {
        requestBtn.disabled = true
        verifyMsg.className = 'warning'
        verifyMsg.textContent = 'Network error while checking verification.'
        result.textContent = 'Unable to verify rider.'
      }
    }

    async function requestRide() {
      const result = document.getElementById('result')

      if (!currentRider) {
        result.textContent = 'No rider loaded.'
        return
      }

      const rider_name = document.getElementById('rider_name').value.trim()
      const rider_phone = document.getElementById('rider_phone').value.trim()
      const pickup_address = document.getElementById('pickup_address').value.trim()
      const dropoff_address = document.getElementById('dropoff_address').value.trim()

      if (!rider_name || !pickup_address || !dropoff_address) {
        result.textContent = 'rider_name, pickup_address, and dropoff_address are required'
        return
      }

      result.textContent = 'Requesting ride...'

      try {
        const res = await fetch('/api/request-ride', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            rider_id: currentRider.id,
            rider_name,
            rider_phone,
            pickup_address,
            dropoff_address
          })
        })

        const data = await res.json()

        if (!res.ok) {
          result.textContent = data.error || 'Ride request failed.'
          return
        }

        result.textContent = JSON.stringify(data, null, 2)
      } catch (error) {
        result.textContent = 'Network error while requesting ride.'
      }
    }

    loadRiderVerification()
  </script>
</body>
</html>
