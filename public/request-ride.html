<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#020c2b;
color:white;
font-family:Arial;
padding:20px;
}

.back a{
color:white;
text-decoration:none;
}

.box{
background:#081a44;
padding:20px;
border-radius:18px;
margin-top:20px;
}

input{
width:100%;
padding:14px;
margin-top:10px;
border-radius:12px;
border:none;
}

button{
margin-top:15px;
padding:14px;
width:100%;
border:none;
border-radius:12px;
background:#2d6cff;
color:white;
}
</style>
</head>

<body>

<div class="back">
<a href="/">← Back to Home</a>
</div>

<div class="box">
<h1>Request Ride</h1>

<input id="name" placeholder="Name">
<input id="pickup" placeholder="Pickup">
<input id="dropoff" placeholder="Dropoff">

<button onclick="ride()">Request Ride</button>

</div>

<script>

async function ride(){

await fetch('/api/request-ride',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
name:document.getElementById("name").value,
pickup:document.getElementById("pickup").value,
dropoff:document.getElementById("dropoff").value
})
})

alert("Ride requested")

}

</script>

</body>
</html>
