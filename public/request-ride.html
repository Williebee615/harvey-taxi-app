<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi | Request Ride</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(16,185,129,0.12), transparent 22%),
        linear-gradient(180deg, #020617 0%, #031133 100%);
      color: #ffffff;
      padding: 28px 18px 40px;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
    }

    .card {
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(59, 130, 246, 0.14);
      border-radius: 30px;
      padding: 26px 18px 22px;
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 24px;
      text-align: center;
      font-size: 54px;
      line-height: 1;
      letter-spacing: -1px;
      font-weight: 800;
    }

    .subtext {
      margin: -4px 0 22px;
      text-align: center;
      color: #cbd5e1;
      font-size: 15px;
      line-height: 1.5;
    }

    label {
      display: block;
      margin: 18px 0 10px;
      font-size: 18px;
      font-weight: 700;
      color: #f8fafc;
    }

    input {
      width: 100%;
      padding: 20px 18px;
      border-radius: 20px;
      border: 1px solid rgba(59, 130, 246, 0.18);
      background: #020b28;
      color: #ffffff;
      font-size: 18px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: rgba(96, 165, 250, 0.8);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }

    .button {
      width: 100%;
      border: none;
      border-radius: 20px;
      padding: 22px 16px;
      margin-top: 18px;
      font-size: 22px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease;
    }

    .button:active {
      transform: scale(0.99);
    }

    .button.secondary {
      background: #4a86f3;
      color: #ffffff;
    }

    .button.primary {
      background: #25c59a;
      color: #03121d;
    }

    .helper {
      margin: 18px 6px 0;
      color: #cbd5e1;
      font-size: 16px;
      line-height: 1.6;
    }

    .status-box {
      margin-top: 18px;
      background: #020b28;
      border: 1px solid rgba(59, 130, 246, 0.12);
      border-radius: 20px;
      padding: 18px 16px;
      min-height: 96px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 15px;
      line-height: 1.6;
      color: #e2e8f0;
    }

    .status-box.success {
      border-color: rgba(16, 185, 129, 0.45);
      background: rgba(6, 42, 35, 0.82);
      color: #d1fae5;
    }

    .status-box.error {
      border-color: rgba(239, 68, 68, 0.45);
      background: rgba(57, 18, 18, 0.9);
      color: #fecaca;
    }

    .result-grid {
      margin-top: 14px;
      display: grid;
      gap: 12px;
    }

    .result-card {
      background: rgba(15, 23, 42, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 18px;
      padding: 14px;
    }

    .result-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .result-value {
      font-size: 16px;
      color: #f8fafc;
      line-height: 1.5;
    }

    .inline-actions {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .link-btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 700;
      background: rgba(59,130,246,0.16);
      color: #dbeafe;
      border: 1px solid rgba(59,130,246,0.25);
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 44px;
      }

      .button {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Request Ride</h1>
      <div class="subtext">
        Book a ride with full dispatch brain support, hidden coordinates, and address-only passenger experience.
      </div>

      <label for="rider_name">Rider Name</label>
      <input id="rider_name" type="text" placeholder="Enter rider name" />

      <label for="rider_phone">Rider Phone</label>
      <input id="rider_phone" type="text" placeholder="Enter rider phone number" />

      <label for="pickup">Pickup Address</label>
      <input id="pickup" type="text" placeholder="500 Broadway, Nashville, TN 37203" />

      <label for="dropoff">Dropoff Address</label>
      <input id="dropoff" type="text" placeholder="1 Terminal Dr, Nashville, TN 37214" />

      <button class="button secondary" onclick="autofillRide()">
        Auto Fill Real Test Addresses
      </button>

      <button class="button primary" onclick="requestRide()">
        Request Ride
      </button>

      <div class="helper">
        Riders only see addresses. Hidden coordinates are generated internally for dispatch, routing, and nearest-unit assignment.
      </div>

      <div id="statusBox" class="status-box">Ready to request ride.</div>
      <div id="resultArea"></div>
    </div>
  </div>

  <script>
    let latestRideId = null

    function setStatus(message, type = '') {
      const box = document.getElementById('statusBox')
      box.className = 'status-box' + (type ? ' ' + type : '')
      box.textContent = message
    }

    function autofillRide() {
      document.getElementById('rider_name').value = 'Test Rider'
      document.getElementById('rider_phone').value = '615-555-0100'
      document.getElementById('pickup').value = '500 Broadway, Nashville, TN 37203'
      document.getElementById('dropoff').value = '1 Terminal Dr, Nashville, TN 37214'
      setStatus('Real test addresses loaded. Ready to request ride.')
    }

    function renderResult(data) {
      const resultArea = document.getElementById('resultArea')

      if (!data || !data.ride) {
        resultArea.innerHTML = ''
        return
      }

      const ride = data.ride
      const driver = data.assigned_driver || null
      latestRideId = ride.id || null

      resultArea.innerHTML = `
        <div class="result-grid">
          <div class="result-card">
            <div class="result-title">Ride Status</div>
            <div class="result-value">${ride.status || 'unknown'}</div>
          </div>

          <div class="result-card">
            <div class="result-title">Ride ID</div>
            <div class="result-value">${ride.id || 'Not available'}</div>
          </div>

          <div class="result-card">
            <div class="result-title">Pickup</div>
            <div class="result-value">${ride.pickup_address || 'Not available'}</div>
          </div>

          <div class="result-card">
            <div class="result-title">Dropoff</div>
            <div class="result-value">${ride.dropoff_address || 'Not available'}</div>
          </div>

          <div class="result-card">
            <div class="result-title">Estimated Fare</div>
            <div class="result-value">$${ride.estimated_fare || '0.00'}</div>
          </div>

          <div class="result-card">
            <div class="result-title">Assigned Driver</div>
            <div class="result-value">
              ${driver
                ? `${driver.name || 'Driver'} · ${driver.type || 'fleet'} · ${driver.vehicle_type || 'vehicle'}`
                : 'Waiting for assignment'}
            </div>
          </div>
        </div>

        <div class="inline-actions">
          ${
            latestRideId
              ? `<a class="link-btn" href="/rider-live-trip.html?ride_id=${encodeURIComponent(latestRideId)}">Open Rider Live Trip</a>`
              : ''
          }
        </div>
      `
    }

    async function requestRide() {
      const rider_name = document.getElementById('rider_name').value.trim()
      const rider_phone = document.getElementById('rider_phone').value.trim()
      const pickup_address = document.getElementById('pickup').value.trim()
      const dropoff_address = document.getElementById('dropoff').value.trim()

      if (!rider_name || !pickup_address || !dropoff_address) {
        setStatus('Please enter rider name, pickup address, and dropoff address.', 'error')
        return
      }

      setStatus('Requesting ride and contacting dispatch brain...')
      document.getElementById('resultArea').innerHTML = ''

      try {
        const response = await fetch('/api/request-ride', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            rider_name,
            rider_phone,
            pickup_address,
            dropoff_address
          })
        })

        const data = await response.json()

        if (!response.ok) {
          setStatus(data.error || 'Ride request failed.', 'error')
          return
        }

        const statusMessage = data.message || 'Ride request submitted.'

        if (data.assigned_driver) {
          setStatus(statusMessage, 'success')
        } else {
          setStatus(statusMessage, '')
        }

        renderResult(data)
      } catch (error) {
        setStatus('Network error while requesting ride.', 'error')
      }
    }
  </script>
</body>
</html>
