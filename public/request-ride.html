<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Ride</title>

<style>
body{
font-family:Arial;
background:#021433;
color:white;
padding:20px;
}

.card{
background:#0b1f4a;
padding:20px;
border-radius:14px;
max-width:600px;
margin:auto;
}

input{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
border-radius:10px;
background:#10295c;
color:white;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-weight:bold;
background:#3b82f6;
color:white;
}

#message{
margin-top:20px;
line-height:1.5;
}
</style>
</head>

<body>

<div class="card">

<h2>Request a Ride</h2>

<input id="name" placeholder="Your name">
<input id="phone" placeholder="Phone number">
<input id="pickup" placeholder="Pickup location">
<input id="dropoff" placeholder="Dropoff location">

<button onclick="requestRide()">Request Ride</button>

<div id="message"></div>

</div>

<script>

async function requestRide(){

const name = document.getElementById('name').value
const phone = document.getElementById('phone').value
const pickup = document.getElementById('pickup').value
const dropoff = document.getElementById('dropoff').value

const message = document.getElementById('message')

message.innerHTML = "Requesting ride..."

try{

const res = await fetch('/api/request-ride',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
name,
phone,
pickup,
dropoff
})
})

const data = await res.json()

if(data.success){

localStorage.setItem('harveyRideId', data.ride.id)

message.innerHTML = "Ride requested… redirecting to tracking..."

setTimeout(()=>{
window.location.href="/rider-trip.html"
},1200)

}else{
message.innerHTML = "Error requesting ride"
}

}catch(e){
message.innerHTML = "Server error"
}

}

</script>

</body>
</html>
