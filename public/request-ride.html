<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Ride</title>

<style>
body {
background: #020617;
font-family: -apple-system, BlinkMacSystemFont, sans-serif;
color: white;
padding: 20px;
}

.card {
background: #0f172a;
padding: 20px;
border-radius: 20px;
max-width: 500px;
margin: auto;
}

h1 {
text-align: center;
}

label {
display: block;
margin-top: 15px;
margin-bottom: 5px;
}

input {
width: 100%;
padding: 15px;
border-radius: 12px;
border: 1px solid #1e293b;
background: #020617;
color: white;
font-size: 16px;
}

button {
width: 100%;
padding: 16px;
border-radius: 14px;
border: none;
font-size: 16px;
margin-top: 15px;
font-weight: 600;
}

.primary {
background: #10b981;
color: black;
}

.secondary {
background: #3b82f6;
color: white;
}

.result {
margin-top: 20px;
padding: 12px;
background: #020617;
border-radius: 10px;
}
</style>
</head>

<body>

<div class="card">
<h1>Request Ride</h1>

<label>Rider Name</label>
<input id="rider_name" placeholder="Your name" />

<label>Pickup Address</label>
<input id="pickup" placeholder="Downtown Nashville" />

<label>Dropoff Address</label>
<input id="dropoff" placeholder="Nashville Airport" />

<button class="secondary" onclick="autofill()">
Auto Fill Hidden Coordinates For Testing
</button>

<button class="primary" onclick="requestRide()">
Request Ride
</button>

<div id="result" class="result"></div>
</div>

<script>
function autofill(){
document.getElementById('rider_name').value = "Test Rider"
document.getElementById('pickup').value = "Downtown Nashville"
document.getElementById('dropoff').value = "Nashville International Airport"
}

async function requestRide(){

const rider_name = document.getElementById('rider_name').value
const pickup = document.getElementById('pickup').value
const dropoff = document.getElementById('dropoff').value

document.getElementById('result').innerText = "Requesting ride..."

try{

const res = await fetch('/api/request-ride',{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body: JSON.stringify({
rider_name: rider_name,
pickup_address: pickup,
dropoff_address: dropoff
})
})

const data = await res.json()

document.getElementById('result').innerText =
JSON.stringify(data,null,2)

}catch(err){
document.getElementById('result').innerText =
"Error requesting ride"
}

}
</script>

</body>
</html>
