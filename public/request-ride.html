<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi — Request Ride</title>

  <style>
    :root{
      --bg1:#030712;
      --bg2:#081226;
      --panel:#0b1730;
      --line:rgba(120,170,255,.18);
      --text:#f4f8ff;
      --muted:#a9b7d9;
      --blue:#6aa8ff;
      --cyan:#63f5ff;
      --green:#6fffba;
      --danger:#ff7d8f;
      --gold:#ffd76a;
      --radius:22px;
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:Inter,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left,rgba(99,245,255,.12),transparent 30%),
        linear-gradient(160deg,var(--bg1),var(--bg2));
      min-height:100vh;
    }

    .shell{
      max-width:720px;
      margin:auto;
      padding:18px 18px 34px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      padding:18px 20px;
      border:1px solid var(--line);
      border-radius:28px;
      background:rgba(8,16,36,.7);
      margin-bottom:18px;
      box-shadow:0 20px 40px rgba(0,0,0,.22);
    }

    .brand-wrap{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .brand{
      font-weight:800;
      letter-spacing:.05em;
      font-size:15px;
    }

    .brand-sub{
      color:var(--muted);
      font-size:14px;
    }

    .home-link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 18px;
      border-radius:999px;
      text-decoration:none;
      font-weight:800;
      color:var(--text);
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      white-space:nowrap;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:28px;
      padding:24px;
      box-shadow:0 20px 40px rgba(0,0,0,.22);
    }

    h1{
      font-size:32px;
      margin-bottom:8px;
    }

    .subtitle{
      color:var(--muted);
      margin-bottom:22px;
      line-height:1.6;
      font-size:17px;
    }

    .status{
      padding:14px 16px;
      border-radius:16px;
      margin-bottom:18px;
      display:none;
      line-height:1.5;
    }

    .status.info{
      background:rgba(106,168,255,.10);
      border:1px solid rgba(106,168,255,.22);
      color:#dbe8ff;
    }

    .status.locked{
      background:rgba(255,215,106,.10);
      border:1px solid rgba(255,215,106,.24);
      color:#fff0bd;
    }

    .status.error-state{
      background:rgba(255,125,143,.12);
      border:1px solid rgba(255,125,143,.25);
      color:#ffd9df;
    }

    .form-group{
      margin-bottom:20px;
    }

    label{
      display:block;
      font-weight:700;
      margin-bottom:8px;
      font-size:15px;
    }

    input{
      width:100%;
      padding:18px;
      border-radius:20px;
      border:1px solid rgba(90,140,255,.25);
      background:#03113f;
      color:white;
      font-size:16px;
    }

    input::placeholder{
      color:rgba(255,255,255,.55);
    }

    input:focus{
      outline:none;
      border-color:var(--blue);
      box-shadow:0 0 0 3px rgba(106,168,255,.15);
    }

    .address-block{
      padding:18px;
      border-radius:20px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
      margin-bottom:18px;
    }

    .address-title{
      font-weight:800;
      margin-bottom:6px;
      font-size:24px;
    }

    .address-sub{
      color:var(--muted);
      font-size:14px;
      margin-bottom:16px;
      line-height:1.5;
    }

    button{
      width:100%;
      padding:22px;
      border:none;
      border-radius:24px;
      font-size:18px;
      font-weight:800;
      cursor:pointer;
      transition:.2s ease;
    }

    .primary{
      background:linear-gradient(135deg,#63f5ff,#6aa8ff);
      color:#07121f;
      box-shadow:0 16px 40px rgba(36,127,255,.20);
    }

    .primary:disabled{
      opacity:.45;
      cursor:not-allowed;
      box-shadow:none;
    }

    .message{
      margin-top:18px;
      padding:16px;
      border-radius:16px;
      display:none;
      line-height:1.5;
    }

    .error{
      background:rgba(255,125,143,.12);
      border:1px solid rgba(255,125,143,.25);
      color:#ffd9df;
    }

    .success{
      background:rgba(111,255,186,.12);
      border:1px solid rgba(111,255,186,.25);
      color:#d8ffec;
    }

    @media(max-width:640px){
      .top{
        flex-direction:column;
        align-items:flex-start;
      }

      .home-link{
        width:100%;
      }

      h1{
        font-size:28px;
      }

      .card{
        padding:20px;
      }
    }
  </style>
</head>

<body>

  <div class="shell">

    <div class="top">
      <div class="brand-wrap">
        <div class="brand">HARVEY TAXI</div>
        <div class="brand-sub">Ride booking and dispatch access</div>
      </div>
      <a href="index.html" class="home-link">Return Home</a>
    </div>

    <div class="card">

      <h1>Request Ride</h1>
      <div class="subtitle">
        Verified riders can request transportation by entering pickup and dropoff addresses for dispatch review.
      </div>

      <div class="status info" id="statusBox">
        Checking rider verification status...
      </div>

      <form id="rideForm">

        <div class="form-group">
          <label for="riderName">Rider Name</label>
          <input id="riderName" placeholder="Enter rider name" required />
        </div>

        <div class="form-group">
          <label for="riderPhone">Rider Phone</label>
          <input id="riderPhone" placeholder="Enter rider phone number" required />
        </div>

        <div class="address-block">
          <div class="address-title">Trip Addresses</div>
          <div class="address-sub">
            Enter full pickup and dropoff addresses for dispatch.
          </div>

          <div class="form-group">
            <label for="pickup">Pickup Address</label>
            <input id="pickup" placeholder="Street address, city, state" required />
          </div>

          <div class="form-group">
            <label for="dropoff">Dropoff Address</label>
            <input id="dropoff" placeholder="Street address, city, state" required />
          </div>
        </div>

        <button id="requestBtn" class="primary" disabled>
          Request Ride
        </button>

        <div id="message" class="message"></div>
      </form>

    </div>
  </div>

  <script>
    const form = document.getElementById("rideForm");
    const btn = document.getElementById("requestBtn");
    const message = document.getElementById("message");
    const statusBox = document.getElementById("statusBox");

    function showStatus(text, type = "info") {
      statusBox.className = `status ${type}`;
      statusBox.style.display = "block";
      statusBox.innerText = text;
    }

    function hideStatus() {
      statusBox.style.display = "none";
    }

    async function checkRider() {
      try {
        const res = await fetch("/api/check-rider");
        const data = await res.json();

        if (data.approved) {
          btn.disabled = false;
          hideStatus();
        } else {
          btn.disabled = true;
          showStatus(
            "Rider verification is required before ride booking becomes available.",
            "locked"
          );
        }
      } catch {
        btn.disabled = true;
        showStatus(
          "We could not verify rider approval right now. Please try again shortly.",
          "error-state"
        );
      }
    }

    checkRider();

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      message.style.display = "none";
      btn.disabled = true;

      const payload = {
        name: document.getElementById("riderName").value.trim(),
        phone: document.getElementById("riderPhone").value.trim(),
        pickup: document.getElementById("pickup").value.trim(),
        dropoff: document.getElementById("dropoff").value.trim()
      };

      try {
        const res = await fetch("/api/request-ride", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || "Request failed");
        }

        message.className = "message success";
        message.style.display = "block";
        message.innerText = "Ride request submitted. Dispatch is reviewing your trip.";

        form.reset();

        // Re-check status after successful request
        await checkRider();
      } catch (err) {
        message.className = "message error";
        message.style.display = "block";
        message.innerText = err.message || "Unable to submit ride request.";
        await checkRider();
      }
    });
  </script>

</body>
</html>
