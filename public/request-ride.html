<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvey Taxi — Request Ride</title>

<style>
:root{
--bg1:#030712;
--bg2:#081226;
--panel:#0b1730;
--line:rgba(120,170,255,.18);
--text:#f4f8ff;
--muted:#a9b7d9;
--blue:#6aa8ff;
--cyan:#63f5ff;
--green:#6fffba;
--danger:#ff7d8f;
--radius:22px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:Inter,Arial;
color:var(--text);
background:
radial-gradient(circle at top left,rgba(99,245,255,.12),transparent 30%),
linear-gradient(160deg,var(--bg1),var(--bg2));
min-height:100vh;
}

.shell{
max-width:720px;
margin:auto;
padding:18px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 16px;
border:1px solid var(--line);
border-radius:999px;
background:rgba(8,16,36,.7);
margin-bottom:18px;
}

.brand{
font-weight:800;
letter-spacing:.05em;
}

.card{
background:var(--panel);
border:1px solid var(--line);
border-radius:28px;
padding:24px;
}

h1{
font-size:32px;
margin-bottom:8px;
}

.subtitle{
color:var(--muted);
margin-bottom:22px;
line-height:1.6;
}

.status{
padding:14px 16px;
border-radius:16px;
margin-bottom:18px;
background:rgba(255,125,143,.12);
border:1px solid rgba(255,125,143,.25);
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
font-weight:700;
margin-bottom:8px;
}

input{
width:100%;
padding:18px;
border-radius:20px;
border:1px solid rgba(90,140,255,.25);
background:#03113f;
color:white;
font-size:16px;
}

input::placeholder{
color:rgba(255,255,255,.55);
}

input:focus{
outline:none;
border-color:var(--blue);
box-shadow:0 0 0 3px rgba(106,168,255,.15);
}

.address-block{
padding:18px;
border-radius:20px;
border:1px solid var(--line);
background:rgba(255,255,255,.02);
margin-bottom:18px;
}

.address-title{
font-weight:800;
margin-bottom:6px;
}

.address-sub{
color:var(--muted);
font-size:14px;
margin-bottom:16px;
}

button{
width:100%;
padding:22px;
border:none;
border-radius:24px;
font-size:18px;
font-weight:800;
cursor:pointer;
}

.primary{
background:linear-gradient(135deg,#63f5ff,#6aa8ff);
color:#07121f;
}

.primary:disabled{
opacity:.45;
cursor:not-allowed;
}

.message{
margin-top:18px;
padding:16px;
border-radius:16px;
display:none;
}

.error{
background:rgba(255,125,143,.12);
border:1px solid rgba(255,125,143,.25);
}

.success{
background:rgba(111,255,186,.12);
border:1px solid rgba(111,255,186,.25);
}

.return-home{
position:fixed;
bottom:16px;
right:16px;
padding:16px 22px;
border-radius:999px;
background:linear-gradient(135deg,#63f5ff,#6aa8ff);
color:#06111f;
font-weight:800;
text-decoration:none;
box-shadow:0 15px 40px rgba(0,0,0,.35);
}

@media(max-width:640px){
.return-home{
left:12px;
right:12px;
text-align:center;
}
}
</style>
</head>

<body>

<div class="shell">

<div class="top">
<div class="brand">HARVEY TAXI</div>
</div>

<div class="card">

<h1>Ride</h1>
<div class="subtitle">
Riders must be verification-approved before trip booking unlocks.
</div>

<div class="status" id="statusBox">
No rider account found. Complete rider signup first.
</div>

<form id="rideForm">

<div class="form-group">
<label>Rider Name</label>
<input id="riderName" placeholder="Enter rider name" required>
</div>

<div class="form-group">
<label>Rider Phone</label>
<input id="riderPhone" placeholder="Enter rider phone number" required>
</div>

<div class="address-block">

<div class="address-title">Trip Addresses</div>
<div class="address-sub">
Enter full pickup and dropoff addresses for dispatch.
</div>

<div class="form-group">
<label>Pickup Address</label>
<input id="pickup" placeholder="Street address, city, state" required>
</div>

<div class="form-group">
<label>Dropoff Address</label>
<input id="dropoff" placeholder="Street address, city, state" required>
</div>

</div>

<button id="requestBtn" class="primary" disabled>
Request Ride
</button>

<div id="message" class="message"></div>

</form>

</div>
</div>

<a href="index.html" class="return-home">Return Home</a>

<script>
const form = document.getElementById("rideForm")
const btn = document.getElementById("requestBtn")
const message = document.getElementById("message")

async function checkRider(){

try{
const res = await fetch("/api/check-rider")
const data = await res.json()

if(data.approved){
btn.disabled=false
document.getElementById("statusBox").style.display="none"
}else{
btn.disabled=true
}

}catch{
btn.disabled=true
}

}

checkRider()

form.addEventListener("submit", async e=>{
e.preventDefault()

btn.disabled=true

const payload={
name:document.getElementById("riderName").value,
phone:document.getElementById("riderPhone").value,
pickup:document.getElementById("pickup").value,
dropoff:document.getElementById("dropoff").value
}

try{

const res=await fetch("/api/request-ride",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify(payload)
})

const data=await res.json()

message.className="message success"
message.style.display="block"
message.innerText="Ride request submitted. Dispatch reviewing."

form.reset()

}catch{

message.className="message error"
message.style.display="block"
message.innerText="Unable to submit ride request."

}

btn.disabled=false

})
</script>

</body>
</html>
