<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Ride</title>

<style>
body{
font-family:Arial;
background:#021433;
color:white;
padding:20px;
}

.card{
background:#0b1f4a;
padding:20px;
border-radius:14px;
max-width:650px;
margin:auto;
}

input{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
border-radius:10px;
background:#10295c;
color:white;
font-size:16px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-weight:bold;
background:#3b82f6;
color:white;
cursor:pointer;
}

#message{
margin-top:20px;
line-height:1.6;
}
</style>
</head>

<body>

<div class="card">
  <h2>Request a Ride</h2>

  <input id="name" placeholder="Your name">
  <input id="phone" placeholder="Phone number">
  <input id="pickup" placeholder="Pickup address">
  <input id="dropoff" placeholder="Dropoff address">

  <button onclick="requestRide()">Request Ride</button>

  <div id="message"></div>
</div>

<script>
async function requestRide() {
  const name = document.getElementById('name').value.trim()
  const phone = document.getElementById('phone').value.trim()
  const pickup = document.getElementById('pickup').value.trim()
  const dropoff = document.getElementById('dropoff').value.trim()
  const message = document.getElementById('message')

  message.innerHTML = 'Requesting ride...'

  try {
    const res = await fetch('/api/request-ride', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, phone, pickup, dropoff })
    })

    const data = await res.json()

    if (data.success) {
      localStorage.setItem('harveyRideId', data.ride.id)

      message.innerHTML = `
        Ride requested successfully 🚕<br><br>
        Ride ID:<br>
        <b>${data.ride.id}</b><br><br>
        Estimated Fare:<br>
        <b>$${data.ride.fare.total.toFixed(2)}</b><br><br>
        ${data.autoDispatch && data.autoDispatch.matched
          ? `Driver auto-assigned: <b>${data.autoDispatch.driverName}</b><br><br>`
          : 'No driver auto-assigned yet.<br><br>'}
        <a href="/rider-trip.html" style="color:#7dd3fc">Track your ride</a>
      `

      document.getElementById('name').value = ''
      document.getElementById('phone').value = ''
      document.getElementById('pickup').value = ''
      document.getElementById('dropoff').value = ''
    } else {
      message.innerHTML = data.message || 'Error requesting ride'
    }
  } catch (e) {
    message.innerHTML = 'Server error'
  }
}
</script>

</body>
</html>
