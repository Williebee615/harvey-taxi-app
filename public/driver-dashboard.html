<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Driver Dashboard | Harvey Taxi</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      background: #131a2e;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
    }

    h1 {
      margin-top: 0;
      text-align: center;
    }

    .card {
      margin-top: 18px;
      padding: 18px;
      border-radius: 16px;
      background: #0e1528;
      border: 1px solid #283252;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    button {
      padding: 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .check-btn {
      background: #3a86ff;
      color: white;
    }

    .accept-btn {
      background: #20c997;
      color: #071018;
    }

    .decline-btn {
      background: #ef476f;
      color: white;
    }

    .status {
      margin-top: 16px;
      color: #d5dfff;
    }

    .label {
      color: #91a4d7;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .value {
      margin-bottom: 12px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Driver Dashboard</h1>

    <div class="card">
      <div class="label">Driver ID</div>
      <div class="value" id="driverIdDisplay"></div>

      <div class="label">Current Offer</div>
      <div class="value" id="dispatchStatus">No active ride offers right now.</div>

      <div class="actions">
        <button class="check-btn" onclick="checkDispatchOffer()">Check Ride Offer</button>
        <button class="accept-btn" onclick="acceptDispatch()">Accept Ride</button>
        <button class="decline-btn" onclick="declineDispatch()">Decline Ride</button>
      </div>

      <div class="status" id="resultMessage"></div>
    </div>
  </div>

  <script>
    const driverId = localStorage.getItem('driverId') || 'driver_1'
    let currentDispatchId = null

    document.getElementById('driverIdDisplay').textContent = driverId

    function setResultMessage(text) {
      document.getElementById('resultMessage').textContent = text
    }

    async function checkDispatchOffer() {
      try {
        const res = await fetch(`/api/driver/offers/${driverId}`)
        const data = await res.json()

        if (!data.offer) {
          currentDispatchId = null
          document.getElementById('dispatchStatus').innerHTML = 'No active ride offers right now.'
          return
        }

        currentDispatchId = data.offer.id

        document.getElementById('dispatchStatus').innerHTML = `
          <div class="label">Dispatch ID</div>
          <div class="value">${data.offer.id}</div>

          <div class="label">Pickup Address</div>
          <div class="value">${data.offer.pickup?.address || 'N/A'}</div>

          <div class="label">Dropoff Address</div>
          <div class="value">${data.offer.dropoff?.address || 'N/A'}</div>

          <div class="label">Estimated Distance</div>
          <div class="value">${Number(data.offer.milesAway || 0).toFixed(2)} miles away</div>

          <div class="label">Fleet Type</div>
          <div class="value">${data.offer.fleetType}</div>

          <div class="label">Ride Status</div>
          <div class="value">${data.offer.ride?.status || 'dispatching'}</div>
        `
      } catch (err) {
        console.error(err)
        setResultMessage('Failed to check dispatch offer.')
      }
    }

    async function acceptDispatch() {
      if (!currentDispatchId) {
        setResultMessage('No dispatch offer to accept.')
        return
      }

      try {
        const res = await fetch('/api/dispatch/respond', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            dispatchId: currentDispatchId,
            driverId,
            action: 'accept'
          })
        })

        const data = await res.json()
        setResultMessage(data.message || 'Ride accepted.')
        await checkDispatchOffer()
      } catch (err) {
        console.error(err)
        setResultMessage('Failed to accept dispatch.')
      }
    }

    async function declineDispatch() {
      if (!currentDispatchId) {
        setResultMessage('No dispatch offer to decline.')
        return
      }

      try {
        const res = await fetch('/api/dispatch/respond', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            dispatchId: currentDispatchId,
            driverId,
            action: 'decline'
          })
        })

        const data = await res.json()
        setResultMessage(data.message || 'Ride declined.')
        await checkDispatchOffer()
      } catch (err) {
        console.error(err)
        setResultMessage('Failed to decline dispatch.')
      }
    }

    checkDispatchOffer()
    setInterval(checkDispatchOffer, 5000)
  </script>
</body>
</html>
