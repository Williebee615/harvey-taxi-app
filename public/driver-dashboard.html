<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvey Taxi Driver Dashboard</title>

<style>
body{
font-family:Arial;
background:#021433;
color:white;
padding:20px;
margin:0;
}

.container{
max-width:760px;
margin:auto;
}

.top-link{
display:inline-block;
margin-bottom:18px;
color:#c7d7ff;
text-decoration:none;
}

h1{
margin-bottom:10px;
font-size:32px;
}

.sub{
opacity:0.85;
margin-bottom:20px;
line-height:1.5;
}

.card{
background:#0b1f4a;
padding:18px;
border-radius:14px;
margin-bottom:16px;
box-shadow:0 0 10px rgba(0,0,0,0.35);
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-bottom:12px;
background:#10295c;
color:white;
font-size:16px;
}

button{
padding:12px 16px;
border:none;
border-radius:10px;
font-weight:bold;
margin-right:8px;
margin-top:8px;
cursor:pointer;
}

.load{ background:#3b82f6; color:white; }
.accept{ background:#10b981; color:white; }
.start{ background:#f59e0b; color:white; }
.complete{ background:#ef4444; color:white; }
.logout{ background:#475569; color:white; }

.status{
margin-top:10px;
font-size:14px;
opacity:0.85;
}

.trip-line{
margin-bottom:10px;
line-height:1.5;
}

.badge{
display:inline-block;
padding:6px 10px;
border-radius:999px;
font-size:12px;
font-weight:bold;
margin-top:8px;
text-transform:capitalize;
}

.requested{ background:#334155; }
.assigned{ background:#2563eb; }
.enroute{ background:#d97706; }
.in_progress{ background:#7c3aed; }
.completed{ background:#16a34a; }

.empty{
opacity:0.8;
line-height:1.5;
}
</style>
</head>

<body>

<div class="container">

<a class="top-link" href="/">← Back to Home</a>

<h1>🚖 Driver Dashboard</h1>
<p class="sub">
Log in with your driver email to load your active trip automatically.
</p>

<div class="card">
<label for="driverEmail">Driver Email</label>
<input id="driverEmail" type="email" placeholder="Enter driver email">

<button class="load" onclick="loadDriverByEmail()">Load My Dashboard</button>
<button class="logout" onclick="logoutDriver()">Logout</button>

<div class="status" id="message"></div>
</div>

<div class="card" id="driverCard">
<div class="empty">No driver loaded yet.</div>
</div>

<div class="card" id="tripCard">
<div class="empty">No trip loaded yet.</div>
</div>

</div>

<script>
let currentTrip = null
let currentDriver = null

function setMessage(text){
document.getElementById('message').innerText = text
}

function statusBadge(status){
if(!status) status = 'requested'
return `<span class="badge ${status}">${status.replace('_',' ')}</span>`
}

function renderDriver(driver){
const driverCard = document.getElementById('driverCard')

if(!driver){
driverCard.innerHTML = `<div class="empty">No driver loaded yet.</div>`
return
}

driverCard.innerHTML = `
<div class="trip-line"><b>Name:</b> ${driver.name || 'Unknown Driver'}</div>
<div class="trip-line"><b>Email:</b> ${driver.email || 'Unknown'}</div>
<div class="trip-line"><b>Phone:</b> ${driver.phone || 'Unknown'}</div>
<div class="trip-line"><b>Vehicle:</b> ${driver.vehicle || 'Unknown'}</div>
<div class="trip-line"><b>Status:</b> ${driver.status || 'pending'}</div>
<div class="trip-line"><b>Online:</b> ${driver.online ? 'Yes' : 'No'}</div>
<div class="trip-line"><b>Current Ride ID:</b> ${driver.currentRideId || 'None'}</div>
`
}

function renderTrip(trip){
const tripCard = document.getElementById('tripCard')

if(!trip){
tripCard.innerHTML = `<div class="empty">No assigned trip right now.</div>`
return
}

currentTrip = trip

let actionButtons = ''

if(trip.status === 'assigned'){
actionButtons += `<button class="accept" onclick="acceptTrip()">Accept Trip</button>`
}

if(trip.status === 'enroute'){
actionButtons += `<button class="start" onclick="startTrip()">Start Trip</button>`
}

if(trip.status === 'in_progress'){
actionButtons += `<button class="complete" onclick="completeTrip()">Complete Trip</button>`
}

if(trip.status === 'completed'){
actionButtons += `<div class="status">This trip is completed.</div>`
}

tripCard.innerHTML = `
<div class="trip-line"><b>Ride ID:</b> ${trip.id}</div>
<div class="trip-line"><b>Rider:</b> ${trip.rider || trip.name || 'Not provided'}</div>
<div class="trip-line"><b>Phone:</b> ${trip.phone || 'Not provided'}</div>
<div class="trip-line"><b>Pickup:</b> ${trip.pickup || 'Not provided'}</div>
<div class="trip-line"><b>Dropoff:</b> ${trip.dropoff || 'Not provided'}</div>
<div class="trip-line"><b>Status:</b> ${statusBadge(trip.status)}</div>
<div class="trip-line"><b>Created:</b> ${trip.created || trip.createdAt || 'Not available'}</div>
${actionButtons}
`
}

async function loadDriverByEmail(){
const email = document.getElementById('driverEmail').value.trim().toLowerCase()

if(!email){
setMessage('Enter your driver email first.')
return
}

setMessage('Loading driver dashboard...')

try{
const res = await fetch('/api/drivers')
const drivers = await res.json()

const driver = drivers.find(d => (d.email || '').toLowerCase() === email)

if(!driver){
currentDriver = null
currentTrip = null
renderDriver(null)
renderTrip(null)
setMessage('No driver found for that email.')
return
}

currentDriver = driver
localStorage.setItem('harveyDriverEmail', email)
localStorage.setItem('harveyDriverId', driver.id || '')
renderDriver(driver)
await loadTripForCurrentDriver()
setMessage('Driver dashboard loaded.')
}catch(err){
setMessage('Could not load driver dashboard.')
}
}

async function loadTripForCurrentDriver(){
if(!currentDriver){
renderTrip(null)
return
}

try{
const res = await fetch('/api/rides')
const rides = await res.json()

const trip = rides.find(r =>
String(r.driverId) === String(currentDriver.id || '') &&
r.status !== 'completed'
) || null

renderTrip(trip)
}catch(err){
setMessage('Could not load trip.')
}
}

async function acceptTrip(){
if(!currentTrip){
setMessage('No trip loaded.')
return
}

try{
await fetch('/api/driver-accept',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({ rideId: currentTrip.id })
})

setMessage('Trip accepted.')
await refreshDashboard()
}catch(err){
setMessage('Could not accept trip.')
}
}

async function startTrip(){
if(!currentTrip){
setMessage('No trip loaded.')
return
}

try{
await fetch('/api/start-trip',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({ rideId: currentTrip.id })
})

setMessage('Trip started.')
await refreshDashboard()
}catch(err){
setMessage('Could not start trip.')
}
}

async function completeTrip(){
if(!currentTrip){
setMessage('No trip loaded.')
return
}

try{
await fetch('/api/complete-trip',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({ rideId: currentTrip.id })
})

setMessage('Trip completed.')
await refreshDashboard()
}catch(err){
setMessage('Could not complete trip.')
}
}

async function refreshDashboard(){
if(!currentDriver || !currentDriver.email){
return
}

document.getElementById('driverEmail').value = currentDriver.email

try{
const res = await fetch('/api/drivers')
const drivers = await res.json()
const updatedDriver = drivers.find(d => String(d.id) === String(currentDriver.id))

if(updatedDriver){
currentDriver = updatedDriver
renderDriver(updatedDriver)
await loadTripForCurrentDriver()
}
}catch(err){
setMessage('Could not refresh dashboard.')
}
}

function logoutDriver(){
localStorage.removeItem('harveyDriverEmail')
localStorage.removeItem('harveyDriverId')
currentDriver = null
currentTrip = null
document.getElementById('driverEmail').value = ''
renderDriver(null)
renderTrip(null)
setMessage('Logged out.')
}

window.addEventListener('load', async () => {
const savedEmail = localStorage.getItem('harveyDriverEmail')
if(savedEmail){
document.getElementById('driverEmail').value = savedEmail
await loadDriverByEmail()
}
})

setInterval(() => {
if(currentDriver){
refreshDashboard()
}
}, 5000)
</script>

</body>
</html>
