<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvey Taxi Driver Dashboard</title>

<style>
body{
font-family:Arial;
background:#021433;
color:white;
padding:20px;
margin:0;
}

.container{
max-width:760px;
margin:auto;
}

.top-link{
display:inline-block;
margin-bottom:18px;
color:#c7d7ff;
text-decoration:none;
}

h1{
margin-bottom:10px;
font-size:32px;
}

.sub{
opacity:0.85;
margin-bottom:20px;
line-height:1.5;
}

.card{
background:#0b1f4a;
padding:18px;
border-radius:14px;
margin-bottom:16px;
box-shadow:0 0 10px rgba(0,0,0,0.35);
}

.alert-card{
background:linear-gradient(90deg,#b91c1c,#ef4444);
padding:18px;
border-radius:14px;
margin-bottom:16px;
box-shadow:0 0 18px rgba(239,68,68,0.45);
display:none;
animation:pulse 1s infinite alternate;
}

@keyframes pulse{
from{ transform:scale(1); }
to{ transform:scale(1.01); }
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-bottom:12px;
background:#10295c;
color:white;
font-size:16px;
}

button{
padding:12px 16px;
border:none;
border-radius:10px;
font-weight:bold;
margin-right:8px;
margin-top:8px;
cursor:pointer;
}

.load{ background:#3b82f6; color:white; }
.accept{ background:#10b981; color:white; }
.complete{ background:#ef4444; color:white; }
.logout{ background:#475569; color:white; }
.dismiss{ background:#0f172a; color:white; }

.status{
margin-top:10px;
font-size:14px;
opacity:0.9;
line-height:1.5;
}

.trip-line{
margin-bottom:10px;
line-height:1.5;
}

.badge{
display:inline-block;
padding:6px 10px;
border-radius:999px;
font-size:12px;
font-weight:bold;
margin-top:8px;
text-transform:capitalize;
}

.requested{ background:#334155; }
.assigned{ background:#2563eb; }
.enroute{ background:#d97706; }
.in_progress{ background:#7c3aed; }
.completed{ background:#16a34a; }

.empty{
opacity:0.8;
line-height:1.5;
}

.highlight{
outline:2px solid #facc15;
box-shadow:0 0 20px rgba(250,204,21,0.35);
}
</style>
</head>

<body>

<div class="container">

<a class="top-link" href="/">← Back to Home</a>

<h1>🚖 Driver Dashboard</h1>
<p class="sub">
Load your driver account, receive ride alerts, and manage assigned trips.
</p>

<div class="alert-card" id="tripAlert">
  <h3 style="margin-bottom:8px;">🚨 New Trip Assigned</h3>
  <p id="tripAlertText" style="line-height:1.6;">
    A new ride has been assigned to you.
  </p>
  <button class="dismiss" onclick="dismissAlert()">Dismiss Alert</button>
</div>

<div class="card">
<label for="driverId">Driver ID</label>
<input id="driverId" placeholder="Enter your driver ID">

<button class="load" onclick="loadDriverTrips()">Load Dashboard</button>
<button class="logout" onclick="logoutDriver()">Clear</button>

<div class="status" id="message"></div>
</div>

<div class="card" id="driverCard">
<div class="empty">No driver loaded yet.</div>
</div>

<div class="card" id="tripCard">
<div class="empty">No trip loaded yet.</div>
</div>

</div>

<script>
let currentDriver = null
let currentTrip = null
let lastTripId = null
let lastTripStatus = null
let alertDismissedForTrip = null
let audioContext = null

function setMessage(text){
document.getElementById('message').innerText = text
}

function statusBadge(status){
if(!status) status = 'requested'
return `<span class="badge ${status}">${status.replace('_',' ')}</span>`
}

function playAlertSound(){
try{
if(!audioContext){
audioContext = new (window.AudioContext || window.webkitAudioContext)()
}
const ctx = audioContext
const osc = ctx.createOscillator()
const gain = ctx.createGain()

osc.type = 'sine'
osc.frequency.setValueAtTime(880, ctx.currentTime)
gain.gain.setValueAtTime(0.0001, ctx.currentTime)
gain.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime + 0.02)
gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.5)

osc.connect(gain)
gain.connect(ctx.destination)
osc.start()
osc.stop(ctx.currentTime + 0.5)
}catch(e){}
}

function vibrateAlert(){
if(navigator.vibrate){
navigator.vibrate([300, 150, 300, 150, 400])
}
}

function showTripAlert(trip){
const alertBox = document.getElementById('tripAlert')
const alertText = document.getElementById('tripAlertText')

alertText.innerHTML = `
Pickup: <b>${trip.pickup || 'Not provided'}</b><br>
Dropoff: <b>${trip.dropoff || 'Not provided'}</b><br>
Ride ID: <b>${trip.id}</b>
`

alertBox.style.display = 'block'
playAlertSound()
vibrateAlert()
}

function dismissAlert(){
const alertBox = document.getElementById('tripAlert')
alertBox.style.display = 'none'

if(currentTrip){
alertDismissedForTrip = currentTrip.id
}
}

function renderDriver(driver){
const driverCard = document.getElementById('driverCard')

if(!driver){
driverCard.innerHTML = `<div class="empty">No driver loaded yet.</div>`
return
}

driverCard.innerHTML = `
<div class="trip-line"><b>Driver ID:</b> ${driver.id}</div>
<div class="trip-line"><b>Name:</b> ${driver.name || 'Unknown Driver'}</div>
<div class="trip-line"><b>Phone:</b> ${driver.phone || 'Unknown'}</div>
<div class="trip-line"><b>Vehicle:</b> ${driver.vehicle || 'Unknown'}</div>
<div class="trip-line"><b>Approved:</b> ${driver.approved ? 'Yes' : 'No'}</div>
<div class="trip-line"><b>Online:</b> ${driver.online ? 'Yes' : 'No'}</div>
<div class="trip-line"><b>Current Ride:</b> ${driver.currentRide || 'None'}</div>
`
}

function renderTrip(trip){
const tripCard = document.getElementById('tripCard')

if(!trip){
tripCard.className = 'card'
tripCard.innerHTML = `<div class="empty">No active trip assigned right now.</div>`
return
}

currentTrip = trip

let buttons = ''

if(trip.status === 'assigned'){
buttons += `<button class="accept" onclick="acceptTrip()">Accept Trip</button>`
tripCard.className = 'card highlight'
} else if(trip.status === 'enroute' || trip.status === 'in_progress'){
buttons += `<button class="complete" onclick="completeTrip()">Complete Trip</button>`
tripCard.className = 'card'
} else {
tripCard.className = 'card'
}

tripCard.innerHTML = `
<div class="trip-line"><b>Ride ID:</b> ${trip.id}</div>
<div class="trip-line"><b>Rider:</b> ${trip.rider || trip.name || 'Not provided'}</div>
<div class="trip-line"><b>Phone:</b> ${trip.phone || 'Not provided'}</div>
<div class="trip-line"><b>Pickup:</b> ${trip.pickup || 'Not provided'}</div>
<div class="trip-line"><b>Dropoff:</b> ${trip.dropoff || 'Not provided'}</div>
<div class="trip-line"><b>Status:</b> ${statusBadge(trip.status)}</div>
<div class="trip-line"><b>Assigned Driver:</b> ${trip.assignedDriverName || trip.driverId || 'Not assigned'}</div>
<div class="trip-line"><b>Created:</b> ${trip.created || 'Not available'}</div>
${buttons}
`
}

function shouldAlertForTrip(trip){
if(!trip) return false
if(trip.status !== 'assigned') return false
if(alertDismissedForTrip === trip.id) return false

const newTripAssigned = lastTripId !== trip.id
const statusChangedToAssigned = lastTripId === trip.id && lastTripStatus !== 'assigned'

return newTripAssigned || statusChangedToAssigned
}

async function loadDriverTrips(){
const driverId = document.getElementById('driverId').value.trim()

if(!driverId){
setMessage('Please enter your driver ID first.')
return
}

localStorage.setItem('harveyDriverId', driverId)
setMessage('Loading dashboard...')

try{
const [driversRes, ridesRes] = await Promise.all([
fetch('/api/drivers'),
fetch('/api/rides')
])

const drivers = await driversRes.json()
const rides = await ridesRes.json()

const driver = drivers.find(d => String(d.id) === String(driverId))

if(!driver){
currentDriver = null
currentTrip = null
renderDriver(null)
renderTrip(null)
setMessage('No driver found with that ID.')
return
}

currentDriver = driver
renderDriver(driver)

const activeTrip = rides.find(r =>
String(r.driverId) === String(driverId) &&
r.status !== 'completed'
) || null

if(shouldAlertForTrip(activeTrip)){
showTripAlert(activeTrip)
}

renderTrip(activeTrip)

lastTripId = activeTrip ? activeTrip.id : null
lastTripStatus = activeTrip ? activeTrip.status : null

setMessage(activeTrip ? 'Trip loaded.' : 'No active trip assigned.')
}catch(err){
setMessage('Could not load dashboard.')
}
}

async function acceptTrip(){
if(!currentTrip || !currentDriver){
setMessage('No trip loaded.')
return
}

try{
await fetch('/api/driver-accept',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
rideId: currentTrip.id,
driverId: currentDriver.id
})
})

dismissAlert()
setMessage('Trip accepted.')
await loadDriverTrips()
}catch(err){
setMessage('Could not accept trip.')
}
}

async function completeTrip(){
if(!currentTrip){
setMessage('No trip loaded.')
return
}

try{
await fetch('/api/driver-complete',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
rideId: currentTrip.id
})
})

dismissAlert()
currentTrip = null
setMessage('Trip completed.')
await loadDriverTrips()
}catch(err){
setMessage('Could not complete trip.')
}
}

function logoutDriver(){
localStorage.removeItem('harveyDriverId')
currentDriver = null
currentTrip = null
lastTripId = null
lastTripStatus = null
alertDismissedForTrip = null
document.getElementById('driverId').value = ''
document.getElementById('tripAlert').style.display = 'none'
renderDriver(null)
renderTrip(null)
setMessage('Cleared.')
}

window.addEventListener('load', async () => {
const savedDriverId = localStorage.getItem('harveyDriverId')
if(savedDriverId){
document.getElementById('driverId').value = savedDriverId
await loadDriverTrips()
}
})

setInterval(() => {
const savedDriverId = document.getElementById('driverId').value.trim()
if(savedDriverId){
loadDriverTrips()
}
}, 5000)
</script>

</body>
</html>
