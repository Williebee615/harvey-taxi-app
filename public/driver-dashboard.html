<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Dashboard</title>

<style>
body{
font-family:Arial;
background:#021433;
color:white;
padding:20px;
}

.card{
background:#0b1f4a;
padding:16px;
border-radius:12px;
margin-bottom:12px;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
margin-top:8px;
cursor:pointer;
}

.accept{
background:#16a34a;
color:white;
}

.decline{
background:#dc2626;
color:white;
}

.alert{
position:fixed;
bottom:20px;
left:20px;
right:20px;
background:#020f2e;
border:2px solid #22c55e;
padding:20px;
border-radius:16px;
display:none;
z-index:999;
}

.timer{
font-size:22px;
font-weight:bold;
margin-top:10px;
color:#22c55e;
}
</style>
</head>

<body>

<h2>Driver Dashboard</h2>

<div id="rides"></div>

<div id="alert" class="alert">
<h3>New Ride Request</h3>
<div id="alertInfo"></div>

<div class="timer" id="timer">20</div>

<button class="accept" onclick="acceptRide()">Accept</button>
<button class="decline" onclick="declineRide()">Decline</button>
</div>

<audio id="alertSound">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

let driverId = localStorage.getItem("driverId")
let currentRide = null
let countdown = null
let timeLeft = 20

async function loadRides(){
const res = await fetch('/api/rides')
const rides = await res.json()

const container = document.getElementById("rides")
container.innerHTML = ""

rides.forEach(ride=>{

if(ride.driverId === driverId && ride.status === "assigned"){
showAlert(ride)
}

const div = document.createElement("div")
div.className = "card"

div.innerHTML = `
Ride: ${ride.id}<br>
Pickup: ${ride.pickup}<br>
Dropoff: ${ride.dropoff}<br>
Status: ${ride.status}
`

container.appendChild(div)

})

}

function showAlert(ride){
currentRide = ride

document.getElementById("alert").style.display="block"
document.getElementById("alertInfo").innerHTML=
`
Pickup: ${ride.pickup}<br>
Dropoff: ${ride.dropoff}
`

document.getElementById("alertSound").play()

startTimer()
}

function startTimer(){
timeLeft = 20
document.getElementById("timer").innerText=timeLeft

countdown = setInterval(()=>{
timeLeft--
document.getElementById("timer").innerText=timeLeft

if(timeLeft<=0){
clearInterval(countdown)
declineRide()
}

},1000)
}

async function acceptRide(){

clearInterval(countdown)

await fetch('/api/driver-accept',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
rideId:currentRide.id,
driverId
})
})

document.getElementById("alert").style.display="none"

loadRides()
}

function declineRide(){
document.getElementById("alert").style.display="none"
}

setInterval(loadRides,2000)

</script>

</body>
</html>
