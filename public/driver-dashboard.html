<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#020c2b;
color:white;
font-family:Arial;
padding:20px;
}

.back a{
color:white;
text-decoration:none;
}

.card{
background:#081a44;
padding:20px;
border-radius:18px;
margin-top:20px;
}
</style>
</head>

<body>

<div class="back">
<a href="/">← Back to Home</a>
</div>

<h1>Driver Dashboard</h1>

<div class="card">
<h2>Available Rides</h2>
<div id="rides">Loading...</div>
</div>

<script>

async function load(){

const rides = await fetch('/api/rides')
.then(r=>r.json())
.catch(()=>[])

document.getElementById("rides").innerText =
rides.length ? JSON.stringify(rides,null,2) : "No rides"

}

load()

</script>

</body>
</html>
