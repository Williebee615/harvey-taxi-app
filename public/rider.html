<!DOCTYPE html>
<html>
<head>
  <title>Request a Ride</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <div class="app-header">
      <div class="app-title">Request a Ride</div>
      <div class="app-subtitle">Book a ride in seconds</div>
    </div>

    <div class="card">
      <input class="input" id="riderName" placeholder="Rider Name" />
      <input class="input" id="phone" placeholder="Phone Number" />
      <input class="input" id="pickup" placeholder="Pickup Address" />
      <input class="input" id="dropoff" placeholder="Dropoff Address" />
      <input class="input" id="fare" placeholder="Fare" />

      <button class="button" onclick="requestRide()">Submit Ride Request</button>

      <pre id="result"></pre>
    </div>
  </div>

  <script>
    async function requestRide() {
      const res = await fetch('/api/rides/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          riderName: document.getElementById('riderName').value,
          phone: document.getElementById('phone').value,
          pickup: document.getElementById('pickup').value,
          dropoff: document.getElementById('dropoff').value,
          fare: document.getElementById('fare').value
        })
      })

      const data = await res.json()
      document.getElementById('result').innerText =
        JSON.stringify(data, null, 2)
    }
  </script>
</body>
</html>
