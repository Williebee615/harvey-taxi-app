<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi Payment</title>

  <script src="https://js.stripe.com/v3/"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      padding: 20px;
    }

    .card {
      max-width: 420px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 10px;
    }

    input, button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background: black;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    #payment-element {
      margin-top: 15px;
    }

    #message {
      margin-top: 12px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>💳 Pay for Ride</h2>

    <input id="amount" placeholder="Amount (ex: 12)" />
    <button onclick="startPayment()">Load Payment</button>

    <form id="payment-form" style="display:none;">
      <div id="payment-element"></div>
      <button type="submit">Pay Now</button>
    </form>

    <div id="message"></div>
  </div>

  <script>
    let stripe
    let elements

    async function startPayment() {
      const amount = document.getElementById('amount').value

      if (!amount) {
        document.getElementById('message').innerText = 'Enter amount'
        return
      }

      document.getElementById('message').innerText = 'Loading...'

      try {
        // ⚡ CALL YOUR BACKEND
        const res = await fetch('/create-payment-intent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            amount: Number(amount) * 100
          })
        })

        const data = await res.json()

        // ⚡ STRIPE INIT
        stripe = Stripe("pk_test_YOUR_KEY_HERE") // 🔥 REPLACE THIS
        elements = stripe.elements({
          clientSecret: data.clientSecret
        })

        const paymentElement = elements.create('payment')
        paymentElement.mount('#payment-element')

        document.getElementById('payment-form').style.display = 'block'
        document.getElementById('message').innerText = 'Ready to pay'

      } catch (err) {
        document.getElementById('message').innerText = 'Error loading payment'
      }
    }

    document.getElementById('payment-form').addEventListener('submit', async (e) => {
      e.preventDefault()

      const { error } = await stripe.confirmPayment({
        elements,
        confirmParams: {
          return_url: window.location.origin
        }
      })

      if (error) {
        document.getElementById('message').innerText = error.message
      }
    })
  </script>

</body>
</html>
