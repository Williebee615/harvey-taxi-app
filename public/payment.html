<!DOCTYPE html>
<html>
<head>
  <title>Harvey Taxi Payment</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    body {
      font-family: Arial;
      background: #f3f4f6;
      padding: 20px;
      text-align: center;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      max-width: 400px;
      margin: auto;
    }

    button {
      padding: 15px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      width: 100%;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Complete Payment</h2>
  <p id="service"></p>
  <button onclick="pay()">Pay Now</button>
</div>

<script>
  const stripe = Stripe("REPLACE_WITH_YOUR_PUBLISHABLE_KEY")

  const urlParams = new URLSearchParams(window.location.search)
  const type = urlParams.get("type")

  let amount = 1200 // cents

  if (type === "xl") amount = 1800
  if (type === "delivery") amount = 1500
  if (type === "food") amount = 2000

  document.getElementById("service").innerText = "Service: " + type

  async function pay() {
    const res = await fetch("/create-checkout-session", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ amount })
    })

    const data = await res.json()

    stripe.redirectToCheckout({ sessionId: data.id })
  }
</script>

</body>
</html>
