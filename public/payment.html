<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi Payment</title>

  <script src="https://js.stripe.com/v3/"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      padding: 20px;
      color: #111;
    }

    .container {
      max-width: 450px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 5px;
    }

    .summary {
      background: #f9fafb;
      border-radius: 12px;
      padding: 12px;
      margin: 15px 0;
      border: 1px solid #ddd;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #ddd;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    .btn-black {
      background: black;
      color: white;
    }

    #payment-element {
      margin-top: 10px;
      margin-bottom: 10px;
    }

    #message {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>💳 Complete Payment</h1>
    <p>Secure checkout for your ride</p>

    <input id="requestId" placeholder="Request ID" />

    <div class="summary">
      <div class="row">
        <span>Service</span>
        <span id="serviceName">Ride</span>
      </div>
      <div class="row">
        <span>Total</span>
        <span id="serviceAmount">$12.00</span>
      </div>
    </div>

    <button class="btn-black" onclick="loadPayment()">Load Payment</button>

    <form id="payment-form" style="display:none;">
      <div id="payment-element"></div>
      <button class="btn-black">Pay Now</button>
    </form>

    <div id="message"></div>
  </div>

  <script>
    let stripe, elements
    let amount = 1200

    const params = new URLSearchParams(window.location.search)
    const requestId = params.get('requestId') || ''
    const type = params.get('type') || 'ride'

    document.getElementById('requestId').value = requestId

    function getAmount(type) {
      if (type === 'xl') return 1800
      if (type === 'delivery') return 1500
      if (type === 'food') return 2000
      return 1200
    }

    function getLabel(type) {
      if (type === 'xl') return 'Harvey XL'
      if (type === 'delivery') return 'Delivery'
      if (type === 'food') return 'Food'
      return 'Standard Ride'
    }

    amount = getAmount(type)
    document.getElementById('serviceName').innerText = getLabel(type)
    document.getElementById('serviceAmount').innerText = `$${(amount / 100).toFixed(2)}`

    async function loadPayment() {
      const reqId = document.getElementById('requestId').value

      if (!reqId) {
        document.getElementById('message').innerText = "Missing Request ID"
        return
      }

      document.getElementById('message').innerText = "Loading..."

      // GET PUBLIC KEY
      const configRes = await fetch('/api/payments/config')
      const config = await configRes.json()

      // CREATE PAYMENT INTENT
      const res = await fetch('/create-payment-intent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          amount,
          requestId: reqId
        })
      })

      const data = await res.json()

      stripe = Stripe(config.publishableKey)
      elements = stripe.elements({ clientSecret: data.clientSecret })

      const paymentElement = elements.create('payment')
      paymentElement.mount('#payment-element')

      document.getElementById('payment-form').style.display = 'block'
      document.getElementById('message').innerText = "Ready to pay"
    }

    document.getElementById('payment-form').addEventListener('submit', async (e) => {
      e.preventDefault()

      const result = await stripe.confirmPayment({
        elements,
        confirmParams: {
          return_url: window.location.origin + "/?paid=1"
        }
      })

      if (result.error) {
        document.getElementById('message').innerText = result.error.message
      }
    })
  </script>
</body>
</html>
