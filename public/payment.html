<!DOCTYPE html>
<html>
<head>
  <title>Harvey Taxi Payment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      padding: 20px;
      text-align: center;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      max-width: 430px;
      margin: 30px auto;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    h2 {
      margin-top: 0;
    }

    input, button {
      padding: 15px;
      font-size: 16px;
      border-radius: 10px;
      width: 100%;
      box-sizing: border-box;
      margin-top: 10px;
    }

    input {
      border: 1px solid #ccc;
    }

    button {
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    #payment-element {
      margin-top: 16px;
      text-align: left;
    }

    #msg {
      margin-top: 14px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Complete Payment</h2>
    <p id="service">Service: Ride</p>

    <input id="requestId" placeholder="Request ID" />
    <button type="button" onclick="startPayment()">Load Payment Form</button>

    <form id="form" style="display:none;">
      <div id="payment-element"></div>
      <button type="submit">Pay Now</button>
    </form>

    <div id="msg"></div>
  </div>

  <script>
    let stripe
    let elements
    let amount = 1200

    const urlParams = new URLSearchParams(window.location.search)
    const type = urlParams.get('type') || 'ride'
    const requestIdParam = urlParams.get('requestId') || ''

    if (type === 'xl') amount = 1800
    if (type === 'delivery') amount = 1500
    if (type === 'food') amount = 2000

    document.getElementById('service').innerText = 'Service: ' + type
    document.getElementById('requestId').value = requestIdParam

    async function startPayment() {
      try {
        document.getElementById('msg').innerText = 'Loading payment form...'

        const configRes = await fetch('/api/payments/config')
        const configData = await configRes.json()

        if (!configRes.ok) {
          document.getElementById('msg').innerText = configData.error || 'Stripe config failed'
          return
        }

        const res = await fetch('/create-payment-intent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount })
        })

        const data = await res.json()

        if (!res.ok) {
          document.getElementById('msg').innerText = data.error || 'Could not create payment'
          return
        }

        stripe = Stripe(configData.publishableKey)
        elements = stripe.elements({ clientSecret: data.clientSecret })

        document.getElementById('payment-element').innerHTML = ''
        const paymentElement = elements.create('payment')
        paymentElement.mount('#payment-element')

        document.getElementById('form').style.display = 'block'
        document.getElementById('msg').innerText = 'Payment form ready'
      } catch (err) {
        document.getElementById('msg').innerText = 'Error loading payment form'
      }
    }

    document.getElementById('form').addEventListener('submit', async function (e) {
      e.preventDefault()

      if (!stripe || !elements) {
        document.getElementById('msg').innerText = 'Load the payment form first'
        return
      }

      const result = await stripe.confirmPayment({
        elements,
        confirmParams: {
          return_url: window.location.origin + '/request?requestId=' + encodeURIComponent(document.getElementById('requestId').value)
        }
      })

      if (result.error) {
        document.getElementById('msg').innerText = result.error.message
      }
    })
  </script>
</body>
</html>
