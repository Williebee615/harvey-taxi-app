<!DOCTYPE html>
<html>
<head>
<title>Rider Signup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#020b2d;
color:white;
font-family:Arial;
padding:20px;
}

.card{
background:#0b173f;
padding:20px;
border-radius:20px;
max-width:600px;
margin:auto;
}

input{
width:100%;
padding:15px;
margin-top:10px;
margin-bottom:15px;
border-radius:10px;
border:none;
background:#06112f;
color:white;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#6c6cf4;
color:white;
font-weight:bold;
font-size:16px;
}
</style>

</head>
<body>

<div class="card">

<h2>Rider Signup</h2>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">

<button onclick="signup()">Create Rider Account</button>

<p id="msg"></p>

</div>

<script>
async function signup(){

const name=document.getElementById('name').value
const phone=document.getElementById('phone').value
const email=document.getElementById('email').value

await fetch('/signup-rider',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({name,phone,email})
})

document.getElementById('msg').innerText="Rider account created"
}
</script>

</body>
</html>
