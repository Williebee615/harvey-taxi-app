<!DOCTYPE html>
<html>
<head>
  <title>Rider Signup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #020b2d;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
    }

    .card {
      background: #0b173f;
      border-radius: 22px;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 16px;
      margin-top: 10px;
      margin-bottom: 15px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 18px;
      background: #55abd0;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .message {
      margin-top: 16px;
      padding: 14px;
      border-radius: 14px;
      display: none;
      background: #122457;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>👤 Rider Signup</h1>

    <div class="card">
      <input id="name" placeholder="Full Name">
      <input id="phone" placeholder="Phone Number">
      <input id="email" placeholder="Email Address">

      <button onclick="signupRider()">Create Rider Account</button>

      <div id="message" class="message"></div>
    </div>
  </div>

  <script>
    async function signupRider() {
      const name = document.getElementById('name').value.trim()
      const phone = document.getElementById('phone').value.trim()
      const email = document.getElementById('email').value.trim()
      const message = document.getElementById('message')

      const response = await fetch('/signup-rider', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, phone, email })
      })

      const result = await response.json()
      message.style.display = 'block'

      if (!response.ok) {
        message.innerText = result.error || 'Could not create rider account.'
        return
      }

      message.innerText = 'Rider account created successfully.'
      document.getElementById('name').value = ''
      document.getElementById('phone').value = ''
      document.getElementById('email').value = ''
    }
  </script>
</body>
</html>
