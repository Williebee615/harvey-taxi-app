<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi | Rider Signup</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #020617, #031133);
      color: white;
      padding: 24px 16px 40px;
    }

    .card {
      max-width: 560px;
      margin: 0 auto;
      background: #0f172a;
      border-radius: 24px;
      padding: 24px 18px;
      border: 1px solid rgba(59,130,246,0.18);
    }

    h1 {
      margin: 0 0 20px;
      text-align: center;
      font-size: 44px;
      font-weight: 800;
    }

    label {
      display: block;
      margin: 16px 0 8px;
      font-size: 18px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid rgba(59,130,246,0.18);
      background: #020b28;
      color: white;
      font-size: 18px;
    }

    button {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 18px;
      background: #25c59a;
      color: #03121d;
      font-size: 20px;
      font-weight: 800;
      margin-top: 18px;
    }

    .box {
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      background: #020b28;
      white-space: pre-wrap;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Rider Signup</h1>

    <label>Full Name</label>
    <input id="name" placeholder="Enter full name" />

    <label>Email</label>
    <input id="email" placeholder="Enter email" />

    <label>Phone</label>
    <input id="phone" placeholder="Enter phone number" />

    <button onclick="signup()">Create Rider Account</button>

    <div id="result" class="box">Ready.</div>
  </div>

  <script>
    async function signup() {
      const name = document.getElementById('name').value.trim()
      const email = document.getElementById('email').value.trim()
      const phone = document.getElementById('phone').value.trim()

      const result = document.getElementById('result')

      if (!name || !email) {
        result.textContent = 'Name and email are required.'
        return
      }

      result.textContent = 'Creating rider account...'

      try {
        const res = await fetch('/api/rider-signup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            name,
            email,
            phone
          })
        })

        const data = await res.json()

        if (!res.ok) {
          result.textContent = data.error || 'Signup failed.'
          return
        }

        localStorage.setItem('harvey_rider', JSON.stringify(data.rider))

        result.textContent =
`Rider created successfully.

Rider ID: ${data.rider.id}
Verification Status: ${data.rider.verification_status}

This rider is now saved locally.
Ride requests stay locked until verification is approved.`
      } catch (error) {
        result.textContent = 'Network error.'
      }
    }
  </script>
</body>
</html>
