<!DOCTYPE html>
<html>
<head>
  <title>Driver Signup</title>
</head>
<body style="background:black;color:white;font-family:Arial;padding:20px;">

<h1 style="color:gold;">Driver Signup</h1>

<input id="name" placeholder="Driver Name" style="padding:10px;margin:10px;"><br>

<button onclick="signup()">Submit Application</button>

<p id="status"></p>

<script>
const API = "https://harvey-taxi-api2.onrender.com";

async function signup() {
  const name = document.getElementById("name").value;

  await fetch(API + "/api/driver-applications", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name })
  });

  document.getElementById("status").innerText = "Application Submitted!";
}
</script>

</body>
</html>
