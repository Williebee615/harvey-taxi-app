<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rider Verification</title>
  <style>
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#0b0f1a;
      color:white;
    }

    .container{
      max-width:700px;
      margin:0 auto;
      padding:20px;
    }

    .card{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:14px;
      padding:20px;
      margin-bottom:16px;
    }

    h1{
      margin:0 0 10px;
      font-size:28px;
    }

    p{
      color:#cbd5e1;
      line-height:1.5;
    }

    input{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#020617;
      color:white;
      margin-top:10px;
      margin-bottom:14px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    .secondary{
      background:#1f2937;
      margin-top:10px;
    }

    .badge{
      display:inline-block;
      padding:6px 12px;
      border-radius:20px;
      font-size:12px;
      font-weight:bold;
      margin-top:6px;
    }

    .pending{ background:#f59e0b; color:#111827; }
    .approved{ background:#16a34a; }
    .rejected{ background:#dc2626; }
    .neutral{ background:#334155; }

    .small{
      font-size:13px;
      color:#94a3b8;
      margin-top:8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>👤 Rider Verification</h1>
      <p>
        Riders must complete ID verification before requesting a ride, food delivery,
        or grocery delivery.
      </p>
    </div>

    <div class="card">
      <input id="name" placeholder="Full legal name" />
      <input id="email" placeholder="Email" />
      <input id="phone" placeholder="Phone number" />
      <input id="selfie" placeholder="Selfie image URL or note" />
      <input id="idFront" placeholder="ID front image URL or note" />
      <input id="idBack" placeholder="ID back image URL or note" />

      <button onclick="submitVerification()">Submit Rider Verification</button>
      <button class="secondary" onclick="checkStatus()">Check My Status</button>

      <div class="small">
        Use the same email you used for your rider account.
      </div>
    </div>

    <div class="card">
      <div><strong>Status:</strong></div>
      <div id="statusBadge" class="badge neutral">Not checked</div>
      <div id="statusText" class="small">Submit your verification, then admin can review it.</div>
    </div>
  </div>

  <script>
    function setStatus(status, text) {
      const badge = document.getElementById('statusBadge')
      const label = String(status || '').toLowerCase()

      badge.className = 'badge neutral'

      if (label.includes('approved')) badge.className = 'badge approved'
      else if (label.includes('pending')) badge.className = 'badge pending'
      else if (label.includes('rejected')) badge.className = 'badge rejected'

      badge.textContent = status || 'Unknown'
      document.getElementById('statusText').textContent = text || ''
    }

    async function submitVerification() {
      const name = document.getElementById('name').value.trim()
      const email = document.getElementById('email').value.trim()
      const phone = document.getElementById('phone').value.trim()
      const selfie = document.getElementById('selfie').value.trim()
      const idFront = document.getElementById('idFront').value.trim()
      const idBack = document.getElementById('idBack').value.trim()

      if (!email) {
        alert('Please enter your email.')
        return
      }

      try {
        const loginRes = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email,
            password: '123456'
          })
        })

        const loginData = await loginRes.json()

        if (!loginData.user) {
          alert('Rider login not found. Create your rider account first from request page.')
          return
        }

        const res = await fetch('/api/rider/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            riderId: loginData.user.id,
            name,
            email,
            phone,
            selfie,
            idFront,
            idBack
          })
        })

        const data = await res.json()

        if (!res.ok) {
          alert(data.error || 'Verification failed.')
          return
        }

        setStatus(
          data?.rider?.verification?.status || 'pending',
          'Your rider verification was submitted successfully.'
        )

        alert(data.message || 'Verification submitted.')
      } catch (error) {
        alert('Something went wrong while submitting rider verification.')
      }
    }

    async function checkStatus() {
      const email = document.getElementById('email').value.trim()

      if (!email) {
        alert('Enter your rider email first.')
        return
      }

      try {
        const loginRes = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email,
            password: '123456'
          })
        })

        const loginData = await loginRes.json()

        if (!loginData.user) {
          alert('No rider found for that email.')
          return
        }

        const user = loginData.user
        const status = user?.verification?.status || (user?.isVerified ? 'approved' : 'not_submitted')

        setStatus(status, user?.isVerified
          ? 'Your rider account is approved and ready.'
          : 'Your rider account is not approved yet.'
        )
      } catch (error) {
        alert('Unable to check status right now.')
      }
    }
  </script>
</body>
</html>
