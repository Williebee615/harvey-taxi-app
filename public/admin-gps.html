<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi • Admin GPS Tracker</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #020817 0%, #03163d 100%);
      color: white;
      padding: 20px;
    }

    .back {
      display: inline-block;
      margin-bottom: 18px;
      color: #d6e2ff;
      text-decoration: none;
      font-size: 18px;
    }

    .title {
      font-size: 2.3rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .sub {
      color: #9fb7ff;
      margin-bottom: 18px;
      line-height: 1.6;
    }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 18px;
    }

    .card {
      background: rgba(8, 24, 68, 0.95);
      border-radius: 24px;
      padding: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 12px 28px rgba(0,0,0,0.28);
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 14px;
    }

    .search {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      margin-bottom: 14px;
      background: #051335;
      color: white;
    }

    .fleet-list {
      max-height: 72vh;
      overflow-y: auto;
      padding-right: 4px;
    }

    .vehicle-item {
      background: #0b2156;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.05);
      transition: 0.2s ease;
    }

    .vehicle-item:hover {
      transform: translateY(-1px);
      border-color: rgba(124, 164, 255, 0.35);
    }

    .vehicle-item.active {
      border-color: rgba(124, 164, 255, 0.65);
      box-shadow: 0 0 18px rgba(68, 115, 255, 0.18);
    }

    .vehicle-name {
      font-size: 1rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .vehicle-meta {
      color: #c7d8ff;
      line-height: 1.55;
      font-size: 14px;
    }

    .top-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
