<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Harvey Taxi</title>
<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  background:#000;
  color:#fff;
  font-family:Arial, sans-serif;
  min-height:100vh;
  padding:20px;
}

.app{
  max-width:700px;
  margin:0 auto;
}

.title{
  font-size:34px;
  font-weight:bold;
  margin:18px 0 24px;
}

.card{
  background:#070707;
  border-radius:28px;
  padding:22px;
  margin-bottom:18px;
}

.service-title{
  font-size:18px;
  margin-bottom:18px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.service-btn{
  background:#111;
  border:1px solid #1e1e1e;
  border-radius:22px;
  padding:26px 16px;
  text-align:center;
  font-size:18px;
  color:#fff;
}

input, select{
  width:100%;
  padding:22px;
  margin-top:16px;
  border:none;
  outline:none;
  border-radius:22px;
  background:#111;
  color:#fff;
  font-size:18px;
}

button{
  width:100%;
  padding:20px;
  border:none;
  border-radius:22px;
  background:#21c45a;
  color:white;
  font-size:18px;
  font-weight:700;
  margin-top:18px;
  cursor:pointer;
}

button.secondary{
  background:#171717;
  border:1px solid #252525;
}

.map{
  height:240px;
  background:#0d0d0d;
  border-radius:24px;
  margin-top:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#5d5d5d;
  font-size:17px;
  text-align:center;
  padding:20px;
}

.status{
  background:#101010;
  padding:18px;
  border-radius:20px;
  margin-top:18px;
  font-size:16px;
  color:#d1d1d1;
  line-height:1.6;
  border:1px solid #1d1d1d;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:12px;
}

.muted{
  color:#8f8f8f;
  font-size:14px;
  margin-top:10px;
}
</style>
</head>
<body>
<div class="app">

  <div class="title">Harvey Taxi</div>

  <div class="card">
    <div class="service-title">Choose Service</div>
    <div class="grid">
      <div class="service-btn">🚕 Ride</div>
      <div class="service-btn">🍔 Food</div>
      <div class="service-btn">🛒 Grocery</div>
      <div class="service-btn">📦 Delivery</div>
    </div>
  </div>

  <div class="card">
    <div class="service-title">Request Pickup</div>

    <input id="pickup" placeholder="Pickup location" />
    <input id="dropoff" placeholder="Dropoff location" />

    <select id="rideType">
      <option>Standard Ride</option>
      <option>XL Ride</option>
      <option>Luxury Ride</option>
      <option>Female Driver</option>
    </select>

    <button onclick="requestRide()">Request Ride</button>

    <div class="muted">Dispatch mode: nearest online driver auto-assign</div>
  </div>

  <div class="card">
    <div class="map" id="mapBox">Live Dispatch Map Area</div>
    <div class="status" id="status">Waiting for ride request...</div>
  </div>
