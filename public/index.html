<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Harvey Taxi</title>

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
background:#000;
color:#fff;
font-family:Arial, sans-serif;
min-height:100vh;
padding:20px;
}

.app{
max-width:700px;
margin:0 auto;
}

.title{
font-size:34px;
font-weight:bold;
margin:18px 0 24px;
}

.card{
background:#0d0d0d;
border-radius:22px;
padding:20px;
margin-bottom:18px;
}

.service-title{
font-size:18px;
margin-bottom:14px;
}

input, select{
width:100%;
box-sizing:border-box;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
background:#171717;
color:white;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#1db954;
color:white;
font-size:16px;
font-weight:bold;
margin-top:12px;
}

button.secondary{
background:#222;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:12px;
}

.service-btn{
background:#141414;
border-radius:16px;
padding:18px;
text-align:center;
font-size:15px;
border:1px solid #222;
}

.map{
height:200px;
background:#111;
border-radius:16px;
margin-top:12px;
display:flex;
align-items:center;
justify-content:center;
color:#666;
font-size:14px;
}

.status{
background:#111;
padding:14px;
border-radius:14px;
margin-top:12px;
font-size:14px;
color:#aaa;
}

</style>
</head>

<body>

<div class="app">

<div class="title">Harvey Taxi</div>

<div class="card">
<div class="service-title">Choose Service</div>

<div class="grid">
<div class="service-btn">🚕 Ride</div>
<div class="service-btn">🍔 Food</div>
<div class="service-btn">🛒 Grocery</div>
<div class="service-btn">📦 Delivery</div>
</div>

</div>

<div class="card">
<div class="service-title">Request Pickup</div>

<input placeholder="Pickup location" id="pickup"/>
<input placeholder="Dropoff location" id="dropoff"/>

<select id="rideType">
<option>Standard Ride</option>
<option>XL Ride</option>
<option>Luxury Ride</option>
<option>Female Driver</option>
</select>

<button onclick="requestRide()">Request Ride</button>

<div class="map">
Live Map (Uber Style Coming)
</div>

<div class="status" id="status">
Waiting for request...
</div>

</div>

<div class="card">
<div class="service-title">Driver Dashboard</div>

<button class="secondary" onclick="goDriver()">
Go Online as Driver
</button>

<button class="secondary" onclick="openAdmin()">
Admin Panel
</button>

</div>

</div>

<script>

function requestRide(){
document.getElementById("status").innerHTML =
"Searching for nearby driver...";
setTimeout(()=>{
document.getElementById("status").innerHTML =
"Driver found • ETA 4 min";
},2000)
}

function goDriver(){
window.location.href="/driver.html"
}

function openAdmin(){
window.location.href="/admin.html"
}

</script>

</body>
</html>
