<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvey Taxi</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
background:#000;
color:white;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.logo{
font-size:42px;
font-weight:800;
line-height:1.1;
margin-bottom:20px;
}

.card{
background:#020617;
padding:20px;
border-radius:24px;
border:1px solid #111827;
}

.card h3{
margin-bottom:12px;
font-size:22px;
}

.input{
margin-bottom:10px;
}

.input input,
.input select{
width:100%;
padding:15px;
border-radius:14px;
border:1px solid #111827;
background:#020617;
color:white;
}

.btn{
width:100%;
padding:16px;
border-radius:14px;
border:none;
font-weight:600;
margin-top:8px;
}

.estimate{
background:#1f2937;
color:white;
}

.request{
background:#22c55e;
color:white;
}

.status{
margin-top:10px;
font-size:14px;
color:#9ca3af;
}

.fare{
margin-top:10px;
background:#020617;
padding:12px;
border-radius:14px;
border:1px solid #111827;
}
</style>
