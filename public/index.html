<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvey Taxi</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
background:linear-gradient(180deg,#020617,#020617,#020617,#030c1d);
color:white;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.header{
margin-top:10px;
margin-bottom:20px;
}

.logo{
font-size:28px;
font-weight:700;
display:flex;
align-items:center;
gap:8px;
}

.subtitle{
color:#9ca3af;
margin-top:8px;
font-size:15px;
}

.status{
display:inline-block;
margin-top:12px;
padding:6px 12px;
border-radius:20px;
background:#052e1b;
color:#4ade80;
font-size:12px;
}

.card{
background:#070f1f;
padding:18px;
border-radius:22px;
box-shadow:0 20px 50px rgba(0,0,0,.6);
}

.button{
display:flex;
align-items:center;
gap:14px;
padding:18px;
border-radius:16px;
margin-bottom:14px;
font-size:18px;
font-weight:600;
text-decoration:none;
color:white;
}

.request{
background:linear-gradient(135deg,#2563eb,#06b6d4);
}

.driver{
background:#111a2e;
}

.verify{
background:#111a2e;
}

.payment{
background:#111a2e;
}

.admin{
background:linear-gradient(135deg,#7c3aed,#ec4899);
margin-top:10px;
}

.icon{
font-size:22px;
width:28px;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo">🚕 Harvey Taxi</div>
<div class="subtitle">
Ride, delivery, and food with live driver tracking
</div>
<div class="status">● System Online</div>
</div>

<div class="card">

<a class="button request" href="/request.html">
<div class="icon">🚕</div>
Request Service
</a>

<a class="button driver" href="/driver.html">
<div class="icon">🧭</div>
Driver Dashboard
</a>

<a class="button verify" href="/driver-verification.html">
<div class="icon">✅</div>
Driver Verification
</a>

<a class="button payment" href="/payment.html">
<div class="icon">💳</div>
Payment
</a>

<a class="button admin" href="/admin">
<div class="icon">🛠️</div>
Admin Access
</a>

</div>

</div>

</body>
</html>
