<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi</title>
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      background:#000;
      color:#fff;
      font-family:Arial, sans-serif;
      min-height:100vh;
      padding:20px;
    }

    .app{
      max-width:700px;
      margin:0 auto;
    }

    .title{
      font-size:34px;
      font-weight:bold;
      margin:18px 0 24px;
    }

    .card{
      background:#070707;
      border-radius:28px;
      padding:20px;
      margin-bottom:18px;
    }

    .service-title{
      font-size:18px;
      margin-bottom:14px;
    }

    input, select{
      width:100%;
      padding:16px;
      margin-top:12px;
      border:none;
      border-radius:18px;
      background:#111;
      color:#fff;
      font-size:16px;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:18px;
      background:#22c55e;
      color:#fff;
      font-size:18px;
      font-weight:700;
      margin-top:14px;
      cursor:pointer;
    }

    button.secondary{
      background:#161616;
      border:1px solid #232323;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:12px;
    }

    .service-btn{
      background:#101010;
      border:1px solid #202020;
      border-radius:22px;
      padding:24px 18px;
      text-align:center;
      font-size:16px;
    }

    .map{
      height:220px;
      background:#0d0d0d;
      border-radius:22px;
      margin-top:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#666;
      font-size:14px;
      text-align:center;
      padding:20px;
    }

    .status{
      background:#101010;
      border-radius:18px;
      padding:16px;
      margin-top:16px;
      color:#d1d5db;
      line-height:1.5;
      min-height:70px;
    }

    .driver-box{
      margin-top:16px;
      background:#111;
      border-radius:18px;
      padding:16px;
      border:1px solid #202020;
      display:none;
    }

    .driver-box h3{
      margin-bottom:10px;
      font-size:18px;
    }

    .small{
      color:#9ca3af;
      font-size:14px;
      margin-top:6px;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:12px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">Harvey Taxi</div>

    <div class="card">
      <div class="service-title">Choose Service</div>
      <div class="grid">
        <div class="service-btn">🚕 Ride</div>
        <div class="service-btn">🍔 Food</div>
        <div class="service-btn">🛒 Grocery</div>
        <div class="service-btn">📦 Delivery</div>
      </div>
    </div>

    <div class="card">
      <div class="service-title">Request Pickup</div>

      <input id="pickup" placeholder="Pickup location" />
      <input id="dropoff" placeholder="Dropoff location" />

      <select id="rideType">
        <option>Standard Ride</option>
        <option>XL Ride</option>
        <option>Luxury Ride</option>
        <option>Female Driver</option>
      </select>

      <button onclick="requestRide()">Request Ride</button>

      <div class="status" id="status">
        Ready to request a ride.
      </div>

      <div class="driver-box" id="driverBox">
        <h3>Driver Assigned</h3>
        <div id="driverInfo"></div>
        <button class="secondary" onclick="completeRide()">Complete Ride</button>
      </div>

      <div class="map">
        Live dispatch active.<br />
        Nearest driver will be assigned automatically.
      </div>
    </div>

    <div class="card">
      <div class="service-title">Quick Access</div>
      <div class="row">
        <button class="secondary" onclick="window.location.href='/driver.html'">Driver Panel</button>
        <button class="secondary" onclick="window.location.href='/admin.html'">Admin Panel</button>
      </div>
    </div>
  </div>

  <script>
    let activeRideId = null

    async function requestRide() {
      const pickup = document.getElementById('pickup').value.trim()
      const dropoff = document.getElementById('dropoff').value.trim()
      const rideType = document.getElementById('rideType').value
      const status = document.getElementById('status')
      const driverBox = document.getElementById('driverBox')
      const driverInfo = document.getElementById('driverInfo')

      if (!pickup || !dropoff) {
        status.innerHTML = 'Please enter pickup and dropoff locations.'
        driverBox.style.display = 'none'
        return
      }

      status.innerHTML = 'Searching for nearest available driver...'
      driverBox.style.display = 'none'

      try {
        const response = await fetch('/api/request-ride', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            pickup,
            dropoff,
            rideType,
            pickupLat: 36.1627,
            pickupLng: -86.7816
          })
        })

        const data = await response.json()

        if (!response.ok || !data.success) {
          status.innerHTML = data.message || data.error || 'Could not find a driver.'
          driverBox.style.display = 'none'
          return
        }

        activeRideId = data.ride.id

        status.innerHTML = `Driver found. ${data.ride.driverName} is heading to your pickup. ETA ${data.ride.etaMinutes} min.`

        driverInfo.innerHTML = `
          <div><strong>Name:</strong> ${data.ride.driverName}</div>
          <div class="small"><strong>Car:</strong> ${data.ride.car}</div>
          <div class="small"><strong>Plate:</strong> ${data.ride.plate}</div>
          <div class="small"><strong>Pickup:</strong> ${data.ride.pickup}</div>
          <div class="small"><strong>Dropoff:</strong> ${data.ride.dropoff}</div>
          <div class="small"><strong>Ride Type:</strong> ${data.ride.rideType}</div>
        `
        driverBox.style.display = 'block'
      } catch (error) {
        status.innerHTML = 'Dispatch error. Please try again.'
        driverBox.style.display = 'none'
      }
    }

    async function completeRide() {
      const status = document.getElementById('status')
      const driverBox = document.getElementById('driverBox')

      if (!activeRideId) {
        status.innerHTML = 'No active ride found.'
        return
      }

      try {
        const response = await fetch('/api/complete-ride', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ rideId: activeRideId })
        })

        const data = await response.json()

        if (!response.ok || !data.success) {
          status.innerHTML = data.error || 'Could not complete ride.'
          return
        }

        status.innerHTML = 'Ride completed successfully. Driver is available again.'
        driverBox.style.display = 'none'
        activeRideId = null
      } catch (error) {
        status.innerHTML = 'Error completing ride.'
      }
    }
  </script>
</body>
</html>
