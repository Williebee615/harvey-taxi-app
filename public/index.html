<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvey Taxi</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#020617;
color:white;
}

.container{
max-width:700px;
margin:0 auto;
padding:20px;
}

.title{
font-size:28px;
font-weight:bold;
margin-bottom:20px;
}

.live{
background:#16a34a;
padding:6px 12px;
border-radius:20px;
font-size:12px;
margin-left:10px;
}

.card{
background:#0f172a;
border:1px solid #1f2937;
padding:22px;
border-radius:18px;
margin-bottom:16px;
font-size:20px;
cursor:pointer;
}

.card:hover{
background:#111827;
}
</style>
</head>

<body>

<div class="container">

<div class="title">
Harvey Taxi <span class="live">LIVE</span>
</div>

<div class="card" onclick="go('request.html')">
🚕 Request Ride
</div>

<div class="card" onclick="go('request.html?type=food')">
🍔 Food Delivery
</div>

<div class="card" onclick="go('request.html?type=grocery')">
🛒 Grocery Delivery
</div>

<div class="card" onclick="go('driver.html')">
🚗 Driver Dashboard
</div>

<div class="card" onclick="go('driver-verification.html')">
🪪 Driver Verification
</div>

<div class="card" onclick="go('rider-verification.html')">
👤 Rider Verification
</div>

<div class="card" onclick="go('admin.html')">
⚙️ Admin Panel
</div>

</div>

<script>
function go(page){
window.location.href = page
}
</script>

</body>
</html>
