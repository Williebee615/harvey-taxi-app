<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 20px;
      text-align: center;
    }

    h1 {
      font-size: 54px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      color: #6b7280;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 20px;
    }

    .button {
      display: block;
      text-decoration: none;
      padding: 18px;
      border-radius: 16px;
      font-size: 22px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      text-align: center;
    }

    .primary {
      background: #0f172a;
      color: white;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .admin-btn {
      background: #111827;
      color: white;
      margin-top: 16px;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 42px;
      }

      .button-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Harvey Taxi</h1>
    <p>Ride, package delivery, and food delivery with live driver tracking</p>

    <div class="card">
      <div class="button-grid">
        <a class="button primary" href="/request.html">Request Service</a>
        <a class="button secondary" href="/driver.html">Driver Dashboard</a>
        <a class="button secondary" href="/driver-verification.html">Driver Verification</a>
        <a class="button secondary" href="/payment.html">Payment</a>
      </div>

      <a class="button admin-btn" href="/admin">Admin Access</a>
    </div>
  </div>
</body>
</html>
