<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background:#000;
      color:#fff;
      font-family:Arial, sans-serif;
      min-height:100vh;
      padding:20px;
    }
    .app{max-width:760px;margin:0 auto}
    .title{
      font-size:34px;
      font-weight:bold;
      margin:18px 0 24px;
    }
    .card{
      background:#070707;
      border-radius:28px;
      padding:20px;
      margin-bottom:18px;
    }
    .service-title{
      font-size:18px;
      margin-bottom:14px;
    }
    input, select{
      width:100%;
      padding:16px;
      margin-top:12px;
      border:none;
      border-radius:18px;
      background:#111;
      color:#fff;
      font-size:16px;
    }
    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:18px;
      background:#22c55e;
      color:#fff;
      font-size:18px;
      font-weight:700;
      margin-top:14px;
      cursor:pointer;
    }
    button.secondary{
      background:#161616;
      border:1px solid #232323;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:12px;
    }
    .service-btn{
      background:#101010;
      border:1px solid #202020;
      border-radius:22px;
      padding:24px 18px;
      text-align:center;
      font-size:16px;
    }
    .status{
      background:#101010;
      border-radius:18px;
      padding:16px;
      margin-top:16px;
      color:#d1d5db;
      line-height:1.5;
      min-height:70px;
    }
    .driver-box{
      margin-top:16px;
      background:#111;
      border-radius:18px;
      padding:16px;
      border:1px solid #202020;
      display:none;
    }
    .driver-box h3{
      margin-bottom:10px;
      font-size:18px;
    }
    .small{
      color:#9ca3af;
      font-size:14px;
      margin-top:6px;
    }
    .pill{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      background:#1a1a1a;
      border:1px solid #2a2a2a;
      margin-top:10px;
      font-size:13px;
    }
    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:12px;
    }
    #map{
      height:320px;
      border-radius:22px;
      margin-top:16px;
      overflow:hidden;
    }
    .map-note{
      color:#9ca3af;
      font-size:13px;
      margin-top:10px;
    }
    .leaflet-container{
      background:#111;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">Harvey Taxi</div>

    <div class="card">
      <div class="service-title">Choose Service</div>
      <div class="grid">
        <div class="service-btn">🚕 Ride</div>
        <div class="service-btn">🍔 Food</div>
        <div class="service-btn">🛒 Grocery</div>
        <div class="service-btn">📦 Delivery</div>
      </div>
    </div>

    <div class="card">
      <div class="service-title">Request Pickup</div>

      <input id="pickup" placeholder="Pickup location" />
      <input id="dropoff" placeholder="Dropoff location" />

      <select id="rideType">
        <option>Standard Ride</option>
        <option>XL Ride</option>
        <option>Luxury Ride</option>
        <option>Female Driver</option>
      </select>

      <button onclick="requestRide()">Request Ride</button>

      <div class="status" id="status">Ready to request a ride.</div>

      <div class="driver-box" id="driverBox">
        <h3>Live Trip Status</h3>
        <div id="driverInfo"></div>
      </div>

      <div id="map"></div>
      <div class="map-note">Live moving map active.</div>
    </div>

    <div class="card">
      <div class="service-title">Quick Access</div>
      <div class="row">
        <button class="secondary" onclick="window.location.href='/driver.html'">Driver Panel</button>
        <button class="secondary" onclick="window.location.href='/admin.html'">Admin Panel</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let activeRideId = null
    let ridePoller = null
    let map
    let pickupMarker = null
    let dropoffMarker = null
    let driverMarker = null
    let routeLine = null

    const defaultPickup = { lat: 36.1627, lng: -86.7816 }
    const defaultDropoff = { lat: 36.1699, lng: -86.7944 }

    function prettyStatus(status) {
      if (status === 'assigned') return 'Assigned'
      if (status === 'accepted') return 'Accepted'
      if (status === 'arriving') return 'Arriving'
      if (status === 'arrived') return 'Arrived'
      if (status === 'in_progress') return 'In Progress'
      if (status === 'completed') return 'Completed'
      return status
    }

    function initMap() {
      map = L.map('map').setView([defaultPickup.lat, defaultPickup.lng], 13)

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap'
      }).addTo(map)
    }

    function drawRideMap(ride) {
      if (!map) return

      const pickup = [ride.pickupLat, ride.pickupLng]
      const dropoff = [ride.dropoffLat, ride.dropoffLng]
      const driverLocation = ride.driverLocation
        ? [ride.driverLocation.lat, ride.driverLocation.lng]
        : pickup

      if (pickupMarker) map.removeLayer(pickupMarker)
      if (dropoffMarker) map.removeLayer(dropoffMarker)
      if (driverMarker) map.removeLayer(driverMarker)
      if (routeLine) map.removeLayer(routeLine)

      pickupMarker = L.marker(pickup).addTo(map).bindPopup('Pickup')
      dropoffMarker = L.marker(dropoff).addTo(map).bindPopup('Dropoff')
      driverMarker = L.marker(driverLocation).addTo(map).bindPopup('Driver')

      const routePoints =
        ride.status === 'in_progress' || ride.status === 'completed'
          ? [driverLocation, dropoff]
          : [driverLocation, pickup]

      routeLine = L.polyline(routePoints).addTo(map)

      const group = L.featureGroup([pickupMarker, dropoffMarker, driverMarker, routeLine])
      map.fitBounds(group.getBounds().pad(0.25))
    }

    function renderRide(ride) {
      const driverInfo = document.getElementById('driverInfo')
      const status = document.getElementById('status')

      driverInfo.innerHTML = `
        <div><strong>Name:</strong> ${ride.driverName}</div>
        <div class="small"><strong>Car:</strong> ${ride.car}</div>
        <div class="small"><strong>Plate:</strong> ${ride.plate}</div>
        <div class="small"><strong>Pickup:</strong> ${ride.pickup}</div>
        <div class="small"><strong>Dropoff:</strong> ${ride.dropoff}</div>
        <div class="small"><strong>Ride Type:</strong> ${ride.rideType}</div>
        <div class="pill">Status: ${prettyStatus(ride.status)}</div>
        <div class="small"><strong>Update:</strong> ${ride.etaLabel}</div>
      `

      if (ride.status === 'completed') {
        status.innerHTML = 'Trip completed successfully.'
        stopRidePolling()
      } else {
        status.innerHTML = `${ride.driverName} • ${prettyStatus(ride.status)} • ${ride.etaLabel}`
      }

      drawRideMap(ride)
    }

    async function requestRide() {
      const pickup = document.getElementById('pickup').value.trim()
      const dropoff = document.getElementById('dropoff').value.trim()
      const rideType = document.getElementById('rideType').value
      const status = document.getElementById('status')
      const driverBox = document.getElementById('driverBox')

      if (!pickup || !dropoff) {
        status.innerHTML = 'Please enter pickup and dropoff locations.'
        driverBox.style.display = 'none'
        return
      }

      status.innerHTML = 'Searching for nearest available driver...'
      driverBox.style.display = 'none'

      try {
        const response = await fetch('/api/request-ride', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            pickup,
            dropoff,
            rideType,
            pickupLat: 36.1627,
            pickupLng: -86.7816,
            dropoffLat: 36.1699,
            dropoffLng: -86.7944
          })
        })

        const data = await response.json()

        if (!response.ok || !data.success) {
          status.innerHTML = data.message || data.error || 'Could not find a driver.'
          return
        }

        activeRideId = data.ride.id
        document.getElementById('driverBox').style.display = 'block'
        startRidePolling()
        await pollRide()
      } catch (error) {
        status.innerHTML = 'Dispatch error. Please try again.'
      }
    }

    async function pollRide() {
      if (!activeRideId) return

      try {
        const response = await fetch(`/api/rides/${activeRideId}`)
        const ride = await response.json()

        if (!response.ok) return

        renderRide(ride)
      } catch (error) {}
    }

    function startRidePolling() {
      stopRidePolling()
      ridePoller = setInterval(pollRide, 2500)
    }

    function stopRidePolling() {
      if (ridePoller) {
        clearInterval(ridePoller)
        ridePoller = null
      }
    }

    initMap()
  </script>
</body>
</html>
