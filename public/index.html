<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #02163a;
      color: white;
      min-height: 100vh;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 760px;
    }

    h1 {
      text-align: center;
      font-size: 58px;
      margin-bottom: 36px;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 22px;
    }

    .tile {
      background: #152754;
      border: 1px solid #294694;
      border-radius: 26px;
      min-height: 210px;
      text-decoration: none;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      transition: 0.2s ease;
    }

    .tile:hover {
      transform: translateY(-2px);
    }

    .icon {
      font-size: 42px;
      margin-bottom: 14px;
      line-height: 1;
    }

    .label {
      font-size: 24px;
      font-weight: 500;
      line-height: 1.2;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 44px;
      }

      .grid {
        gap: 18px;
      }

      .tile {
        min-height: 180px;
        border-radius: 22px;
      }

      .icon {
        font-size: 34px;
        margin-bottom: 12px;
      }

      .label {
        font-size: 19px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Harvey Taxi</h1>

    <div class="grid">
      <a class="tile" href="/request.html">
        <div class="icon">🚗</div>
        <div class="label">Ride</div>
      </a>

      <a class="tile" href="/food.html">
        <div class="icon">🍔</div>
        <div class="label">Fast Food</div>
      </a>

      <a class="tile" href="/grocery.html">
        <div class="icon">🛒</div>
        <div class="label">Grocery</div>
      </a>

      <a class="tile" href="/rider-verification.html">
        <div class="icon">🧍</div>
        <div class="label">Rider Sign Up</div>
      </a>

      <a class="tile" href="/driver.html">
        <div class="icon">🚕</div>
        <div class="label">Driver Sign Up</div>
      </a>

      <a class="tile" href="/driver-dashboard.html">
        <div class="icon">📍</div>
        <div class="label">Driver Dashboard</div>
      </a>
    </div>
  </div>
</body>
</html>
