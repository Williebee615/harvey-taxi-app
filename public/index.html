<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvey Taxi</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
}

body{
background:#0b0f1a;
color:white;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

h1{
font-size:32px;
margin-top:20px;
font-weight:700;
}

.subtitle{
color:#9aa4b2;
margin-top:8px;
margin-bottom:25px;
}

.card{
background:#121826;
border-radius:20px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,.5);
}

.button{
display:flex;
align-items:center;
gap:14px;
width:100%;
padding:18px;
border-radius:16px;
margin-bottom:14px;
font-size:18px;
font-weight:600;
text-decoration:none;
}

.primary{
background:linear-gradient(135deg,#2563eb,#06b6d4);
color:white;
}

.secondary{
background:#1a2236;
color:white;
}

.admin{
background:linear-gradient(135deg,#7c3aed,#ec4899);
color:white;
margin-top:6px;
}

.icon{
font-size:22px;
width:30px;
text-align:center;
}

.header{
margin-bottom:15px;
}

.logo{
font-size:26px;
font-weight:700;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo">🚕 Harvey Taxi</div>
<div class="subtitle">
Ride, delivery, and food with live driver tracking
</div>
</div>

<div class="card">

<a class="button primary" href="/request.html">
<span class="icon">🚕</span>
Request Service
</a>

<a class="button secondary" href="/driver.html">
<span class="icon">🧭</span>
Driver Dashboard
</a>

<a class="button secondary" href="/driver-verification.html">
<span class="icon">✅</span>
Driver Verification
</a>

<a class="button secondary" href="/payment.html">
<span class="icon">💳</span>
Payment
</a>

<a class="button admin" href="/admin">
<span class="icon">🛠️</span>
Admin Access
</a>

</div>

</div>

</body>
</html>
