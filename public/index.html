<!DOCTYPE html>
<html>
<head>
  <title>Harvey Taxi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #020b2d;
      color: white;
      padding: 24px 18px 50px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    .title {
      font-size: 34px;
      font-weight: 800;
      margin: 18px 0 28px;
      text-align: center;
    }

    .button {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
      padding: 26px 18px;
      border-radius: 24px;
      margin-bottom: 18px;
      border: none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    .request {
      background: #63c66a;
      color: white;
    }

    .rider {
      background: #55abd0;
      color: white;
    }

    .driver {
      background: linear-gradient(90deg, #6967f0, #6f76f5);
      color: white;
    }

    .pay {
      background: #efcb43;
      color: black;
    }

    .donate {
      background: #3867df;
      color: white;
    }

    .admin {
      background: #0d1738;
      color: white;
      border: 1px solid rgba(255,255,255,0.14);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">🚕 Harvey Taxi</div>

    <a class="button request" href="/request.html">Request Ride</a>

    <a class="button rider" href="/rider-signup.html">Rider Signup</a>

    <a class="button driver" href="/driver-signup.html">Driver Signup</a>

    <a class="button pay" href="https://buy.stripe.com/fZufZigi8g5V4k9gdi0Fi00" target="_blank">
      Pay for Ride
    </a>

    <a class="button donate" href="https://buy.stripe.com/00w14g14g3JrcpEc4i6kg00" target="_blank">
      Donate a Ride
    </a>

    <a class="button admin" href="/admin.html">Admin Panel</a>
  </div>
</body>
</html>
