<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #08111f;
      color: white;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px;
    }
    .card {
      background: #101a2f;
      border: 1px solid #23304f;
      border-radius: 24px;
      padding: 28px;
    }
    h1 {
      margin-top: 0;
      color: #67e8f9;
      font-size: 34px;
    }
    p {
      color: #cbd5e1;
      line-height: 1.6;
    }
    .buttons {
      display: grid;
      gap: 14px;
      margin-top: 24px;
    }
    a {
      display: block;
      text-decoration: none;
      text-align: center;
      padding: 16px;
      border-radius: 14px;
      font-weight: bold;
      background: linear-gradient(135deg, #06b6d4, #2563eb);
      color: white;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Harvey Taxi</h1>
      <p>Welcome to Harvey Taxi Service. Use the links below to test your live app.</p>

      <div class="buttons">
        <a href="/driver-verification">Driver Verification</a>
        <a href="/admin-verification">Admin Verification</a>
        <a href="/request-ride">Request a Ride</a>
        <a href="/api/health">API Health Check</a>
      </div>
    </div>
  </div>
</body>
</html>
