<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #07152b;
      color: white;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      font-size: 52px;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: #111f3d;
      border: 1px solid #223a72;
      border-radius: 28px;
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      min-height: 170px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      background: #16284d;
    }

    .icon {
      font-size: 46px;
      margin-bottom: 18px;
    }

    .label {
      font-size: 26px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Harvey Taxi</h1>

    <div class="grid">
      <div class="card" onclick="goTo('/request-ride?type=ride')">
        <div class="icon">🚗</div>
        <div class="label">Ride</div>
      </div>

      <div class="card" onclick="goTo('/request-ride?type=food')">
        <div class="icon">🍔</div>
        <div class="label">Fast Food</div>
      </div>

      <div class="card" onclick="goTo('/request-ride?type=grocery')">
        <div class="icon">🛒</div>
        <div class="label">Grocery</div>
      </div>

      <div class="card" onclick="goTo('/rider-signup')">
        <div class="icon">🧍</div>
        <div class="label">Rider Sign Up</div>
      </div>

      <div class="card" onclick="goTo('/driver-signup')">
        <div class="icon">🚕</div>
        <div class="label">Driver Sign Up</div>
      </div>

      <div class="card" onclick="goTo('/driver-dashboard')">
        <div class="icon">📍</div>
        <div class="label">Driver Dashboard</div>
      </div>
    </div>
  </div>

  <script>
    function goTo(url) {
      window.location.href = url
    }
  </script>
</body>
</html>
