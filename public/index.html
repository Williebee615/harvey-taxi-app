<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvey Taxi</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
background:linear-gradient(180deg,#000000,#050505);
color:white;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

/* HEADER */

.header{
margin-bottom:20px;
}

.logo{
font-size:42px;
font-weight:800;
line-height:1.1;
}

/* HERO */

.hero{
background:#020617;
padding:18px;
border-radius:20px;
margin-bottom:14px;
border:1px solid #111827;
}

.hero h2{
font-size:20px;
margin-bottom:5px;
}

.hero p{
color:#9ca3af;
font-size:14px;
}

/* SERVICES */

.services{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:14px;
}

.service{
background:#020617;
border-radius:14px;
padding:12px;
text-align:center;
font-size:12px;
border:1px solid #111827;
}

/* CARD */

.card{
background:#020617;
padding:20px;
border-radius:24px;
border:1px solid #111827;
}

.card h3{
margin-bottom:12px;
font-size:22px;
}

/* INPUT */

.input{
margin-bottom:10px;
}

.input input,
.input select{
width:100%;
padding:15px;
border-radius:14px;
border:1px solid #111827;
background:#020617;
color:white;
}

/* BUTTON */

.btn{
width:100%;
padding:16px;
border-radius:14px;
border:none;
font-weight:600;
margin-top:8px;
}

.estimate{
background:#1f2937;
color:white;
}

.request{
background:#22c55e;
color:white;
}

/* STATUS */

.status{
margin-top:10px;
font-size:14px;
color:#9ca3af;
}

/* FARE */

.fare{
margin-top:10px;
background:#020617;
padding:12px;
border-radius:14px;
border:1px solid #111827;
}

</style>
