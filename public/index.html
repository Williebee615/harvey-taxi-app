<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvey Taxi</title>

<style>
body{

background:#0b0f1a;
color:white;

.header{

font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:12px;
margin-bottom:15px;

.card:hover{

}

.button{
background:#2563eb;
padding:15px;

text-align:center;

}

.badge{
background:#16a34a;

<body>

<div class="header">
Harvey Taxi
<span class="badge">LIVE</span>
</div>

<div class="container">

</div>

<div class="card" onclick="go('request.html?service=food')">
🍔 Food Delivery
</div>

<div class="card" onclick="go('request.html?service=groceries')">
🛒 Grocery Delivery
</div>

<div class="card" onclick="go('driver.html')">
🚗 Driver Dashboard
</div>

<div class="card" onclick="go('driver-verification.html')">
🪪 Driver Verification
</div>

<div class="card" onclick="go('rider-verification.html')">

</div>

</div>

</div>

<script>
function go(page){

}
</script>

</html>
