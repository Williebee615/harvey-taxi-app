<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Harvey Taxi</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f3f4f6;
  color: #111827;
}

.app {
  max-width: 470px;
  margin: auto;
  padding: 20px;
}

.brand {
  text-align: center;
  margin-bottom: 20px;
}

.brand h1 {
  margin: 0;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 14px;
  margin-bottom: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.tab {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  background: #e5e7eb;
}

.tab.active {
  background: black;
  color: white;
}

input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.option {
  padding: 14px;
  border: 2px solid #e5e7eb;
  border-radius: 12px;
  margin-top: 10px;
  cursor: pointer;
}

.option.selected {
  border-color: black;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border-radius: 12px;
  border: none;
  background: black;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="app">

  <div class="brand">
    <h1>🚕 Harvey Taxi</h1>
    <p>Ride • Food • Delivery</p>
  </div>

  <!-- LOGIN -->
  <div class="card">
    <div class="tabs">
      <button class="tab active">Login</button>
      <button class="tab">Sign Up</button>
    </div>

    <input id="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>
    <button onclick="login()">Login as Rider</button>
  </div>

  <!-- SERVICE -->
  <div class="card">

    <h3>Choose Service</h3>

    <div class="tabs">
      <button class="tab active" onclick="setService('ride')">🚕 Ride</button>
      <button class="tab" onclick="setService('delivery')">📦 Delivery</button>
      <button class="tab" onclick="setService('food')">🍔 Food</button>
    </div>

    <input id="pickup" placeholder="Pickup location"/>
    <input id="destination" placeholder="Destination / Drop-off"/>

    <!-- DELIVERY EXTRA -->
    <div id="deliveryBox" style="display:none;">
      <input id="item" placeholder="What are you sending?"/>
    </div>

    <!-- OPTIONS -->
    <div id="rideOptions">
      <div class="option selected" onclick="selectOption(this,'ride')">
        🚕 Harvey Standard - $12
      </div>

      <div class="option" onclick="selectOption(this,'xl')">
        🚐 Harvey XL - $18
      </div>
    </div>

    <div id="deliveryOptions" style="display:none;">
      <div class="option selected" onclick="selectOption(this,'delivery')">
        📦 Package Delivery - $15
      </div>

      <div class="option" onclick="selectOption(this,'food')">
        🍔 Food Delivery - $20
      </div>
    </div>

    <button onclick="requestService()">Request Service</button>

  </div>

</div>

<script>
let currentService = "ride"
let selectedType = "ride"

function setService(type) {
  currentService = type

  document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'))

  event.target.classList.add('active')

  document.getElementById('rideOptions').style.display = (type === 'ride') ? 'block' : 'none'
  document.getElementById('deliveryOptions').style.display = (type !== 'ride') ? 'block' : 'none'
  document.getElementById('deliveryBox').style.display = (type !== 'ride') ? 'block' : 'none'
}

function selectOption(el, type) {
  selectedType = type

  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'))
  el.classList.add('selected')
}

async function requestService() {

  const pickup = document.getElementById('pickup').value
  const destination = document.getElementById('destination').value
  const item = document.getElementById('item').value

  const res = await fetch('/api/requests', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      riderName: "App User",
      pickup,
      destination,
      serviceType: selectedType,
      notes: item
    })
  })

  const data = await res.json()

  if(data.request){
    alert("Request created! Redirecting to payment...")

    window.location.href = `/payment.html?requestId=${data.request.id}`
  } else {
    alert("Error creating request")
  }
}

function login(){
  alert("Login system connected (next upgrade will make it real)")
}
</script>

</body>
</html>
