<!DOCTYPE html>
<html>
<head>
  <title>Harvey Taxi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: white;
    }

    header {
      background: #111827;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .card {
      background: #1f2937;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
    }

    .status {
      margin-top: 10px;
      font-weight: bold;
    }

    .driver {
      background: #374151;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>🚖 Harvey Taxi</header>

<div class="container">

  <input id="name" placeholder="Your Name" />
  <input id="pickup" placeholder="Pickup Location" />
  <input id="destination" placeholder="Destination" />

  <select id="serviceType">
    <option value="ride">Ride</option>
    <option value="delivery">Delivery</option>
    <option value="food">Food</option>
  </select>

  <button onclick="requestRide()">Request Service</button>

  <div id="status" class="status"></div>

  <div id="driverCard" class="card" style="display:none;">
    <h3>Driver Assigned</h3>
    <div id="driverInfo"></div>
  </div>

</div>

<script>

let currentRequestId = null

async function requestRide() {
  const name = document.getElementById('name').value
  const pickup = document.getElementById('pickup').value
  const destination = document.getElementById('destination').value
  const serviceType = document.getElementById('serviceType').value

  const res = await fetch('/api/requests', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      riderName: name,
      pickup,
      destination,
      serviceType
    })
  })

  const data = await res.json()

  currentRequestId = data.request.id

  document.getElementById('status').innerText = "🔍 Searching for driver..."

  trackRide()
}

async function trackRide() {
  if (!currentRequestId) return

  const res = await fetch('/api/requests/' + currentRequestId)
  const ride = await res.json()

  if (ride.status === 'matched' || ride.status === 'accepted') {
    document.getElementById('status').innerText = "🚗 Driver found!"

    document.getElementById('driverCard').style.display = 'block'
    document.getElementById('driverInfo').innerHTML = `
      👤 ${ride.driverName} <br>
      🚘 ${ride.driverVehicle} <br>
      📍 Distance: ${ride.estimatedDistanceKm} km
    `
  }

  if (ride.status === 'in_progress') {
    document.getElementById('status').innerText = "🛣️ Ride in progress"
  }

  if (ride.status === 'completed') {
    document.getElementById('status').innerText = "✅ Ride completed"
  }

  setTimeout(trackRide, 3000)
}

</script>

</body>
</html>
