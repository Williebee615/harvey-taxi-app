<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvey Super App</title>

<style>
body{
background:#0b0b0b;
color:white;
font-family:Arial;
padding:20px;
}

.card{
background:#111;
padding:20px;
margin-bottom:15px;
border-radius:12px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#1db954;
color:white;
font-size:16px;
margin-top:10px;
}

.title{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}
</style>
</head>

<body>

<div class="title">
Harvey Super App
</div>

<div class="card">
🚕 Ride
<button onclick="request('ride')">
Request Ride
</button>
</div>

<div class="card">
🍔 Food Delivery
<button onclick="request('food')">
Order Food
</button>
</div>

<div class="card">
🛒 Grocery Delivery
<button onclick="request('grocery')">
Order Groceries
</button>
</div>

<div class="card">
📦 Package Delivery
<button onclick="request('package')">
Send Package
</button>
</div>

<script>
function request(type){

navigator.geolocation.getCurrentPosition(pos=>{

fetch('/request',{
method:"POST",
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
type:type,
lat:pos.coords.latitude,
lng:pos.coords.longitude
})
})
.then(r=>r.json())
.then(data=>{
alert("Searching for driver...")
})

})

}
</script>

</body>
</html>
