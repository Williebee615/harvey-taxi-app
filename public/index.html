<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvey Taxi</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
padding:20px;
}

.card{
background:#080808;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:18px;
margin-bottom:15px;
border-radius:15px;
border:none;
background:#111;
color:white;
font-size:16px;
}

button{
width:100%;
padding:20px;
border:none;
border-radius:15px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.green{
background:#2ecc71;
color:white;
}

.gray{
background:#222;
color:white;
margin-bottom:10px;
}

#fareBox{
margin-top:15px;
background:#111;
padding:15px;
border-radius:15px;
}

</style>

</head>
<body>

<h1>Harvey Taxi</h1>

<div class="card">

<h2>Request Pickup</h2>

<input id="pickup" placeholder="Pickup location">

<input id="dropoff" placeholder="Dropoff location">

<select id="rideType">
<option>Standard Ride</option>
<option>XL Ride</option>
<option>Priority Ride</option>
</select>

<button class="gray" id="estimateBtn">
Estimate Fare
</button>

<button class="green" id="requestBtn">
Request Ride
</button>

<div id="status">
Ready
</div>

<div id="fareBox"></div>

</div>

<script>

const pickup =
document.getElementById("pickup")

const dropoff =
document.getElementById("dropoff")

const estimateBtn =
document.getElementById("estimateBtn")

const requestBtn =
document.getElementById("requestBtn")

const status =
document.getElementById("status")

const fareBox =
document.getElementById("fareBox")

function showFare(data){

fareBox.innerHTML = `
Distance: ${data.trip.distanceMiles} miles <br>
ETA: ${data.trip.durationMinutes} min <br><br>

Base: $${data.fare.baseFare}<br>
Distance: $${data.fare.distanceFare}<br>
Time: $${data.fare.timeFare}<br>
Booking: $${data.fare.bookingFee}<br>
Service: $${data.fare.serviceFee}<br><br>

<b>Total: $${data.fare.totalFare}</b>
`

}

estimateBtn.onclick = async ()=>{

status.innerHTML="Calculating..."

const res = await fetch("/api/fare/estimate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
pickupAddress:pickup.value,
dropoffAddress:dropoff.value
})
})

const data = await res.json()

showFare(data)

status.innerHTML="Estimate ready"

}

requestBtn.onclick = async ()=>{

status.innerHTML="Requesting ride..."

const res = await fetch("/api/rides/request",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
pickupAddress:pickup.value,
dropoffAddress:dropoff.value,
serviceType:"Ride"
})
})

const data = await res.json()

showFare(data.ride)

status.innerHTML="Driver search started"

}

</script>

</body>
</html>
