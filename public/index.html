<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 430px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 28px 22px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .logo {
      font-size: 56px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 40px;
      font-weight: 800;
    }

    p {
      margin: 12px 0 28px;
      color: #666;
      font-size: 16px;
      line-height: 1.5;
    }

    .btn {
      display: block;
      width: 100%;
      text-decoration: none;
      text-align: center;
      padding: 18px 20px;
      border-radius: 18px;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 14px;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .btn-rider {
      background: #000;
      color: #fff;
    }

    .btn-driver {
      background: #222;
      color: #fff;
    }

    .btn-admin {
      background: #5a2ca0;
      color: #fff;
    }

    .footer {
      margin-top: 14px;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="logo">🚖</div>
      <h1>Harvey Taxi</h1>
      <p>Select how you want to enter the platform.</p>

      <a class="btn btn-rider" href="/request.html">Rider App</a>
      <a class="btn btn-driver" href="/driver.html">Driver App</a>
      <a class="btn btn-admin" href="/admin.html">Admin Panel</a>

      <div class="footer">
        Nashville transportation platform
      </div>
    </div>
  </div>
</body>
</html>
