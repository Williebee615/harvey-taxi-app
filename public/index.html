<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Harvey Taxi</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#020617;
color:white;
}

.app{
max-width:500px;
margin:auto;
min-height:100vh;
display:flex;
flex-direction:column;
}

.header{
padding:20px;
}

.greeting{
font-size:14px;
opacity:.7;
}

.location{
font-size:18px;
font-weight:600;
margin-top:4px;
}

.search{
margin-top:15px;
background:#071122;
border-radius:14px;
padding:16px;
font-size:16px;
}

.cards{
padding:16px;
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.card{
background:#071122;
padding:20px;
border-radius:18px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

.card:hover{
transform:translateY(-2px);
background:#0b1836;
}

.primary{
grid-column:1/-1;
background:linear-gradient(135deg,#62f5ff,#67a7ff);
color:black;
}

.status{
margin:16px;
background:#071122;
padding:16px;
border-radius:14px;
font-size:14px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#020617;
border-top:1px solid #111;
display:flex;
justify-content:space-around;
padding:12px 0;
}

.nav-btn{
font-size:12px;
opacity:.7;
text-align:center;
}

.nav-btn.active{
opacity:1;
}

.spacer{
height:80px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="greeting">Good evening</div>
<div class="location">Nashville, Tennessee</div>

<div class="search">
Where are you going?
</div>
</div>

<div class="cards">

<div class="card primary" onclick="location.href='request-ride.html'">
Request Ride
</div>

<div class="card">
Schedule Ride
</div>

<div class="card">
My Trips
</div>

<div class="card">
Safety
</div>

</div>

<div class="status">
No active rides. Request a ride to get started.
</div>

<div class="spacer"></div>

</div>

<div class="bottom-nav">

<div class="nav-btn active">
Home
</div>

<div class="nav-btn">
Trips
</div>

<div class="nav-btn">
Safety
</div>

<div class="nav-btn">
Account
</div>

</div>

</body>
</html>
