<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Harvey Taxi</title>

<style>
body {
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.header{
padding:20px;
font-size:24px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:20px;
}

.card{
background:#111a2e;
padding:25px;
border-radius:16px;
text-align:center;
font-size:18px;
cursor:pointer;
border:1px solid #1f2b47;
}

.icon{
font-size:30px;
margin-bottom:10px;
}

.card:hover{
background:#18223a;
}
</style>
</head>

<body>

<div class="header">
Harvey Taxi
</div>

<div class="grid">

<div class="card" onclick="goRide()">
<div class="icon">🚗</div>
Ride
</div>

<div class="card" onclick="goFood()">
<div class="icon">🍔</div>
Fast Food
</div>

<div class="card" onclick="goGrocery()">
<div class="icon">🛒</div>
Grocery
</div>

<div class="card" onclick="goDelivery()">
<div class="icon">📦</div>
Delivery
</div>

</div>

<script>
function goRide(){
window.location.href="/request-ride"
}

function goFood(){
window.location.href="/request-ride?type=food"
}

function goGrocery(){
window.location.href="/request-ride?type=grocery"
}

function goDelivery(){
window.location.href="/request-ride?type=delivery"
}
</script>

</body>
</html>
