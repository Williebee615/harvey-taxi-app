<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dispatch Console | Harvey Taxi</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #131a2e;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
    }

    h1 {
      text-align: center;
      margin-top: 0;
    }

    .dispatch-card {
      border: 1px solid #283252;
      background: #0e1528;
      border-radius: 16px;
      padding: 16px;
      margin-top: 14px;
    }

    .row {
      margin-bottom: 8px;
    }

    .label {
      color: #91a4d7;
      font-size: 13px;
    }

    .value {
      font-size: 15px;
      margin-top: 2px;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .refresh-btn {
      background: #3a86ff;
      border: none;
      color: white;
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }

    .empty {
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      background: #0e1528;
      color: #d5dfff;
    }

    .status-pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      background: #1f2c4d;
      color: #dbe7ff;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-row">
      <h1>Admin Dispatch Console</h1>
      <button class="refresh-btn" onclick="loadActiveDispatches()">Refresh</button>
    </div>

    <div id="activeDispatches"></div>
  </div>

  <script>
    async function loadActiveDispatches() {
      const container = document.getElementById('activeDispatches')
      container.innerHTML = 'Loading active dispatches...'

      try {
        const res = await fetch('/api/admin/active-dispatches')
        const data = await res.json()

        if (!Array.isArray(data) || data.length === 0) {
          container.innerHTML = '<div class="empty">No active dispatches right now.</div>'
          return
        }

        container.innerHTML = data.map(item => `
          <div class="dispatch-card">
            <div class="row">
              <span class="status-pill">${item.status}</span>
            </div>

            <div class="row">
              <div class="label">Dispatch ID</div>
              <div class="value">${item.id}</div>
            </div>

            <div class="row">
              <div class="label">Ride ID</div>
              <div class="value">${item.rideId}</div>
            </div>

            <div class="row">
              <div class="label">Vehicle ID</div>
              <div class="value">${item.vehicleId}</div>
            </div>

            <div class="row">
              <div class="label">Driver</div>
              <div class="value">${item.driverId || 'AV MODE'}</div>
            </div>

            <div class="row">
              <div class="label">Fleet Type</div>
              <div class="value">${item.fleetType}</div>
            </div>

            <div class="row">
              <div class="label">Pickup Address</div>
              <div class="value">${item.pickup?.address || 'N/A'}</div>
            </div>

            <div class="row">
              <div class="label">Dropoff Address</div>
              <div class="value">${item.dropoff?.address || 'N/A'}</div>
            </div>

            <div class="row">
              <div class="label">Distance From Vehicle</div>
              <div class="value">${Number(item.milesAway || 0).toFixed(2)} miles</div>
            </div>

            <div class="row">
              <div class="label">Created</div>
              <div class="value">${item.createdAt || ''}</div>
            </div>
          </div>
        `).join('')
      } catch (err) {
        console.error(err)
        container.innerHTML = '<div class="empty">Failed to load active dispatches.</div>'
      }
    }

    loadActiveDispatches()
    setInterval(loadActiveDispatches, 4000)
  </script>
</body>
</html>
