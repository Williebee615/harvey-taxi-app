<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi Driver Signup</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(180deg, #06112d 0%, #081735 45%, #091a3f 100%);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    .top-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #b9c7ea;
      text-decoration: none;
      font-size: 15px;
    }

    .card {
      background: rgba(19, 31, 59, 0.96);
      border: 1px solid rgba(126, 155, 255, 0.16);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 22px 45px rgba(0, 0, 0, 0.28);
    }

    h1 {
      font-size: 38px;
      margin-bottom: 10px;
      font-weight: 800;
    }

    .subtitle {
      color: #afbedf;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #dbe5ff;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 15px 14px;
      border-radius: 14px;
      border: 1px solid rgba(125, 150, 255, 0.18);
      background: rgba(8, 17, 42, 0.96);
      color: white;
      font-size: 15px;
      outline: none;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #6f8cff;
      box-shadow: 0 0 0 3px rgba(80, 113, 255, 0.18);
    }

    .submit-btn {
      width: 100%;
      margin-top: 8px;
      border: none;
      border-radius: 18px;
      min-height: 60px;
      font-size: 19px;
      font-weight: 800;
      color: white;
      cursor: pointer;
      background: linear-gradient(90deg, #2962ff 0%, #7b2cff 100%);
      box-shadow: 0 12px 25px rgba(57, 93, 255, 0.35);
    }

    .message {
      margin-top: 16px;
      font-size: 15px;
      line-height: 1.5;
      min-height: 24px;
    }

    .success {
      color: #7ef0a7;
    }

    .error {
      color: #ff9d9d;
    }

    .info-box {
      margin-top: 24px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(8, 17, 42, 0.85);
      border: 1px solid rgba(125, 150, 255, 0.12);
    }

    .info-box h3 {
      font-size: 16px;
      margin-bottom: 8px;
    }

    .info-box p {
      color: #b7c3df;
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .field.full {
        grid-column: auto;
      }

      h1 {
        font-size: 31px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="top-link" href="/">← Back to Home</a>

    <div class="card">
      <h1>Driver Signup</h1>
      <p class="subtitle">
        Apply to drive with Harvey Taxi. Submit your details below for admin review and approval.
      </p>

      <form id="driverSignupForm">
        <div class="grid">
          <div class="field">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter full name" required />
          </div>

          <div class="field">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter email address" required />
          </div>

          <div class="field">
            <label for="phone">Phone Number</label>
            <input type="text" id="phone" placeholder="Enter phone number" required />
          </div>

          <div class="field">
            <label for="city">City</label>
            <input type="text" id="city" placeholder="Enter city" required />
          </div>

          <div class="field">
            <label for="vehicle">Vehicle Type</label>
            <input type="text" id="vehicle" placeholder="Ex: Sedan, SUV, Van" required />
          </div>

          <div class="field">
            <label for="license">Driver License Number</label>
            <input type="text" id="license" placeholder="Enter license number" required />
          </div>

          <div class="field full">
            <label for="notes">Extra Notes</label>
            <textarea id="notes" placeholder="Add anything helpful about your driving background, availability, or vehicle"></textarea>
          </div>
        </div>

        <button type="submit" class="submit-btn">Submit Driver Application</button>
        <div class="message" id="message"></div>
      </form>

      <div class="info-box">
        <h3>Application Review</h3>
        <p>
          Once submitted, your application will appear in the Harvey Taxi Admin Panel for approval or rejection.
        </p>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('driverSignupForm')
    const message = document.getElementById('message')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()

      message.className = 'message'
      message.textContent = 'Submitting application...'

      const payload = {
        id: Date.now().toString(),
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        city: document.getElementById('city').value.trim(),
        vehicle: document.getElementById('vehicle').value.trim(),
        license: document.getElementById('license').value.trim(),
        notes: document.getElementById('notes').value.trim()
      }

      try {
        const res = await fetch('/api/driver-signup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        })

        const data = await res.json()

        if (data.success) {
          message.className = 'message success'
          message.textContent = 'Driver application submitted successfully. Admin review is now pending.'
          form.reset()
        } else {
          message.className = 'message error'
          message.textContent = data.message || 'Could not submit driver application.'
        }
      } catch (err) {
        message.className = 'message error'
        message.textContent = 'Server error. Please try again.'
      }
    })
  </script>
</body>
</html>
