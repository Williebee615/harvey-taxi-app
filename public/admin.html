<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi Admin Panel</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(180deg, #06112d 0%, #081735 45%, #091a3f 100%);
      color: white;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 16px 18px;
      background: rgba(8, 23, 53, 0.95);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .topbar-left h1 {
      font-size: 20px;
      font-weight: 800;
    }

    .topbar-left p {
      color: #b7c3df;
      font-size: 13px;
      margin-top: 4px;
    }

    .logout-btn {
      border: none;
      color: white;
      cursor: pointer;
      font-weight: 700;
      border-radius: 12px;
      padding: 10px 16px;
      background: linear-gradient(90deg, #2962ff 0%, #7b2cff 100%);
      box-shadow: 0 10px 25px rgba(57, 93, 255, 0.28);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 18px 60px;
    }

    .hero {
      margin-bottom: 28px;
    }

    .hero h2 {
      font-size: 42px;
      font-weight: 800;
      line-height: 1.08;
      margin-bottom: 12px;
    }

    .hero p {
      font-size: 18px;
      color: #aab7d8;
      line-height: 1.6;
      max-width: 760px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 16px;
      margin-bottom: 30px;
    }

    .summary-card {
      background: rgba(18, 30, 58, 0.94);
      border: 1px solid rgba(126, 155, 255, 0.16);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.2);
    }

    .summary-card h3 {
      font-size: 11px;
      color: #9eb0d9;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .summary-card .number {
      font-size: 24px;
      font-weight: 800;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 20px;
    }
