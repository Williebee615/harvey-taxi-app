<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Harvey Taxi Admin</title>

<style>
body{
font-family:Arial;
background:#021433;
color:white;
padding:20px;
}

h1{
margin-bottom:20px;
}

.card{
background:#0b1f4a;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

button{
padding:10px;
border:none;
border-radius:8px;
margin-top:6px;
margin-right:6px;
font-weight:bold;
}

.assign{ background:#3b82f6; color:white }
.accept{ background:#10b981; color:white }
.start{ background:#f59e0b; color:white }
.complete{ background:#ef4444; color:white }

.status{
font-size:12px;
opacity:0.8;
margin-top:5px;
}

</style>
</head>

<body>

<h1>🚕 Harvey Taxi Admin</h1>

<div id="rides"></div>

<script>

async function loadRides(){
const res = await fetch('/api/rides')
const rides = await res.json()

const container = document.getElementById('rides')
container.innerHTML = ''

rides.reverse().forEach(ride=>{

const div = document.createElement('div')
div.className = 'card'

div.innerHTML = `
<b>Ride ID:</b> ${ride.id}<br>
<b>Pickup:</b> ${ride.pickup}<br>
<b>Dropoff:</b> ${ride.dropoff}<br>

<div class="status">
Status: ${ride.status}
</div>
`

/* assign */
if(ride.status === 'requested'){
const btn = document.createElement('button')
btn.className = 'assign'
btn.innerText = 'Assign Driver'
btn.onclick = ()=>assignDriver(ride.id)
div.appendChild(btn)
}

/* accept */
if(ride.status === 'assigned'){
const btn = document.createElement('button')
btn.className = 'accept'
btn.innerText = 'Driver Accept'
btn.onclick = ()=>driverAccept(ride.id)
div.appendChild(btn)
}

/* start */
if(ride.status === 'enroute'){
const btn = document.createElement('button')
btn.className = 'start'
btn.innerText = 'Start Trip'
btn.onclick = ()=>startTrip(ride.id)
div.appendChild(btn)
}

/* complete */
if(ride.status === 'in_progress'){
const btn = document.createElement('button')
btn.className = 'complete'
btn.innerText = 'Complete Trip'
btn.onclick = ()=>completeTrip(ride.id)
div.appendChild(btn)
}

container.appendChild(div)

})
}

/* assign driver */
async function assignDriver(id){
await fetch('/api/assign-driver',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
rideId:id,
driverId:'driver1'
})
})
loadRides()
}

/* accept */
async function driverAccept(id){
await fetch('/api/driver-accept',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
rideId:id
})
})
loadRides()
}

/* start trip */
async function startTrip(id){
await fetch('/api/start-trip',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
rideId:id
})
})
loadRides()
}

/* complete */
async function completeTrip(id){
await fetch('/api/complete-trip',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
rideId:id
})
})
loadRides()
}

loadRides()
setInterval(loadRides,3000)

</script>

</body>
</html>
