<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvey Taxi Admin</title>

<style>
body{
background:#06112d;
color:white;
font-family:Arial;
padding:20px;
}

.card{
background:#0c1a3d;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.driver{
background:#081735;
padding:15px;
border-radius:10px;
margin-top:10px;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
margin-right:10px;
margin-top:10px;
font-weight:bold;
}

.approve{background:#00c853;color:white;}
.reject{background:#ff1744;color:white;}

.error{
color:#ff5252;
margin-top:10px;
}
</style>
</head>

<body>

<h1>🛠 Harvey Taxi Admin Panel</h1>

<div class="card">
<h2>Driver Applications</h2>
<div id="drivers">Loading drivers...</div>
<div id="driverError" class="error"></div>
</div>

<div class="card">
<h2>Rider Accounts</h2>
<div id="riders">Loading riders...</div>
<div id="riderError" class="error"></div>
</div>

<script>

async function loadDrivers(){

try{

const res = await fetch('/api/drivers')

if(!res.ok){
throw new Error('API not responding')
}

const drivers = await res.json()

const container = document.getElementById('drivers')

if(!drivers.length){
container.innerHTML='No drivers yet'
return
}

container.innerHTML=''

drivers.forEach(d=>{

const div=document.createElement('div')
div.className='driver'

div.innerHTML=`
<b>${d.name || 'Unnamed Driver'}</b><br>
${d.email || ''}<br>
Status: ${d.status || 'pending'}<br>

<button class="approve" onclick="approve('${d.id}')">
Approve
</button>

<button class="reject" onclick="reject('${d.id}')">
Reject
</button>
`

container.appendChild(div)

})

}catch(e){

document.getElementById('drivers').innerHTML=''
document.getElementById('driverError').innerText =
'Could not load drivers. Server not responding.'

}

}

async function loadRiders(){

try{

const res = await fetch('/api/riders')

if(!res.ok){
throw new Error('API not responding')
}

const riders = await res.json()

const container = document.getElementById('riders')

if(!riders.length){
container.innerHTML='No riders yet'
return
}

container.innerHTML=''

riders.forEach(r=>{

const div=document.createElement('div')
div.className='driver'

div.innerHTML=`
<b>${r.name || 'Unnamed Rider'}</b><br>
${r.email || ''}
`

container.appendChild(div)

})

}catch(e){

document.getElementById('riders').innerHTML=''
document.getElementById('riderError').innerText =
'Could not load riders. Server not responding.'

}

}

async function approve(id){

await fetch('/api/approve-driver',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({id})
})

loadDrivers()

}

async function reject(id){

await fetch('/api/reject-driver',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({id})
})

loadDrivers()

}

loadDrivers()
loadRiders()

</script>

</body>
</html>
