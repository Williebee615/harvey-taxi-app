<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Harvey Taxi Admin</title>

<style>
body{
background:#06112d;
color:white;
font-family:Arial, Helvetica, sans-serif;
margin:0;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logout{
background:linear-gradient(90deg,#2962ff,#7b2cff);
border:none;
padding:8px 14px;
border-radius:8px;
color:white;
font-weight:bold;
}

.card{
background:#0c1a3d;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.driver{
background:#081735;
padding:15px;
border-radius:10px;
margin-top:10px;
}

button{
margin-top:10px;
margin-right:10px;
padding:8px 12px;
border:none;
border-radius:8px;
font-weight:bold;
}

.approve{
background:#00c853;
color:white;
}

.reject{
background:#ff1744;
color:white;
}
</style>
</head>

<body>

<script>
const isAdmin = localStorage.getItem('harveyAdminLoggedIn')
if(!isAdmin){
window.location.href='/admin-login.html'
}
</script>

<div class="header">
<h1>🛠 Harvey Taxi Admin Panel</h1>
<button class="logout" onclick="logout()">Logout</button>
</div>

<div class="card">
<h2>Driver Applications</h2>
<div id="drivers">Loading drivers...</div>
</div>

<div class="card">
<h2>Rider Accounts</h2>
<div id="riders">Loading riders...</div>
</div>

<script>
function logout(){
localStorage.removeItem('harveyAdminLoggedIn')
window.location.href='/admin-login.html'
}

async function loadDrivers(){
const res = await fetch('/api/drivers')
const drivers = await res.json()

const container = document.getElementById('drivers')

if(!drivers.length){
container.innerHTML='No drivers yet'
return
}

container.innerHTML=''

drivers.forEach(d=>{
const div=document.createElement('div')
div.className='driver'

div.innerHTML=`
<b>${d.name || 'Unnamed Driver'}</b><br/>
${d.email || ''}<br/>
Status: ${d.status || 'pending'}<br/>

<button class="approve" onclick="approve('${d.id}')">
Approve
</button>

<button class="reject" onclick="reject('${d.id}')">
Reject
</button>
`

container.appendChild(div)
})
}

async function loadRiders(){
const res = await fetch('/api/riders')
const riders = await res.json()

const container = document.getElementById('riders')

if(!riders.length){
container.innerHTML='No riders yet'
return
}

container.innerHTML=''

riders.forEach(r=>{
const div=document.createElement('div')
div.className='driver'

div.innerHTML=`
<b>${r.name || 'Unnamed Rider'}</b><br/>
${r.email || ''}
`

container.appendChild(div)
})
}

async function approve(id){
await fetch('/api/approve-driver',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({id})
})

loadDrivers()
}

async function reject(id){
await fetch('/api/reject-driver',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({id})
})

loadDrivers()
}

loadDrivers()
loadRiders()
</script>

</body>
</html>
