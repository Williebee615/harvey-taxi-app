<!DOCTYPE html>
<html>
<head>
  <title>Harvey Taxi Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #020b2d;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    h2 {
      margin-top: 28px;
      margin-bottom: 14px;
      font-size: 24px;
    }

    .card {
      background: #0b173f;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .line {
      margin: 6px 0;
      color: #d8e2ff;
    }

    .status {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: bold;
      margin-top: 10px;
    }

    .pending {
      background: #facc15;
      color: black;
    }

    .approved {
      background: #22c55e;
      color: white;
    }

    .rejected {
      background: #ef4444;
      color: white;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .approve-btn {
      background: #22c55e;
      color: white;
    }

    .reject-btn {
      background: #ef4444;
      color: white;
    }

    .empty {
      background: #0b173f;
      border-radius: 18px;
      padding: 16px;
      color: #c9d5ff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛠️ Harvey Taxi Admin Panel</h1>

    <h2>Driver Applications</h2>
    <div id="driversList" class="empty">Loading drivers...</div>

    <h2>Rider Accounts</h2>
    <div id="ridersList" class="empty">Loading riders...</div>
  </div>

  <script>
    async function loadDrivers() {
      const response = await fetch('/api/admin/drivers')
      const drivers = await response.json()
      const el = document.getElementById('driversList')

      if (!drivers.length) {
        el.className = 'empty'
        el.innerHTML = 'No driver applications yet.'
        return
      }

      el.className = ''
      el.innerHTML = drivers.map(driver => `
        <div class="card">
          <div class="line"><strong>Name:</strong> ${driver.name}</div>
          <div class="line"><strong>Phone:</strong> ${driver.phone}</div>
          <div class="line"><strong>Email:</strong> ${driver.email || 'Not provided'}</div>
          <div class="line"><strong>Vehicle:</strong> ${driver.vehicle}</div>
          <div class="line"><strong>City:</strong> ${driver.city || 'Not provided'}</div>
          <div class="line"><strong>ID:</strong> ${driver.id}</div>

          <div class="status ${driver.status}">
            ${driver.status.toUpperCase()}
          </div>

          <div class="row">
            <button class="approve-btn" onclick="approveDriver('${driver.id}')">
              Approve Driver
            </button>
            <button class="reject-btn" onclick="rejectDriver('${driver.id}')">
              Reject Driver
            </button>
          </div>
        </div>
      `).join('')
    }

    async function loadRiders() {
      const response = await fetch('/api/admin/riders')
      const riders = await response.json()
      const el = document.getElementById('ridersList')

      if (!riders.length) {
        el.className = 'empty'
        el.innerHTML = 'No rider accounts yet.'
        return
      }

      el.className = ''
      el.innerHTML = riders.map(rider => `
        <div class="card">
          <div class="line"><strong>Name:</strong> ${rider.name}</div>
          <div class="line"><strong>Phone:</strong> ${rider.phone}</div>
          <div class="line"><strong>Email:</strong> ${rider.email || 'Not provided'}</div>
          <div class="line"><strong>ID:</strong> ${rider.id}</div>
        </div>
      `).join('')
    }

    async function approveDriver(id) {
      await fetch('/api/admin/approve-driver', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      })
      loadDrivers()
    }

    async function rejectDriver(id) {
      await fetch('/api/admin/reject-driver', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      })
      loadDrivers()
    }

    loadDrivers()
    loadRiders()
  </script>
</body>
</html>
