<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi Admin</title>
  <style>
    body{
      background:#000;
      color:#fff;
      font-family:Arial, sans-serif;
      padding:20px;
      margin:0;
    }
    .app{
      max-width:900px;
      margin:0 auto;
    }
    .title{
      font-size:34px;
      font-weight:bold;
      margin:18px 0 24px;
    }
    .card{
      background:#0a0a0a;
      border-radius:24px;
      padding:20px;
      margin-bottom:18px;
    }
    .ride{
      background:#111;
      border:1px solid #222;
      border-radius:16px;
      padding:16px;
      margin-top:12px;
    }
    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:18px;
      background:#22c55e;
      color:#fff;
      font-size:16px;
      font-weight:bold;
      margin-top:12px;
    }
    .muted{
      color:#9ca3af;
      font-size:14px;
      margin-top:6px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">Admin Panel</div>

    <div class="card">
      <h2>Recent Rides</h2>
      <button onclick="loadRides()">Refresh Rides</button>
      <div id="ridesList" class="muted">Loading rides...</div>
    </div>

    <div class="card">
      <button onclick="window.location.href='/'">Back to Rider App</button>
    </div>
  </div>

  <script>
    async function loadRides() {
      const res = await fetch('/api/rides')
      const rides = await res.json()
      const container = document.getElementById('ridesList')

      if (!rides.length) {
        container.innerHTML = 'No rides yet.'
        return
      }

      container.innerHTML = rides.map(ride => `
        <div class="ride">
          <div><strong>Ride ID:</strong> ${ride.id}</div>
          <div class="muted"><strong>Pickup:</strong> ${ride.pickup}</div>
          <div class="muted"><strong>Dropoff:</strong> ${ride.dropoff}</div>
          <div class="muted"><strong>Type:</strong> ${ride.rideType}</div>
          <div class="muted"><strong>Driver:</strong> ${ride.driverName}</div>
          <div class="muted"><strong>Car:</strong> ${ride.car}</div>
          <div class="muted"><strong>Status:</strong> ${ride.status}</div>
          <div class="muted"><strong>ETA:</strong> ${ride.etaMinutes} min</div>
        </div>
      `).join('')
    }

    loadRides()
  </script>
</body>
</html>
