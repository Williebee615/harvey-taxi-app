<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi Admin</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .header {
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 34px;
    }

    .header p {
      margin: 8px 0 0;
      color: #94a3b8;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: #22c55e;
      color: #fff;
    }

    .secondary {
      background: #1e293b;
      color: #fff;
      border: 1px solid #334155;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }

    .stat {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 20px;
      padding: 18px;
    }

    .stat .label {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .stat .value {
      font-size: 28px;
      font-weight: 800;
    }

    .section {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 18px;
    }

    .section h2 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .card {
      background: #0b1220;
      border: 1px solid #1e293b;
      border-radius: 18px;
      padding: 14px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .muted {
      color: #94a3b8;
    }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      margin-top: 8px;
      margin-right: 6px;
    }

    .green {
      background: #14532d;
      color: #bbf7d0;
    }

    .blue {
      background: #1e3a8a;
      color: #bfdbfe;
    }

    .yellow {
      background: #713f12;
      color: #fde68a;
    }

    .red {
      background: #7f1d1d;
      color: #fecaca;
    }

    .empty {
      color: #94a3b8;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Harvey Taxi Admin</h1>
      <p>Live dashboard for riders, drivers, and service requests</p>
    </div>

    <div class="toolbar">
      <button class="primary" onclick="loadDashboard()">Refresh Dashboard</button>
      <button class="secondary" onclick="seedDemoDrivers()">Load Demo Drivers</button>
    </div>

    <div class="grid" id="statsGrid">
      <div class="stat"><div class="label">Total Riders</div><div class="value" id="totalRiders">0</div></div>
      <div class="stat"><div class="label">Total Drivers</div><div class="value" id="totalDrivers">0</div></div>
      <div class="stat"><div class="label">Online Drivers</div><div class="value" id="onlineDrivers">0</div></div>
      <div class="stat"><div class="label">Available Drivers</div><div class="value" id="availableDrivers">0</div></div>
      <div class="stat"><div class="label">Total Requests</div><div class="value" id="totalRequests">0</div></div>
      <div class="stat"><div class="label">Active Requests</div><div class="value" id="activeRequests">0</div></div>
    </div>

    <div class="section">
      <h2>Drivers</h2>
      <div id="driversList" class="list"></div>
    </div>

    <div class="section">
      <h2>Riders</h2>
      <div id="ridersList" class="list"></div>
    </div>

    <div class="section">
      <h2>Service Requests</h2>
      <div id="requestsList" class="list"></div>
    </div>
  </div>

  <script>
    async function loadDashboard() {
      await Promise.all([
        loadStats(),
        loadUsers(),
        loadRequests(),
        loadDrivers()
      ])
    }

    async function loadStats() {
      try {
        const res = await fetch('/api/admin/stats')
        const data = await res.json()

        document.getElementById('totalRiders').textContent = data.totalRiders || 0
        document.getElementById('totalDrivers').textContent = data.totalDrivers || 0
        document.getElementById('onlineDrivers').textContent = data.onlineDrivers || 0
        document.getElementById('availableDrivers').textContent = data.availableDrivers || 0
        document.getElementById('totalRequests').textContent = data.totalRequests || 0
        document.getElementById('activeRequests').textContent = data.activeRequests || 0
      } catch (error) {
        console.error('Stats load failed', error)
      }
    }

    async function loadUsers() {
      try {
        const res = await fetch('/api/admin/users')
        const data = await res.json()

        const ridersList = document.getElementById('ridersList')
        ridersList.innerHTML = ''

        if (!data.riders || !data.riders.length) {
          ridersList.innerHTML = '<div class="empty">No riders yet.</div>'
        } else {
          data.riders.forEach(rider => {
            const card = document.createElement('div')
            card.className = 'card'
            card.innerHTML = `
              <div class="card-title">${rider.name}</div>
              <div>${rider.email}</div>
              <div class="muted">${rider.phone || 'No phone added'}</div>
              <span class="pill blue">${rider.role || 'rider'}</span>
            `
            ridersList.appendChild(card)
          })
        }
      } catch (error) {
        console.error('Users load failed', error)
      }
    }

    async function loadDrivers() {
      try {
        const res = await fetch('/api/drivers')
        const drivers = await res.json()

        const driversList = document.getElementById('driversList')
        driversList.innerHTML = ''

        if (!drivers || !drivers.length) {
          driversList.innerHTML = '<div class="empty">No drivers loaded yet.</div>'
          return
        }

        drivers.forEach(driver => {
          const onlineClass = driver.isOnline ? 'green' : 'red'
          const availableClass = driver.isAvailable ? 'blue' : 'yellow'

          const card = document.createElement('div')
          card.className = 'card'
          card.innerHTML = `
            <div class="card-title">${driver.name}</div>
            <div>${driver.email || 'No email'}</div>
            <div class="muted">${driver.vehicleType || 'Taxi'} · ${driver.carColor || ''} ${driver.carModel || ''}</div>
            <div class="muted">Plate: ${driver.plateNumber || 'N/A'}</div>
            <div class="muted">Location: ${driver.lat}, ${driver.lng}</div>
            <span class="pill ${onlineClass}">${driver.isOnline ? 'Online' : 'Offline'}</span>
            <span class="pill ${availableClass}">${driver.isAvailable ? 'Available' : 'Busy'}</span>
          `
          driversList.appendChild(card)
        })
      } catch (error) {
        console.error('Drivers load failed', error)
      }
    }

    async function loadRequests() {
      try {
        const res = await fetch('/api/requests')
        const requests = await res.json()

        const requestsList = document.getElementById('requestsList')
        requestsList.innerHTML = ''

        if (!requests || !requests.length) {
          requestsList.innerHTML = '<div class="empty">No service requests yet.</div>'
          return
        }

        requests.forEach(request => {
          let statusClass = 'blue'
          if (request.status === 'completed') statusClass = 'green'
          if (request.status === 'cancelled') statusClass = 'red'
          if (request.status === 'searching') statusClass = 'yellow'

          const card = document.createElement('div')
          card.className = 'card'
          card.innerHTML = `
            <div class="card-title">${request.riderName || 'Unknown rider'}</div>
            <div><strong>Pickup:</strong> ${request.pickup}</div>
            <div><strong>Destination:</strong> ${request.destination}</div>
            <div><strong>Service:</strong> ${request.serviceType || 'ride'}</div>
            <div><strong>Driver:</strong> ${request.driverName || 'Not assigned yet'}</div>
            <div class="muted">Created: ${request.createdAt || 'N/A'}</div>
            <span class="pill ${statusClass}">${request.status || 'unknown'}</span>
          `
          requestsList.appendChild(card)
        })
      } catch (error) {
        console.error('Requests load failed', error)
      }
    }

    async function seedDemoDrivers() {
      try {
        const res = await fetch('/api/seed-demo', { method: 'POST' })
        const data = await res.json()
        alert(data.message || 'Demo drivers loaded.')
        loadDashboard()
      } catch (error) {
        alert('Could not load demo drivers.')
      }
    }

    loadDashboard()
    setInterval(loadDashboard, 8000)
  </script>
</body>
</html>
