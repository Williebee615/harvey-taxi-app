<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>
body{
background:#020c2b;
font-family:Arial;
color:white;
padding:20px;
}

.back{
margin-bottom:20px;
}

.back a{
color:white;
text-decoration:none;
font-size:18px;
}

.box{
background:#081a44;
padding:25px;
border-radius:20px;
max-width:500px;
margin:auto;
}

input{
width:100%;
padding:15px;
margin-top:10px;
border-radius:12px;
border:none;
background:#e6e6a8;
font-size:16px;
}

button{
width:100%;
padding:16px;
margin-top:20px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#2d6cff,#8a2eff);
color:white;
font-weight:bold;
font-size:16px;
}

#error{
color:red;
margin-top:10px;
}
</style>
</head>

<body>

<div class="back">
<a href="/">← Back to Home</a>
</div>

<div class="box">
<h1>Admin Login</h1>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login to Admin Dashboard</button>

<div id="error"></div>

</div>

<script>

function login(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

if(email === "admin@harveytaxi.com" && password === "admin123"){
window.location.href="/admin-dashboard.html"
}else{
document.getElementById("error").innerText="Invalid login"
}

}

</script>

</body>
</html>
