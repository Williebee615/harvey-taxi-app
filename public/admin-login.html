<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>
body {
font-family: Arial;
background:#020c2b;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card {
background:#081a44;
padding:30px;
border-radius:20px;
width:90%;
max-width:400px;
}

input {
width:100%;
padding:15px;
margin-top:15px;
border-radius:12px;
border:none;
background:#06153a;
color:white;
}

button {
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#3a6bff,#7b3cff);
color:white;
font-weight:bold;
}

.error {
color:red;
margin-top:15px;
}
</style>
</head>

<body>

<div class="card">
<h1>Admin Login</h1>
<p>Harvey Taxi Admin Access</p>

<input id="email" placeholder="Admin Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login to Admin Dashboard</button>

<div id="error" class="error"></div>
</div>

<script>
async function login(){
const email=document.getElementById('email').value
const password=document.getElementById('password').value

try{
const res=await fetch('/api/admin-login',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({email,password})
})

const data=await res.json()

if(data.success){
window.location.href='/admin-dashboard.html'
}else{
document.getElementById('error').innerText='Invalid login'
}

}catch(e){
document.getElementById('error').innerText='Server error'
}
}
</script>

</body>
</html>
