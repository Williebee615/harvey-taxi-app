<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvey Taxi Admin Login</title>

<style>
body{
background:#06112d;
color:white;
font-family:Arial;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:#0c1a3d;
padding:25px;
border-radius:16px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border-radius:10px;
border:none;
background:#081735;
color:white;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-weight:bold;
background:linear-gradient(90deg,#2962ff,#7b2cff);
color:white;
}

.error{
color:#ff5252;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>Admin Login</h1>
<p>Harvey Taxi Admin Access</p>

<form id="loginForm">

<input id="email" placeholder="Admin Email" required>
<input id="password" type="password" placeholder="Password" required>

<button type="submit">
Login to Admin Dashboard
</button>

<div id="error" class="error"></div>

</form>

</div>
</div>

<script>

const form = document.getElementById('loginForm')

form.addEventListener('submit', async (e)=>{
e.preventDefault()

const email = document.getElementById('email').value
const password = document.getElementById('password').value

try{

const res = await fetch('/api/admin-login',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({email,password})
})

const data = await res.json()

if(data.success){

localStorage.setItem('harveyAdminLoggedIn','true')

window.location.href = '/admin.html'

}else{
document.getElementById('error').innerText = "Invalid login"
}

}catch{
document.getElementById('error').innerText = "Server error"
}

})

</script>

</body>
</html>
