<!DOCTYPE html>
<html>
<head>
  <title>Test Add Earnings</title>
</head>
<body>
  <h2>Test Add Earnings</h2>

  <button onclick="registerDriver()">Register driver_1</button>
  <button onclick="add25()">Add $25</button>

  <p id="result"></p>

  <script>
    async function registerDriver() {
      const res = await fetch('/api/drivers/register', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          id: 'driver_1',
          name: 'Test Driver'
        })
      })

      const data = await res.json()
      document.getElementById('result').innerText =
        'Register: ' + JSON.stringify(data)
    }

    async function add25() {
      const res = await fetch('/api/driver/add-earnings', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          driverId: 'driver_1',
          amount: 25
        })
      })

      const data = await res.json()
      document.getElementById('result').innerText =
        'Add Earnings: ' + JSON.stringify(data)
    }
  </script>
</body>
</html>
