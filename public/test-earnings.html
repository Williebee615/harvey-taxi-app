<!DOCTYPE html>
<html>
<head>
  <title>Driver Wallet</title>
</head>
<body>
  <h2>Driver Wallet</h2>

  <div>
    Balance: $<span id="balance">0</span>
  </div>

  <button onclick="loadBalance()">Refresh Balance</button>

  <script>
    const driverId = 'driver_1'

    async function loadBalance() {
      try {
        const res = await fetch('/api/driver/wallet/' + driverId)
        const data = await res.json()
        document.getElementById('balance').innerText = data.wallet || 0
      } catch (err) {
        alert('Failed to load wallet')
      }
    }

    loadBalance()
  </script>
</body>
</html>
