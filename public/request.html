<!DOCTYPE html>
<html>
<head>
<title>Request Ride</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
padding:20px;
}

input, select{
width:100%;
padding:16px;
margin-top:10px;
margin-bottom:15px;
border-radius:10px;
border:none;
background:#020617;
color:white;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
font-size:18px;
font-weight:bold;
}
</style>
</head>

<body>

<h2>Request a Ride</h2>

<label>Service Type</label>
<select id="service">
<option>Standard Ride</option>
<option>XL Ride</option>
<option>Airport Ride</option>
</select>

<label>Pickup Address</label>
<input id="pickup" placeholder="Enter pickup address">

<label>Dropoff Address</label>
<input id="dropoff" placeholder="Enter dropoff address">

<button onclick="requestRide()">Request Driver</button>

<script>
function requestRide(){

const pickup = document.getElementById('pickup').value
const dropoff = document.getElementById('dropoff').value
const service = document.getElementById('service').value

fetch('/request-ride',{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
pickup,
dropoff,
service
})
})

alert('Searching for driver...')
}
</script>

</body>
</html>
