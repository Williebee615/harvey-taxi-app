<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Request Ride</title>

    <style>
      body {
        font-family: Arial;
        background: #f5f5f5;
        padding: 20px;
      }

      h1 {
        font-size: 40px;
      }

      input {
        width: 100%;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 10px;
        border: 1px solid #ccc;
      }

      .ride {
        padding: 15px;
        border: 2px solid #ddd;
        border-radius: 15px;
        margin-bottom: 10px;
        cursor: pointer;
      }

      .selected {
        border-color: black;
      }

      button {
        width: 100%;
        padding: 20px;
        background: black;
        color: white;
        border: none;
        border-radius: 15px;
        font-size: 18px;
      }
    </style>
  </head>

  <body>
    <a href="/">← Back</a>

    <h1>Request a Ride</h1>

    <input id="pickup" placeholder="Pickup location" />
    <input id="destination" placeholder="Destination" />
    <input id="name" placeholder="Passenger name" />

    <h2>Choose ride</h2>

    <div class="ride selected" data-type="Standard">
      🚕 Harvey Standard - $12
    </div>

    <div class="ride" data-type="XL">
      🚐 Harvey XL - $18
    </div>

    <div class="ride" data-type="Airport">
      ✈️ Airport Ride - $25
    </div>

    <button onclick="submitRide()">Request Ride</button>

    <script>
      let selectedRide = "Standard";

      document.querySelectorAll(".ride").forEach((r) => {
        r.onclick = () => {
          document.querySelectorAll(".ride").forEach((x) => x.classList.remove("selected"));
          r.classList.add("selected");
          selectedRide = r.dataset.type;
        };
      });

      function submitRide() {
        const data = {
          pickup: document.getElementById("pickup").value,
          destination: document.getElementById("destination").value,
          name: document.getElementById("name").value,
          ride: selectedRide,
        };

        alert("Ride Requested 🚕");
        console.log(data);
      }
    </script>
  </body>
</html>
