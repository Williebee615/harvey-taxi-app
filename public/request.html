<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi - Request Ride</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(59, 130, 246, 0.10), transparent 24%),
        linear-gradient(180deg, #030303 0%, #09090d 45%, #111118 100%);
      color: white;
    }

    .app-shell {
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 22px 18px 120px;
      position: relative;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #22c55e, #06b6d4);
      box-shadow: 0 16px 40px rgba(34, 197, 94, 0.3);
      font-size: 24px;
    }

    .brand-text h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .brand-text p {
      margin-top: 5px;
      font-size: 0.87rem;
      color: #a1a1aa;
    }

    .menu-btn {
      width: 46px;
      height: 46px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 15px;
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      padding: 24px;
      margin-bottom: 18px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)),
        linear-gradient(135deg, rgba(34,197,94,0.18), rgba(6,182,212,0.10));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 22px 55px rgba(0,0,0,0.36);
    }

    .hero-card::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      right: -60px;
      top: -60px;
      background: rgba(255,255,255,0.06);
      filter: blur(10px);
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.08);
      color: #dcfce7;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.82rem;
      margin-bottom: 14px;
    }

    .hero-title {
      font-size: 2rem;
      line-height: 1.04;
      font-weight: 800;
      letter-spacing: -0.05em;
      max-width: 280px;
      margin-bottom: 10px;
    }

    .hero-subtitle {
      color: #d4d4d8;
      font-size: 0.95rem;
      line-height: 1.55;
      max-width: 330px;
      margin-bottom: 18px;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .hero-stat {
      padding: 12px;
      border-radius: 18px;
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .hero-stat strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 4px;
    }

    .hero-stat span {
      font-size: 0.78rem;
      color: #a1a1aa;
    }

    .service-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .service-card {
      padding: 14px 8px;
      border-radius: 20px;
      text-align: center;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
    }

    .service-card .icon {
      font-size: 21px;
      margin-bottom: 8px;
    }

    .service-card .label {
      color: #f4f4f5;
      font-size: 0.78rem;
      line-height: 1.2;
    }

    .ride-card {
      border-radius: 30px;
      padding: 20px;
      margin-bottom: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 18px 45px rgba(0,0,0,0.34);
      backdrop-filter: blur(12px);
    }

    .ride-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .ride-card-header h2 {
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .live-indicator {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: #86efac;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .live-indicator::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 12px #22c55e;
    }

    .input-group {
      margin-bottom: 12px;
    }

    .input-label {
      display: block;
      margin-bottom: 8px;
      padding-left: 4px;
      font-size: 0.82rem;
      color: #a1a1aa;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      top: 50%;
      left: 14px;
      transform: translateY(-50%);
      font-size: 16px;
      opacity: 0.95;
    }

    input,
    select {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(8, 10, 20, 0.95);
      color: white;
      border-radius: 18px;
      padding: 16px 16px 16px 42px;
      outline: none;
      font-size: 1rem;
    }

    input::placeholder {
      color: #71717a;
    }

    select {
      appearance: none;
      cursor: pointer;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
      margin-bottom: 14px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 16px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .btn-primary {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      box-shadow: 0 14px 30px rgba(34, 197, 94, 0.28);
    }

    .status-box {
      margin: 8px 2px 14px;
      color: #d4d4d8;
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .fare-box {
      background: rgba(8, 12, 24, 0.92);
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.06);
      padding: 16px;
    }

    .fare-box h3 {
      font-size: 0.95rem;
      color: #a1a1aa;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .fare-placeholder {
      color: #71717a;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .info-stack {
      display: grid;
      gap: 14px;
    }

    .info-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      border-radius: 24px;
      padding: 16px;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .info-card h4 {
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .info-card p {
      color: #a1a1aa;
      font-size: 0.87rem;
      line-height: 1.45;
    }

    .info-icon {
      min-width: 48px;
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(34,197,94,0.12);
      font-size: 22px;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      width: calc(100% - 26px);
      max-width: 430px;
      padding: 12px 10px;
      border-radius: 24px;
      background: rgba(9, 9, 14, 0.92);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      z-index: 10;
    }

    .nav-item {
      text-decoration: none;
      color: #a1a1aa;
      text-align: center;
      padding: 8px 4px;
      border-radius: 16px;
      font-size: 0.78rem;
    }

    .nav-item.active {
      background: rgba(34,197,94,0.14);
      color: #dcfce7;
    }

    .nav-item .icon {
      font-size: 18px;
      margin-bottom: 5px;
    }

    @media (max-width: 420px) {
      .hero-title {
        font-size: 1.8rem;
      }

      .hero-stats {
        grid-template-columns: 1fr;
      }

      .service-row {
        grid-template-columns: repeat(2, 1fr);
      }

      .btn-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

      <div class="brand">
        <div class="brand-logo">🚕</div>

          <p>Fast rides. Local delivery. Real growth.</p>
        </div>
      </div>
      <button class="menu-btn" type="button">☰</button>
    </div>
