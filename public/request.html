<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi Request Service</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    h1, h2 {
      margin-top: 0;
      color: #111827;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      box-sizing: border-box;
      font-size: 15px;
      margin-top: 10px;
    }

    button {
      background: #111827;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .status-box {
      padding: 14px;
      border-radius: 14px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      margin-top: 14px;
      color: #374151;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Request Service</h1>

      <input type="text" id="riderName" placeholder="Your name" />
      <input type="text" id="riderPhone" placeholder="Phone number" />
      <input type="text" id="pickup" placeholder="Pickup location" />
      <input type="text" id="dropoff" placeholder="Destination / Drop-off" />

      <select id="serviceType">
        <option value="Ride">Ride</option>
        <option value="Delivery">Delivery</option>
        <option value="Food">Food</option>
      </select>

      <button onclick="submitRequest()">Request Driver</button>

      <div id="requestResult" class="status-box" style="display:none;"></div>
    </div>

    <div class="card" id="statusCard" style="display:none;">
      <h2>Request Status</h2>
      <div id="statusOutput" class="status-box"></div>
      <button onclick="refreshStatus()">Refresh Status</button>
    </div>
  </div>

  <script>
    let currentRequestId = null

    function getRandomRiderLocation() {
      const baseLat = 36.1627
      const baseLng = -86.7816
      return {
        lat: baseLat + ((Math.random() - 0.5) * 0.03),
        lng: baseLng + ((Math.random() - 0.5) * 0.03)
      }
    }

    async function submitRequest() {
      const name = document.getElementById('riderName').value.trim()
      const phone = document.getElementById('riderPhone').value.trim()
      const pickup = document.getElementById('pickup').value.trim()
      const dropoff = document.getElementById('dropoff').value.trim()
      const serviceType = document.getElementById('serviceType').value
      const result = document.getElementById('requestResult')
      const statusCard = document.getElementById('statusCard')

      if (!name || !phone || !pickup) {
        alert('Please fill name, phone, and pickup.')
        return
      }

      const loc = getRandomRiderLocation()

      const res = await fetch('/api/request-service', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name,
          phone,
          pickup,
          dropoff,
          serviceType,
          riderLat: loc.lat,
          riderLng: loc.lng
        })
      })

      const data = await res.json()
      result.style.display = 'block'

      if (!data.success) {
        result.innerHTML = data.message || 'No approved drivers online right now.'
        statusCard.style.display = 'none'
        return
      }

      currentRequestId = data.request.id
      result.innerHTML = `
        <strong>Driver Assigned</strong><br>
        Request ID: ${data.request.id}<br>
        Driver: ${data.request.assignedDriverName}<br>
        Distance: ${data.request.estimatedDistanceKm} km<br>
        Status: ${data.request.status}
      `
      statusCard.style.display = 'block'
      refreshStatus()
    }

    async function refreshStatus() {
      if (!currentRequestId) return

      const res = await fetch('/api/request-status/' + currentRequestId)
      const data = await res.json()
      const statusOutput = document.getElementById('statusOutput')

      if (!data.success) {
        statusOutput.innerHTML = 'Could not load request status.'
        return
      }

      const req = data.request
      statusOutput.innerHTML = `
        <strong>Request ID:</strong> ${req.id}<br>
        <strong>Status:</strong> ${req.status}<br>
        <strong>Driver:</strong> ${req.assignedDriverName}<br>
        <strong>Pickup:</strong> ${req.pickup}<br>
        <strong>Dropoff:</strong> ${req.dropoff || '-'}<br>
        <strong>Service:</strong> ${req.serviceType}
      `
    }
  </script>
</body>
</html>
