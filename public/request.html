<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Request</title>

<style>
body{
margin:0;
background:#0b1220;
color:white;
font-family:Arial;
}

.wrap{
padding:20px;
}

input{
width:100%;
padding:15px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:15px;
margin-top:15px;
background:#2a6df4;
color:white;
border:none;
border-radius:10px;
font-size:16px;
}
</style>
</head>

<body>

<div class="wrap">

<h2 id="title">Request Ride</h2>

<input placeholder="Pickup Location"/>
<input placeholder="Dropoff Location"/>

<button onclick="requestRide()">
Find Driver
</button>

</div>

<script>
const params = new URLSearchParams(window.location.search)
const type = params.get("type")

if(type === "food"){
document.getElementById("title").innerText="Fast Food Delivery"
}

if(type === "grocery"){
document.getElementById("title").innerText="Grocery Delivery"
}

if(type === "delivery"){
document.getElementById("title").innerText="Package Delivery"
}

function requestRide(){
alert("Driver search started")
}
</script>

</body>
</html>
