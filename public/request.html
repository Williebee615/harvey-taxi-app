<script>
async function requestRide() {
  const pickup = document.getElementById("pickup").value.trim()
  const dropoff = document.getElementById("dropoff").value.trim()
  const rideType = document.getElementById("rideType").value

  if (!pickup || !dropoff) {
    document.getElementById("status").innerHTML = "Enter pickup and dropoff first."
    return
  }

  document.getElementById("status").innerHTML = "Matching driver..."

  try {
    const res = await fetch("/api/rides/request", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        pickupAddress: pickup,
        dropoffAddress: dropoff,
        serviceType: rideType
      })
    })

    const data = await res.json()

    if (!data.success) {
      document.getElementById("status").innerHTML =
        data.message || "Could not request ride."
      return
    }

    if (data.ride && data.ride.assignedDriver) {
      document.getElementById("driverBox").innerHTML = `
        Driver Assigned<br><br>
        Name: ${data.ride.assignedDriver.name}<br>
        Vehicle: ${data.ride.assignedDriver.vehicle}<br>
        Plate: ${data.ride.assignedDriver.plate}<br>
        Distance: ${data.ride.assignedDriver.milesAway} miles<br><br>
        Status: ${data.ride.status}
      `
    } else {
      document.getElementById("driverBox").innerHTML = `
        No driver assigned yet.<br><br>
        Status: searching
      `
    }

    document.getElementById("status").innerHTML =
      data.message || "Ride requested."
  } catch (error) {
    document.getElementById("status").innerHTML =
      "Server error while requesting ride."
  }
}
</script>
