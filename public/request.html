<!DOCTYPE html>
<html>
<head>
  <title>Request Ride</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #020b2d;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 34px;
    }

    .card {
      background: #0b173f;
      border-radius: 24px;
      padding: 20px;
    }

    label {
      display: block;
      margin: 12px 0 8px;
      color: #dce4ff;
      font-size: 16px;
    }

    input,
    select {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      margin-bottom: 14px;
      background: #06112f;
      color: white;
    }

    button {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }

    .fare-btn {
      background: #22c55e;
      color: white;
    }

    .pay-btn {
      background: #efcb43;
      color: black;
      display: none;
    }

    .status-box {
      margin-top: 18px;
      padding: 16px;
      border-radius: 16px;
      background: #122457;
      color: white;
      display: none;
      line-height: 1.5;
    }

    .back {
      display: inline-block;
      margin-bottom: 16px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

      <div id="fare" class="status-box"></div>

      <button id="payBtn" class="pay-btn" onclick="payRide()">Pay for Ride</button>
    </div>
  </div>
