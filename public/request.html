<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Request Ride</title>

<style>
body{
background:#000;
color:#fff;
font-family:Arial;
padding:20px;
}

h1{
font-size:32px;
margin-bottom:20px;
}

.input{
width:100%;
padding:20px;
border-radius:20px;
border:none;
background:#0b0f1c;
color:white;
margin-bottom:15px;
font-size:18px;
}

button{
width:100%;
padding:20px;
border-radius:20px;
border:none;
font-size:18px;
margin-top:10px;
}

.estimate{
background:#333;
color:white;
}

.request{
background:#39d27d;
color:white;
font-weight:bold;
}

.card{
background:#0b0f1c;
padding:20px;
border-radius:20px;
margin-top:20px;
line-height:1.6;
}
</style>

</head>
<body>

<h1>Request Pickup</h1>

<input id="pickup" class="input" placeholder="Pickup address">
<input id="dropoff" class="input" placeholder="Dropoff address">

<select id="rideType" class="input">
<option value="Standard">Standard Ride</option>
<option value="XL">XL Ride</option>
<option value="Luxury">Luxury Ride</option>
</select>

<button class="estimate" onclick="estimateFare()">Estimate Fare</button>
<button class="request" onclick="requestRide()">Request Ride</button>

<div id="result" class="card">
Fare details will appear here.
</div>

<script>

let lastFare = null

async function estimateFare(){

const rideType = document.getElementById('rideType').value

const res = await fetch('/estimate-fare',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
distance:10,
duration:20,
rideType
})
})

const data = await res.json()

lastFare = data

document.getElementById('result').innerHTML = `
Distance: ${data.distance} miles<br>
ETA: ${data.duration} min<br><br>

Base: $${data.fare.base}<br>
Distance: $${data.fare.distanceCharge}<br>
Time: $${data.fare.timeCharge}<br>
Booking: $${data.fare.booking}<br>
Service: $${data.fare.service}<br><br>

<b>Total: $${data.fare.total}</b>
`
}

async function requestRide(){

try{

const pickup = document.getElementById('pickup').value
const dropoff = document.getElementById('dropoff').value
const rideType = document.getElementById('rideType').value

const res = await fetch('/request-ride',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
pickup,
dropoff,
pickupLat:36.1627,
pickupLng:-86.7816,
distance:lastFare?.distance || 10,
duration:lastFare?.duration || 20,
rideType
})
})

const data = await res.json()

if(!data || !data.success){
document.getElementById('result').innerHTML =
data?.message || "No drivers available"
return
}

const driver = data?.ride?.driver

if(!driver){
document.getElementById('result').innerHTML =
"Driver assigned. Loading..."
return
}

document.getElementById('result').innerHTML = `
<b>Driver matched successfully</b><br><br>

${driver.name}<br>
${driver.vehicle}<br>
Plate: ${driver.plate}<br>
ETA: ${driver.etaMinutes} min<br>
${driver.distanceAway} miles away<br><br>

<b>Total: $${data.ride.fare.total}</b>
`

}catch(e){

document.getElementById('result').innerHTML =
"Server error while requesting ride."

}

}

</script>

</body>
</html>
