<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi Request</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 20px 16px 40px;
    }

    .header {
      text-align: center;
      margin: 10px 0 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 34px;
      font-weight: 800;
    }

    .header p {
      margin: 8px 0 0;
      color: #6b7280;
      font-size: 14px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 28px;
    }

    input,
    textarea,
    button {
      width: 100%;
      border-radius: 20px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      padding: 18px 16px;
      font-size: 16px;
      margin-bottom: 14px;
      outline: none;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
    }

    button {
      border: none;
      background: #16a34a;
      color: white;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    .service-option {
      border: 1px solid #d1d5db;
      border-radius: 22px;
      padding: 18px 16px;
      margin-bottom: 12px;
      cursor: pointer;
      background: #fff;
      font-size: 16px;
      font-weight: 700;
    }

    .service-option.active {
      border: 2px solid #111827;
      background: #f3f4f6;
    }

    .status-box,
    .driver-box,
    .map-box {
      display: none;
      border-radius: 22px;
      padding: 16px;
      margin-top: 12px;
    }

    .status-box {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
    }

    .driver-box {
      background: #ecfdf5;
      border: 1px solid #86efac;
    }

    .map-box {
      background: #111827;
      color: white;
      border: 1px solid #1f2937;
    }

    .map-grid {
      position: relative;
      height: 240px;
      border-radius: 20px;
      background:
        linear-gradient(to right, rgba(255,255,255,0.06) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.06) 1px, transparent 1px),
        #0b1220;
      background-size: 32px 32px;
      overflow: hidden;
      margin-top: 12px;
    }

    .pin {
      position: absolute;
      transform: translate(-50%, -50%);
      font-size: 24px;
    }

    .pickup-pin { left: 18%; top: 72%; }
    .driver-pin { left: 18%; top: 72%; transition: all 1.2s ease; }
    .dropoff-pin { left: 78%; top: 28%; }

    .route-line {
      position: absolute;
      left: 18%;
      top: 72%;
      width: 60%;
      height: 3px;
      background: linear-gradient(90deg, #22c55e, #60a5fa);
      transform: rotate(-28deg);
      transform-origin: left center;
      opacity: 0.8;
    }

    .top-link {
      display: inline-block;
      margin-bottom: 14px;
      color: #111827;
      text-decoration: none;
      font-weight: 700;
    }

    .muted {
      color: #6b7280;
      font-size: 14px;
    }

    .row {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Harvey Taxi</h1>
      <p>Track your ride request in real time</p>
    </div>

    <div class="card">
      <a class="top-link" href="/">← Back to Home</a>
      <h2>Request Service</h2>

      <input id="riderName" type="text" placeholder="Your name" />
      <input id="riderPhone" type="text" placeholder="Phone number" />
      <input id="pickup" type="text" placeholder="Pickup location" />
      <input id="destination" type="text" placeholder="Destination" />

      <div id="standardOption" class="service-option active" onclick="selectService('ride', 'Harvey Standard - $12', 'standardOption')">
        🚕 Harvey Standard - $12
      </div>

      <div id="xlOption" class="service-option" onclick="selectService('xl', 'Harvey XL - $18', 'xlOption')">
        🚐 Harvey XL - $18
      </div>

      <div id="deliveryOption" class="service-option" onclick="selectService('delivery', 'Delivery Service', 'deliveryOption')">
        📦 Delivery Service
      </div>

      <textarea id="notes" placeholder="Driver notes (gate code, store name, food order, etc.)"></textarea>

      <button onclick="submitRequest()">Request Service</button>

      <div id="statusBox" class="status-box"></div>
      <div id="driverBox" class="driver-box"></div>

      <div id="mapBox" class="map-box">
        <div><strong>Live trip view</strong></div>
        <div class="muted">Pickup → driver → destination</div>

        <div class="map-grid">
          <div class="route-line"></div>
          <div class="pin pickup-pin">📍</div>
          <div id="driverPin" class="pin driver-pin">🚗</div>
          <div class="pin dropoff-pin">🏁</div>
        </div>

        <div id="mapLegend" style="margin-top: 12px;" class="muted">
          Driver is waiting for assignment.
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentRequestId = null
    let selectedServiceType = 'ride'
    let selectedServiceLabel = 'Harvey Standard - $12'
    let trackingTimer = null
    let animationStep = 0

    function selectService(type, label, elementId) {
      selectedServiceType = type
      selectedServiceLabel = label

      document.getElementById('standardOption').classList.remove('active')
      document.getElementById('xlOption').classList.remove('active')
      document.getElementById('deliveryOption').classList.remove('active')
      document.getElementById(elementId).classList.add('active')
    }

    function setStatus(message) {
      const box = document.getElementById('statusBox')
      box.style.display = 'block'
      box.innerHTML = message
    }

    function setDriver(html) {
      const box = document.getElementById('driverBox')
      box.style.display = 'block'
      box.innerHTML = html
    }

    function showMap(message) {
      document.getElementById('mapBox').style.display = 'block'
      document.getElementById('mapLegend').textContent = message
    }

    function moveDriverPin(percentX, percentY) {
      const pin = document.getElementById('driverPin')
      pin.style.left = percentX + '%'
      pin.style.top = percentY + '%'
    }

    async function seedDriversIfNeeded() {
      try {
        await fetch('/api/seed-demo', { method: 'POST' })
      } catch (error) {
        console.log('Seed skipped')
      }
    }

    async function submitRequest() {
      const riderName = document.getElementById('riderName').value.trim()
      const riderPhone = document.getElementById('riderPhone').value.trim()
      const pickup = document.getElementById('pickup').value.trim()
      const destination = document.getElementById('destination').value.trim()
      const notes = document.getElementById('notes').value.trim()

      if (!riderName || !pickup || !destination) {
        setStatus('Please enter your name, pickup, and destination.')
        return
      }

      await seedDriversIfNeeded()

      setStatus('Sending request...')
      document.getElementById('driverBox').style.display = 'none'
      document.getElementById('mapBox').style.display = 'none'

      try {
        const res = await fetch('/api/requests', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            riderName,
            riderPhone,
            pickup,
            destination,
            serviceType: selectedServiceType,
            notes: `${selectedServiceLabel}${notes ? ' | ' + notes : ''}`
          })
        })

        const data = await res.json()

        if (!res.ok) {
          setStatus(data.error || 'Request failed.')
          return
        }

        currentRequestId = data.request.id
        animationStep = 0
        setStatus(`✅ Request created. Status: ${data.request.status}`)
        showMap('Looking for the nearest driver...')
        startTracking()
      } catch (error) {
        setStatus('Could not connect to the server.')
      }
    }

    function startTracking() {
      if (trackingTimer) clearTimeout(trackingTimer)
      trackRequest()
    }

    async function trackRequest() {
      if (!currentRequestId) return

      try {
        const res = await fetch('/api/requests/' + currentRequestId)
        const ride = await res.json()

        if (!res.ok) {
          setStatus('Could not load request status.')
          return
        }

        if (ride.status === 'searching') {
          setStatus('🔍 Searching for a nearby driver...')
          showMap('Dispatch is finding the nearest available driver.')
          moveDriverPin(18, 72)
        }

        if (ride.status === 'matched') {
          setStatus('🚗 Driver matched and on the way to pickup.')
          setDriver(`
            <div class="row"><strong>Driver:</strong> ${ride.driverName || 'Assigned'}</div>
            <div class="row"><strong>Vehicle:</strong> ${ride.driverVehicle || 'Taxi'}</div>
            <div class="row"><strong>Car:</strong> ${ride.driverCarColor || ''} ${ride.driverCarModel || ''}</div>
            <div class="row"><strong>Plate:</strong> ${ride.driverPlateNumber || 'Pending'}</div>
            <div class="row"><strong>Distance:</strong> ${ride.estimatedDistanceKm || '--'} km</div>
          `)
          showMap('Driver is heading to your pickup point.')
          animationStep = Math.min(animationStep + 1, 6)
          moveDriverPin(18 + animationStep * 5, 72 - animationStep * 4)
        }

        if (ride.status === 'accepted') {
          setStatus('✅ Driver accepted your ride.')
          setDriver(`
            <div class="row"><strong>Driver:</strong> ${ride.driverName}</div>
            <div class="row"><strong>Phone:</strong> ${ride.driverPhone || 'Pending'}</div>
            <div class="row"><strong>Vehicle:</strong> ${ride.driverVehicle || 'Taxi'}</div>
            <div class="row"><strong>Distance:</strong> ${ride.estimatedDistanceKm || '--'} km</div>
          `)
          showMap('Driver is almost at pickup.')
          animationStep = Math.min(animationStep + 1, 10)
          moveDriverPin(18 + animationStep * 4, 72 - animationStep * 4.2)
        }

        if (ride.status === 'in_progress') {
          setStatus('🛣️ Trip in progress.')
          showMap('You are on the way to your destination.')
          animationStep = Math.min(animationStep + 1, 15)
          moveDriverPin(18 + animationStep * 4, 72 - animationStep * 3)
        }

        if (ride.status === 'completed') {
          setStatus('✅ Trip completed.')
          showMap('Ride finished successfully.')
          moveDriverPin(78, 28)
          return
        }

        if (ride.status === 'cancelled') {
          setStatus('❌ Trip cancelled.')
          showMap('This trip was cancelled.')
          return
        }

        trackingTimer = setTimeout(trackRequest, 3000)
      } catch (error) {
        setStatus('Lost connection while checking ride status.')
      }
    }
  </script>
</body>
</html>
