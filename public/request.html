<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Service</title>

<style>
body{
font-family:Arial;
background:#0b0f1a;
color:white;
margin:0;
}

.container{
padding:20px;
}

input,select,textarea{
width:100%;
padding:14px;
margin-top:10px;
margin-bottom:15px;
border-radius:8px;
border:none;
background:#111827;
color:white;
}

button{
width:100%;
padding:16px;
background:#2563eb;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
}

.service{
font-size:22px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="service" id="serviceTitle">
Request Service
</div>

<input id="name" placeholder="Full name">

<input id="email" placeholder="Email">

<input id="phone" placeholder="Phone">

<input id="pickup" placeholder="Pickup address">

<input id="dropoff" placeholder="Dropoff address (optional)">

<textarea id="notes" placeholder="Notes (restaurant, items, groceries etc)"></textarea>

<button onclick="request()">Request</button>

</div>

<script>

const urlParams = new URLSearchParams(window.location.search)
const service = urlParams.get('service') || "ride"

document.getElementById("serviceTitle").innerText =
service === "ride" ? "🚕 Request Ride" :
service === "food" ? "🍔 Food Delivery" :
"🛒 Grocery Delivery"

let lat = null
let lng = null

navigator.geolocation.getCurrentPosition(pos=>{
lat = pos.coords.latitude
lng = pos.coords.longitude
})

async function request(){

const name = document.getElementById("name").value
const email = document.getElementById("email").value
const phone = document.getElementById("phone").value
const pickup = document.getElementById("pickup").value
const dropoff = document.getElementById("dropoff").value
const notes = document.getElementById("notes").value

const res = await fetch("/api/auth/register-rider",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
name,email,password:"123456",phone
})
})

let rider

try{
const data = await res.json()
rider = data.user
}catch{
alert("Registering rider...")
}

const login = await fetch("/api/auth/login",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
email,
password:"123456"
})
})

const loginData = await login.json()

if(!loginData.user){
alert("Login failed")
return
}

const riderId = loginData.user.id

const req = await fetch("/api/requests/create",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
riderId,
serviceType:service,
pickupAddress:pickup,
dropoffAddress:dropoff,
pickupLat:lat,
pickupLng:lng,
notes
})
})

const result = await req.json()

alert(result.message)

}

</script>

</body>
</html>
