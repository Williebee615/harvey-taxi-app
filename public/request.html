<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harvey Taxi</title>
  <style>
    body {
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
    }

    h1 {
      font-size: 64px;
      margin: 30px 0 40px;
      font-weight: 800;
    }

    .card {
      background: #080808;
      padding: 22px;
      border-radius: 28px;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 34px;
      margin-bottom: 24px;
    }

    input, select {
      width: 100%;
      padding: 22px 18px;
      margin-bottom: 16px;
      border-radius: 20px;
      border: none;
      background: #101115;
      color: white;
      font-size: 18px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 22px 18px;
      border: none;
      border-radius: 22px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 14px;
    }

    .gray {
      background: #24262c;
      color: white;
    }

    .green {
      background: #2ecc71;
      color: white;
    }

    #status {
      font-size: 18px;
      margin: 8px 0 18px;
      min-height: 28px;
    }

    #fareBox {
      margin-top: 15px;
      background: #101115;
      padding: 18px;
      border-radius: 20px;
      min-height: 80px;
      line-height: 1.7;
      color: #ddd;
    }
  </style>
</head>
<body>

  <h1>Harvey Taxi</h1>

  <div class="card">
    <h2>Request Pickup</h2>

    <input id="pickup" placeholder="Pickup location">
    <input id="dropoff" placeholder="Dropoff location">

    <select id="rideType">
      <option>Standard Ride</option>
      <option>XL Ride</option>
      <option>Priority Ride</option>
    </select>

    <button class="gray" onclick="estimateFare()">Estimate Fare</button>
    <button class="green" onclick="requestRide()">Request Ride</button>

    <div id="status">Enter pickup and dropoff to begin.</div>

    <div id="fareBox">Fare details will appear here.</div>
  </div>

  <script>
    async function estimateFare() {
      const pickup = document.getElementById('pickup').value.trim()
      const dropoff = document.getElementById('dropoff').value.trim()
      const status = document.getElementById('status')
      const fareBox = document.getElementById('fareBox')

      if (!pickup || !dropoff) {
        status.innerHTML = 'Please enter both pickup and dropoff.'
        fareBox.innerHTML = 'Fare details will appear here.'
        return
      }

      status.innerHTML = 'Calculating fare...'

      try {
        const res = await fetch('/api/fare/estimate', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            pickupAddress: pickup,
            dropoffAddress: dropoff
          })
        })

        const data = await res.json()

        if (!data.success) {
          status.innerHTML = data.message || 'Could not estimate fare.'
          fareBox.innerHTML = 'Fare details will appear here.'
          return
        }

        fareBox.innerHTML = `
          Distance: ${data.trip.distanceMiles} miles<br>
          ETA: ${data.trip.durationMinutes} min<br><br>

          Base: $${data.fare.baseFare}<br>
          Distance: $${data.fare.distanceFare}<br>
          Time: $${data.fare.timeFare}<br>
          Booking: $${data.fare.bookingFee}<br>
          Service: $${data.fare.serviceFee}<br><br>

          <b>Total: $${data.fare.totalFare}</b>
        `

        status.innerHTML = 'Estimate ready.'
      } catch (err) {
        status.innerHTML = 'Server error while estimating fare.'
        fareBox.innerHTML = 'Fare details will appear here.'
      }
    }

    async function requestRide() {
      const pickup = document.getElementById('pickup').value.trim()
      const dropoff = document.getElementById('dropoff').value.trim()
      const rideType = document.getElementById('rideType').value
      const status = document.getElementById('status')
      const fareBox = document.getElementById('fareBox')

      if (!pickup || !dropoff) {
        status.innerHTML = 'Please enter both pickup and dropoff.'
        return
      }

      status.innerHTML = 'Requesting ride...'

      try {
        const res = await fetch('/api/rides/request', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            pickupAddress: pickup,
            dropoffAddress: dropoff,
            serviceType: rideType
          })
        })

        const data = await res.json()

        if (!data.success) {
          status.innerHTML = data.message || 'Could not request ride.'
          return
        }

        fareBox.innerHTML = `
          Distance: ${data.ride.trip.distanceMiles} miles<br>
          ETA: ${data.ride.trip.durationMinutes} min<br><br>

          Base: $${data.ride.fare.baseFare}<br>
          Distance: $${data.ride.fare.distanceFare}<br>
          Time: $${data.ride.fare.timeFare}<br>
          Booking: $${data.ride.fare.bookingFee}<br>
          Service: $${data.ride.fare.serviceFee}<br><br>

          <b>Total: $${data.ride.fare.totalFare}</b>
        `

        status.innerHTML = data.message || 'Ride requested.'
      } catch (err) {
        status.innerHTML = 'Server error while requesting ride.'
      }
    }
  </script>

</body>
</html>
