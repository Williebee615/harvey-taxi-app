<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Harvey Taxi</title>

<style>
body{
background:#000;
color:white;
font-family:Arial;
padding:20px;
}

.title{
font-size:32px;
font-weight:bold;
margin-bottom:20px;
}

.input{
background:#0b0f1c;
padding:20px;
border-radius:16px;
margin-bottom:15px;
}

button{
width:100%;
padding:20px;
border:none;
border-radius:16px;
font-size:20px;
margin-top:10px;
}

.estimate{
background:#333;
color:white;
}

.request{
background:#39d27d;
color:white;
font-weight:bold;
}

.card{
background:#0b0f1c;
padding:20px;
border-radius:16px;
margin-top:20px;
}
</style>
</head>

<body>

<div class="title">Request Pickup</div>

<input id="pickup" class="input" placeholder="Downtown">
<input id="dropoff" class="input" placeholder="Airport">

<select id="rideType" class="input">
<option>Standard</option>
<option>XL</option>
<option>Luxury</option>
</select>

<button class="estimate" onclick="estimateFare()">Estimate Fare</button>
<button class="request" onclick="requestRide()">Request Ride</button>

<div id="result" class="card">
Fare details will appear here.
</div>

<script>

let lastFare = null

async function estimateFare(){

const rideType = document.getElementById('rideType').value

const res = await fetch('/estimate-fare',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
distance:10,
duration:20,
rideType
})
})

const data = await res.json()
lastFare = data

document.getElementById('result').innerHTML = `
Distance: ${data.distance} miles<br>
ETA: ${data.duration} min<br><br>

Base: $${data.fare.base}<br>
Distance: $${data.fare.distanceCharge}<br>
Time: $${data.fare.timeCharge}<br>
Booking: $${data.fare.booking}<br>
Service: $${data.fare.service}<br><br>

<b>Total: $${data.fare.total}</b>
`
}

async function requestRide(){

const pickup = document.getElementById('pickup').value
const dropoff = document.getElementById('dropoff').value
const rideType = document.getElementById('rideType').value

const res = await fetch('/request-ride',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
pickup,
dropoff,
pickupLat:36.1627,
pickupLng:-86.7816,
distance:lastFare?.distance || 10,
duration:lastFare?.duration || 20,
rideType,
fare:lastFare?.fare
})
})

const data = await res.json()

if(!data.success){
document.getElementById('result').innerHTML = data.message
return
}

const d = data.ride.driver

document.getElementById('result').innerHTML = `
Driver matched successfully<br><br>

<b>${d.name}</b><br>
${d.vehicle}<br>
Plate: ${d.plate}<br>
ETA: ${d.etaMinutes} min<br><br>

Total: $${data.ride.fare.total}
`
}

</script>

</body>
</html>
