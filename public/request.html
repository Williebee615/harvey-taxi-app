<script>
  const serviceButtons = document.querySelectorAll('.service-card')
  const pickupInput = document.getElementById('pickup')
  const dropoffInput = document.getElementById('dropoff')
  const rideTypeSelect = document.getElementById('rideType')
  const requestBtn = document.getElementById('requestRideBtn')
  const estimateBtn = document.getElementById('estimateBtn')
  const statusBox = document.getElementById('statusBox')
  const fareBox = document.getElementById('fareBox')

  let selectedService = 'Ride'

  serviceButtons.forEach((button) => {
    button.addEventListener('click', () => {
      serviceButtons.forEach((btn) => btn.classList.remove('active'))
      button.classList.add('active')
      selectedService = button.dataset.service || 'Ride'
    })
  })

  function setStatus(message, isError = false) {
    if (!statusBox) return
    statusBox.textContent = message
    statusBox.style.color = isError ? '#ff6b6b' : '#ffffff'
  }

  function renderFare(data) {
    if (!fareBox) return

    fareBox.innerHTML = `
      <div class="fare-row"><span>Distance</span><strong>${data.trip.distanceMiles} mi</strong></div>
      <div class="fare-row"><span>ETA</span><strong>${data.trip.durationMinutes} min</strong></div>
      <div class="fare-row"><span>Base Fare</span><strong>$${data.fare.baseFare}</strong></div>
      <div class="fare-row"><span>Distance Fare</span><strong>$${data.fare.distanceFare}</strong></div>
      <div class="fare-row"><span>Time Fare</span><strong>$${data.fare.timeFare}</strong></div>
      <div class="fare-row"><span>Booking Fee</span><strong>$${data.fare.bookingFee}</strong></div>
      <div class="fare-row"><span>Service Fee</span><strong>$${data.fare.serviceFee}</strong></div>
      <div class="fare-row total"><span>Total</span><strong>$${data.fare.totalFare}</strong></div>
    `
  }

  async function estimateFare() {
    const pickupAddress = pickupInput.value.trim()
    const dropoffAddress = dropoffInput.value.trim()

    if (!pickupAddress || !dropoffAddress) {
      setStatus('Please enter pickup and dropoff locations.', true)
      return
    }

    setStatus('Calculating fare...')

    try {
      const response = await fetch('/api/fare/estimate', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          pickupAddress,
          dropoffAddress
        })
      })

      const data = await response.json()

      if (!data.success) {
        setStatus(data.message || 'Could not estimate fare.', true)
        return
      }

      renderFare(data)
      setStatus('Fare estimate ready.')
    } catch (error) {
      setStatus('Server error while estimating fare.', true)
    }
  }

  async function requestRide() {
    const pickupAddress = pickupInput.value.trim()
    const dropoffAddress = dropoffInput.value.trim()
    const rideType = rideTypeSelect ? rideTypeSelect.value : 'Standard Ride'

    if (!pickupAddress || !dropoffAddress) {
      setStatus('Please enter pickup and dropoff locations.', true)
      return
    }

    setStatus('Requesting ride...')

    try {
      const response = await fetch('/api/rides/request', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          riderName: 'Guest Rider',
          riderPhone: '',
          pickupAddress,
          dropoffAddress,
          serviceType: `${selectedService} - ${rideType}`
        })
      })

      const data = await response.json()

      if (!data.success) {
        setStatus(data.message || 'Could not request ride.', true)
        return
      }

      renderFare(data)
      setStatus(data.message || 'Ride requested successfully.')
    } catch (error) {
      setStatus('Server error while requesting ride.', true)
    }
  }

  if (estimateBtn) {
    estimateBtn.addEventListener('click', estimateFare)
  }

  if (requestBtn) {
    requestBtn.addEventListener('click', requestRide)
  }
</script>
