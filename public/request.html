<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #000;
      color: #fff;
      min-height: 100vh;
      padding: 24px 16px 40px;
    }

    .container {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
    }

    .title {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: -2px;
      margin: 8px 0 28px;
    }

    .card {
      background: #050505;
      border-radius: 30px;
      padding: 24px 18px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }

    .section-title {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 22px;
    }

    .field {
      width: 100%;
      border: none;
      outline: none;
      background: #0b0c10;
      color: #fff;
      border-radius: 22px;
      padding: 22px 18px;
      font-size: 20px;
      margin-bottom: 16px;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.04);
    }

    .field::placeholder {
      color: #9a9a9a;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 24px;
      padding: 22px 18px;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      margin-bottom: 14px;
    }

    .btn-estimate {
      background: #22242a;
      color: #fff;
    }

    .btn-request {
      background: #2ecc71;
      color: #fff;
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .status-box {
      background: #0b0c10;
      border-radius: 22px;
      padding: 18px;
      font-size: 18px;
      color: #e0e0e0;
      line-height: 1.5;
      min-height: 84px;
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.04);
    }

    .fare-box {
      background: #0b0c10;
      border-radius: 22px;
      padding: 18px;
      min-height: 120px;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.04);
    }

    .placeholder-text {
      color: #8f8f8f;
      font-size: 17px;
      line-height: 1.6;
    }

    .fare-title {
      font-size: 21px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .fare-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 8px 0;
      font-size: 17px;
      color: #d8d8d8;
    }

    .fare-row strong {
      color: #fff;
    }

    .fare-total {
      margin-top: 10px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 21px;
      font-weight: 800;
    }

    .address-note {
      margin-top: 12px;
      font-size: 14px;
      color: #9c9c9c;
      line-height: 1.5;
    }

    @media (max-width: 600px) {
      .title {
        font-size: 46px;
      }

      .field,
      .btn {
        font-size: 18px;
      }

      .section-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">Harvey Taxi</div>

    <div class="card">
      <div class="section-title">Request Pickup</div>

      <input id="pickup" class="field" type="text" placeholder="Pickup location" />
      <input id="dropoff" class="field" type="text" placeholder="Dropoff location" />

      <select id="rideType" class="field">
        <option>Standard Ride</option>
        <option>XL Ride</option>
        <option>Priority Ride</option>
      </select>

      <button id="estimateBtn" class="btn btn-estimate">Estimate Fare</button>
      <button id="requestBtn" class="btn btn-request">Request Ride</button>

      <div id="status" class="status-box">
        Enter both addresses, then tap Estimate Fare to preview the trip cost.
      </div>

      <div id="fareBox" class="fare-box">
        <div class="placeholder-text">
          Fare details will appear here after you estimate your trip.
        </div>
      </div>
    </div>
  </div>

  <script>
    const pickupInput = document.getElementById('pickup')
    const dropoffInput = document.getElementById('dropoff')
    const rideTypeSelect = document.getElementById('rideType')
    const estimateBtn = document.getElementById('estimateBtn')
    const requestBtn = document.getElementById('requestBtn')
    const statusBox = document.getElementById('status')
    const fareBox = document.getElementById('fareBox')

    function setStatus(message, isError = false) {
      statusBox.textContent = message
      statusBox.style.color = isError ? '#ff7b7b' : '#e0e0e0'
    }

    function showPlaceholder(message) {
      fareBox.innerHTML = `<div class="placeholder-text">${message}</div>`
    }

    function renderFare(data, showRideMessage = false) {
      fareBox.innerHTML = `
        <div class="fare-title">${showRideMessage ? 'Ride Details' : 'Fare Estimate'}</div>

        <div class="fare-row">
          <span>Distance</span>
          <strong>${data.trip.distanceMiles} miles</strong>
        </div>

        <div class="fare-row">
          <span>ETA</span>
          <strong>${data.trip.durationMinutes} min</strong>
        </div>

        <div class="fare-row">
          <span>Base Fare</span>
          <strong>$${data.fare.baseFare}</strong>
        </div>

        <div class="fare-row">
          <span>Distance Fare</span>
          <strong>$${data.fare.distanceFare}</strong>
        </div>

        <div class="fare-row">
          <span>Time Fare</span>
          <strong>$${data.fare.timeFare}</strong>
        </div>

        <div class="fare-row">
          <span>Booking Fee</span>
          <strong>$${data.fare.bookingFee}</strong>
        </div>

        <div class="fare-row">
          <span>Service Fee</span>
          <strong>$${data.fare.serviceFee}</strong>
        </div>

        <div class="fare-row fare-total">
          <span>Total</span>
          <strong>$${data.fare.totalFare}</strong>
        </div>

        <div class="address-note">
          Pickup: ${data.trip.pickupAddress || pickupInput.value.trim()}<br>
          Dropoff: ${data.trip.dropoffAddress || dropoffInput.value.trim()}
        </div>
      `
    }

    async function estimateFare() {
      const pickupAddress = pickupInput.value.trim()
      const dropoffAddress = dropoffInput.value.trim()

      if (!pickupAddress || !dropoffAddress) {
        setStatus('Please enter both pickup and dropoff addresses.', true)
        showPlaceholder('Fare details will appear here after you enter both addresses and estimate the trip.')
        return
      }

      estimateBtn.disabled = true
      requestBtn.disabled = true
      setStatus('Calculating your fare estimate...')

      try {
        const response = await fetch('/api/fare/estimate', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            pickupAddress,
            dropoffAddress
          })
        })

        const data = await response.json()

        if (!response.ok || !data.success) {
          setStatus(data.message || 'Could not estimate fare.', true)
          showPlaceholder('We could not calculate the fare right now.')
          return
        }

        renderFare(data, false)
        setStatus(data.message || 'Fare estimate ready.')
      } catch (error) {
        setStatus('Server error while estimating fare.', true)
        showPlaceholder('Server error. Please try again.')
      } finally {
        estimateBtn.disabled = false
        requestBtn.disabled = false
      }
    }

    async function requestRide() {
      const pickupAddress = pickupInput.value.trim()
      const dropoffAddress = dropoffInput.value.trim()
      const rideType = rideTypeSelect.value

      if (!pickupAddress || !dropoffAddress) {
        setStatus('Please enter both pickup and dropoff addresses.', true)
        showPlaceholder('Fare details will appear here after you enter both addresses.')
        return
      }

      estimateBtn.disabled = true
      requestBtn.disabled = true
      setStatus('Submitting your ride request...')

      try {
        const response = await fetch('/api/rides/request', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            pickupAddress,
            dropoffAddress,
            serviceType: rideType
          })
        })

        const data = await response.json()

        if (!response.ok || !data.success) {
          setStatus(data.message || 'Could not request ride.', true)
          showPlaceholder('Ride request failed. Please try again.')
          return
        }

        renderFare(data.ride, true)
        setStatus(data.message || 'Ride requested successfully.')
      } catch (error) {
        setStatus('Server error while requesting ride.', true)
        showPlaceholder('Server error. Please try again.')
      } finally {
        estimateBtn.disabled = false
        requestBtn.disabled = false
      }
    }

    estimateBtn.addEventListener('click', estimateFare)
    requestBtn.addEventListener('click', requestRide)
  </script>
</body>
</html>
