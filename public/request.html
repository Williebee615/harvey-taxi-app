<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ride Request</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body { margin: 0; background: #09142d; color: white; padding: 20px; }
    .wrap { max-width: 760px; margin: 0 auto; }
    .card {
      background: #132754;
      border: 1px solid #23458e;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 18px;
    }
    input, button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 12px;
      border: 1px solid #2b4f99;
      font-size: 16px;
    }
    input { background: #0b1b3d; color: white; }
    button { border: none; font-weight: bold; cursor: pointer; }
    .primary { background: #2f7cff; color: white; }
    .success { background: #16a34a; color: white; }
    .warning { background: #d97706; color: white; }
    .danger { background: #dc2626; color: white; }
    .status {
      background: #0b1b3d;
      border: 1px solid #2b4f99;
      border-radius: 12px;
      padding: 14px;
      white-space: pre-line;
      line-height: 1.6;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .back {
      display: inline-block;
      color: white;
      text-decoration: none;
      margin-bottom: 16px;
    }
    .hidden { display: none; }
    .emergency-wrap {
      position: fixed;
      right: 18px;
      bottom: 18px;
    }
    .emergency-btn {
      background: #ff1d3d;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 18px 22px;
      font-weight: 800;
      box-shadow: 0 10px 22px rgba(255, 29, 61, 0.35);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/">← Back</a>

    <div class="card">
      <h1>Request a Ride</h1>
      <input id="riderName" placeholder="Rider name" />
      <input id="riderPhone" placeholder="Phone number" />
      <input id="pickupAddress" placeholder="Pickup address" value="Downtown Nashville" />
      <input id="destinationAddress" placeholder="Destination address" value="Nashville Airport" />

      <div class="row">
        <input id="pickupLat" type="number" step="any" value="36.1627" placeholder="Pickup latitude" />
        <input id="pickupLng" type="number" step="any" value="-86.7816" placeholder="Pickup longitude" />
      </div>

      <div class="row">
        <input id="destinationLat" type="number" step="any" value="36.1263" placeholder="Destination latitude" />
        <input id="destinationLng" type="number" step="any" value="-86.6774" placeholder="Destination longitude" />
      </div>

      <button class="primary" onclick="requestRide()">Request Ride</button>
      <div id="status" class="status">No ride requested yet.</div>
    </div>

    <div class="card">
      <h2>Active Trip</h2>
      <div id="tripBox" class="status">No active trip yet.</div>
      <button class="success" onclick="updateRideStatus('picked_up')">Mark Picked Up</button>
      <button class="warning" onclick="updateRideStatus('completed')">Complete Ride</button>
    </div>
  </div>

  <div class="emergency-wrap">
    <button id="emergencyButton" class="emergency-btn hidden" onclick="triggerEmergency()">🚨 911 EMERGENCY</button>
  </div>

  <script>
    let activeRide = null

    function formatTrip(ride) {
      return `Trip ID: ${ride.id}
Rider: ${ride.riderName}
Driver: ${ride.driverName}
Car: ${ride.car}
Plate: ${ride.plate}
Pickup: ${ride.pickupAddress}
Destination: ${ride.destinationAddress}
Fare: $${ride.fare}
Status: ${ride.status}
Driver Distance: ${ride.driverDistanceMiles} miles away`
    }

    async function requestRide() {
      const payload = {
        riderName: document.getElementById('riderName').value.trim(),
        riderPhone: document.getElementById('riderPhone').value.trim(),
        pickupAddress: document.getElementById('pickupAddress').value.trim(),
        destinationAddress: document.getElementById('destinationAddress').value.trim(),
        pickupLat: Number(document.getElementById('pickupLat').value),
        pickupLng: Number(document.getElementById('pickupLng').value),
        destinationLat: Number(document.getElementById('destinationLat').value),
        destinationLng: Number(document.getElementById('destinationLng').value)
      }

      const status = document.getElementById('status')
      status.textContent = 'Requesting ride...'

      try {
        const res = await fetch('/api/request-ride', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })

        const data = await res.json()

        if (!res.ok) {
          status.textContent = data.error || 'Ride request failed.'
          return
        }

        activeRide = data.ride
        status.textContent = `Ride assigned successfully.
Driver: ${data.ride.driverName}
Car: ${data.ride.car}
Plate: ${data.ride.plate}
Fare: $${data.ride.fare}`

        document.getElementById('tripBox').textContent = formatTrip(activeRide)
        document.getElementById('emergencyButton').classList.remove('hidden')
      } catch (err) {
        status.textContent = 'Server error. Please try again.'
      }
    }

    async function updateRideStatus(newStatus) {
      if (!activeRide) {
        alert('No active ride yet.')
        return
      }

      const res = await fetch(`/api/rides/${activeRide.id}/status`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus })
      })

      const data = await res.json()

      if (!res.ok) {
        alert(data.error || 'Could not update ride.')
        return
      }

      activeRide = data.ride
      document.getElementById('tripBox').textContent = formatTrip(activeRide)

      if (newStatus === 'completed' || newStatus === 'cancelled') {
        document.getElementById('emergencyButton').classList.add('hidden')
      }
    }

    async function triggerEmergency() {
      if (!activeRide) {
        alert('No active trip found.')
        return
      }

      const ok = confirm('Call 911 and alert Harvey Taxi admin?')
      if (!ok) return

      try {
        await fetch('/api/emergency', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            rideId: activeRide.id,
            riderName: activeRide.riderName,
            driverName: activeRide.driverName,
            car: activeRide.car,
            plate: activeRide.plate,
            lat: activeRide.pickupLat,
            lng: activeRide.pickupLng,
            note: 'Passenger triggered 911 emergency button'
          })
        })
      } catch (err) {}

      window.location.href = 'tel:911'
    }
  </script>
</body>
</html>
