<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvey Taxi Request</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .app {
      max-width: 640px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 20px 16px 40px;
    }

    .header {
      text-align: center;
      margin: 8px 0 18px;
    }

    .header h1 {
      margin: 0;
      font-size: 34px;
      font-weight: 800;
    }

    .header p {
      margin: 8px 0 0;
      color: #6b7280;
      font-size: 14px;
    }

    .card {
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 26px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 28px;
    }

    .top-link {
      display: inline-block;
      margin-bottom: 14px;
      color: #111827;
      text-decoration: none;
      font-weight: 700;
    }

    input,
    textarea,
    button {
      width: 100%;
      border-radius: 20px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      padding: 18px 16px;
      font-size: 16px;
      margin-bottom: 14px;
      outline: none;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
    }

    button {
      border: none;
      background: #16a34a;
      color: white;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    .service-option {
      border: 1px solid #d1d5db;
      border-radius: 22px;
      padding: 18px 16px;
      margin-bottom: 12px;
      cursor: pointer;
      background: #fff;
      font-size: 16px;
      font-weight: 700;
    }

    .service-option.active {
      border: 2px solid #111827;
      background: #f3f4f6;
    }

    .status-box,
    .driver-box {
      display: none;
      border-radius: 22px;
      padding: 16px;
      margin-top: 12px;
    }

    .status-box {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
    }

    .driver-box {
      background: #ecfdf5;
      border: 1px solid #86efac;
    }

    #mapWrap {
      display: none;
      margin-top: 14px;
    }

    #map {
      height: 360px;
      width: 100%;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid #d1d5db;
    }

    .legend {
      margin-top: 12px;
      padding: 14px 16px;
      border-radius: 18px;
      background: #111827;
      color: white;
      font-size: 14px;
      line-height: 1.5;
    }

    .row {
      margin-bottom: 8px;
    }

    .pill-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .pill {
      display: inline-block;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      background: #e5e7eb;
    }

    .pill.dark {
      background: #111827;
      color: white;
    }

    .leaflet-container {
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Harvey Taxi</h1>
      <p>Request your trip and track your driver live</p>
    </div>

    <div class="card">
      <a class="top-link" href="/">← Back to Home</a>
      <h2>Request Service</h2>

      <input id="riderName" type="text" placeholder="Your name" />
      <input id="riderPhone" type="text" placeholder="Phone number" />
      <input id="pickup" type="text" placeholder="Pickup location" />
      <input id="destination" type="text" placeholder="Destination" />

      <div id="standardOption" class="service-option active" onclick="selectService('ride', 'Harvey Standard - $12', 'standardOption')">
        🚕 Harvey Standard - $12
      </div>

      <div id="xlOption" class="service-option" onclick="selectService('xl', 'Harvey XL - $18', 'xlOption')">
        🚐 Harvey XL - $18
      </div>

      <div id="deliveryOption" class="service-option" onclick="selectService('delivery', 'Delivery Service', 'deliveryOption')">
        📦 Delivery Service
      </div>

      <textarea id="notes" placeholder="Driver notes (gate code, store name, food order, etc.)"></textarea>

      <button onclick="submitRequest()">Create Ride Request</button>

      <div id="statusBox" class="status-box"></div>
      <div id="driverBox" class="driver-box"></div>

      <div id="mapWrap">
        <div id="map"></div>
        <div id="mapLegend" class="legend">Map will appear after you request a ride.</div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <script>
    let currentRequestId = null
    let selectedServiceType = 'ride'
    let selectedServiceLabel = 'Harvey Standard - $12'
    let trackingTimer = null

    let map = null
    let pickupMarker = null
    let destinationMarker = null
    let driverMarker = null
    let routeLine = null

    const defaultPickup = { lat: 36.1627, lng: -86.7816 }
    const defaultDestination = { lat: 36.1745, lng: -86.7679 }

    function selectService(type, label, elementId) {
      selectedServiceType = type
      selectedServiceLabel = label

      document.getElementById('standardOption').classList.remove('active')
      document.getElementById('xlOption').classList.remove('active')
      document.getElementById('deliveryOption').classList.remove('active')
      document.getElementById(elementId).classList.add('active')
    }

    function setStatus(message) {
      const box = document.getElementById('statusBox')
      box.style.display = 'block'
      box.innerHTML = message
    }

    function setDriver(html) {
      const box = document.getElementById('driverBox')
      box.style.display = 'block'
      box.innerHTML = html
    }

    function setLegend(message) {
      document.getElementById('mapLegend').innerHTML = message
    }

    function showMapWrap() {
      const wrap = document.getElementById('mapWrap')
      wrap.style.display = 'block'
    }

    function createEmojiIcon(emoji) {
      return L.divIcon({
        html: `<div style="font-size: 28px; line-height: 28px;">${emoji}</div>`,
        className: '',
        iconSize: [28, 28],
        iconAnchor: [14, 14]
      })
    }

    function initMap() {
      showMapWrap()

      if (map) {
        setTimeout(() => map.invalidateSize(), 100)
        return
      }

      map = L.map('map', { zoomControl: true }).setView([36.1627, -86.7816], 13)

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap'
      }).addTo(map)

      setTimeout(() => map.invalidateSize(), 150)
    }

    function updateMap(ride) {
      initMap()

      const pickupLat = typeof ride.pickupLat === 'number' ? ride.pickupLat : defaultPickup.lat
      const pickupLng = typeof ride.pickupLng === 'number' ? ride.pickupLng : defaultPickup.lng
      const destinationLat = typeof ride.destinationLat === 'number' ? ride.destinationLat : defaultDestination.lat
      const destinationLng = typeof ride.destinationLng === 'number' ? ride.destinationLng : defaultDestination.lng

      const driverLat = typeof ride.driverLat === 'number' ? ride.driverLat : pickupLat
      const driverLng = typeof ride.driverLng === 'number' ? ride.driverLng : pickupLng

      const pickupLatLng = [pickupLat, pickupLng]
      const destinationLatLng = [destinationLat, destinationLng]
      const driverLatLng = [driverLat, driverLng]

      if (!pickupMarker) {
        pickupMarker = L.marker(pickupLatLng, { icon: createEmojiIcon('📍') }).addTo(map)
      } else {
        pickupMarker.setLatLng(pickupLatLng)
      }
      pickupMarker.bindPopup(`Pickup<br>${ride.pickup || ''}`)

      if (!destinationMarker) {
        destinationMarker = L.marker(destinationLatLng, { icon: createEmojiIcon('🏁') }).addTo(map)
      } else {
        destinationMarker.setLatLng(destinationLatLng)
      }
      destinationMarker.bindPopup(`Destination<br>${ride.destination || ''}`)

      if (!driverMarker) {
        driverMarker = L.marker(driverLatLng, { icon: createEmojiIcon('🚗') }).addTo(map)
      } else {
        driverMarker.setLatLng(driverLatLng)
      }
      driverMarker.bindPopup(`Driver<br>${ride.driverName || 'Waiting for assignment'}`)

      const routePoints =
        ride.status === 'in_progress'
          ? [driverLatLng, destinationLatLng]
          : [driverLatLng, pickupLatLng, destinationLatLng]

      if (!routeLine) {
        routeLine = L.polyline(routePoints, {
          weight: 5,
          opacity: 0.85
        }).addTo(map)
      } else {
        routeLine.setLatLngs(routePoints)
      }

      const bounds = L.latLngBounds([pickupLatLng, destinationLatLng, driverLatLng])
      map.fitBounds(bounds, { padding: [40, 40] })
    }

    async function seedDriversIfNeeded() {
      try {
        await fetch('/api/seed-demo', { method: 'POST' })
      } catch (error) {
        console.log('Seed skipped')
      }
    }

    async function submitRequest() {
      const riderName = document.getElementById('riderName').value.trim()
      const riderPhone = document.getElementById('riderPhone').value.trim()
      const pickup = document.getElementById('pickup').value.trim()
      const destination = document.getElementById('destination').value.trim()
      const notes = document.getElementById('notes').value.trim()

      if (!riderName || !pickup || !destination) {
        setStatus('Please enter your name, pickup, and destination.')
        return
      }

      await seedDriversIfNeeded()

      setStatus('Creating ride request...')
      document.getElementById('driverBox').style.display = 'none'

      try {
        const res = await fetch('/api/requests', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            riderName,
            riderPhone,
            pickup,
            destination,
            serviceType: selectedServiceType,
            notes: `${selectedServiceLabel}${notes ? ' | ' + notes : ''}`
          })
        })

        const data = await res.json()

        if (!res.ok) {
          setStatus(data.error || 'Request failed.')
          return
        }

        currentRequestId = data.request.id
        setStatus(`✅ Ride request created. Request ID: ${data.request.id}`)
        setLegend('Driver map is live and tracking your request.')
        updateMap(data.request)
        startTracking()
      } catch (error) {
        setStatus('Could not connect to the server.')
      }
    }

    function startTracking() {
      if (trackingTimer) clearTimeout(trackingTimer)
      trackRequest()
    }

    async function trackRequest() {
      if (!currentRequestId) return

      try {
        const res = await fetch('/api/requests/' + currentRequestId)
        const ride = await res.json()

        if (!res.ok) {
          setStatus('Could not load request status.')
          return
        }

        updateMap(ride)

        if (ride.status === 'searching') {
          setStatus('🔍 Searching for a nearby driver...')
          setLegend('Dispatch is finding the nearest available driver.')
        }

        if (ride.status === 'matched') {
          setStatus('🚗 Driver matched.')
          setDriver(`
            <div class="row"><strong>Driver:</strong> ${ride.driverName || 'Assigned'}</div>
            <div class="row"><strong>Vehicle:</strong> ${ride.driverVehicle || 'Taxi'}</div>
            <div class="row"><strong>Car:</strong> ${ride.driverCarColor || ''} ${ride.driverCarModel || ''}</div>
            <div class="row"><strong>Plate:</strong> ${ride.driverPlateNumber || 'Pending'}</div>
            <div class="row"><strong>Distance:</strong> ${ride.estimatedDistanceKm || '--'} km</div>
            <div class="pill-row">
              <span class="pill dark">Matched</span>
            </div>
          `)
          setLegend('Your driver has been assigned and is driving to the pickup point.')
        }

        if (ride.status === 'accepted') {
          setStatus('✅ Driver accepted your ride.')
          setDriver(`
            <div class="row"><strong>Driver:</strong> ${ride.driverName}</div>
            <div class="row"><strong>Phone:</strong> ${ride.driverPhone || 'Pending'}</div>
            <div class="row"><strong>Vehicle:</strong> ${ride.driverVehicle || 'Taxi'}</div>
            <div class="row"><strong>Distance:</strong> ${ride.estimatedDistanceKm || '--'} km</div>
            <div class="pill-row">
              <span class="pill dark">Accepted</span>
            </div>
          `)
          setLegend('Driver accepted the trip and is nearing your pickup.')
        }

        if (ride.status === 'in_progress') {
          setStatus('🛣️ Trip in progress.')
          setDriver(`
            <div class="row"><strong>Driver:</strong> ${ride.driverName}</div>
            <div class="row"><strong>Vehicle:</strong> ${ride.driverVehicle || 'Taxi'}</div>
            <div class="row"><strong>Destination:</strong> ${ride.destination}</div>
            <div class="pill-row">
              <span class="pill dark">In progress</span>
            </div>
          `)
          setLegend('You are currently on the route to your destination.')
        }

        if (ride.status === 'completed') {
          setStatus('✅ Trip completed.')
          setLegend('Ride finished successfully.')
          return
        }

        if (ride.status === 'cancelled') {
          setStatus('❌ Trip cancelled.')
          setLegend('This trip was cancelled.')
          return
        }

        trackingTimer = setTimeout(trackRequest, 3000)
      } catch (error) {
        setStatus('Lost connection while checking ride status.')
      }
    }
  </script>
</body>
</html>
