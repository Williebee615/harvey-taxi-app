<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Driver Signup</title>
  <style>
    body{background:#06112d;color:white;font-family:Arial;padding:20px}
    .container{max-width:650px;margin:auto}
    .card{background:#0c1a3d;padding:25px;border-radius:16px}
    input,textarea{width:100%;padding:14px;margin-bottom:15px;border-radius:10px;border:none;background:#081735;color:white}
    button{width:100%;padding:16px;border:none;border-radius:12px;font-weight:bold;background:linear-gradient(90deg,#2962ff,#7b2cff);color:white}
    .message{margin-top:15px}
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Driver Signup</h1>
      <form id="driverForm">
        <input id="name" placeholder="Full Name" required />
        <input id="email" placeholder="Email" required />
        <input id="phone" placeholder="Phone" required />
        <input id="city" placeholder="City" required />
        <input id="vehicle" placeholder="Vehicle Type" required />
        <input id="license" placeholder="License Number" required />
        <textarea id="notes" placeholder="Extra Notes"></textarea>
        <button type="submit">Submit Driver Application</button>
        <div id="msg" class="message"></div>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('driverForm')
    const msg = document.getElementById('msg')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      msg.textContent = 'Submitting application...'

      const payload = {
        id: Date.now().toString(),
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        city: document.getElementById('city').value.trim(),
        vehicle: document.getElementById('vehicle').value.trim(),
        license: document.getElementById('license').value.trim(),
        notes: document.getElementById('notes').value.trim()
      }

      try {
        const res = await fetch('/api/driver-signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })

        const data = await res.json()

        if (data.success) {
          msg.textContent = 'Driver application submitted successfully.'
          form.reset()
        } else {
          msg.textContent = data.message || 'Could not submit driver application.'
        }
      } catch (err) {
        msg.textContent = 'Server error. Please try again.'
      }
    })
  </script>
</body>
</html>
