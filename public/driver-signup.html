<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Driver Signup</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020c2b;
      color: white;
      padding: 20px;
    }

    .top-nav {
      margin-bottom: 20px;
    }

    .back-home {
      color: #c8d5ff;
      text-decoration: none;
      font-size: 18px;
    }

    .box {
      max-width: 760px;
      margin: auto;
      background: #081a44;
      border-radius: 26px;
      padding: 28px 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 18px;
      margin-top: 14px;
      border: none;
      border-radius: 16px;
      background: #04133a;
      color: white;
      font-size: 18px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    button {
      width: 100%;
      margin-top: 22px;
      padding: 18px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(90deg, #2d6cff, #8a2eff);
      color: white;
      font-weight: bold;
      font-size: 20px;
    }

    #message {
      margin-top: 18px;
      color: #9de1a8;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <div class="top-nav">
    <a href="/" class="back-home">← Back to Home</a>
  </div>

  <div class="box">
    <h1>Driver Signup</h1>

    <input id="name" placeholder="Full Name" />
    <input id="email" placeholder="Email" />
    <input id="phone" placeholder="Phone" />
    <input id="city" placeholder="City" />
    <input id="vehicle" placeholder="Vehicle Type" />
    <input id="license" placeholder="License Number" />
    <textarea id="notes" placeholder="Extra Notes"></textarea>

    <button onclick="signup()">Submit Driver Application</button>
    <div id="message"></div>
  </div>

  <script>
    async function signup() {
      const payload = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        city: document.getElementById('city').value,
        vehicle: document.getElementById('vehicle').value,
        license: document.getElementById('license').value,
        notes: document.getElementById('notes').value
      }

      const res = await fetch('/api/driver-signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })

      const data = await res.json()
      document.getElementById('message').innerText = data.success
        ? 'Driver application submitted.'
        : 'Something went wrong.'
    }
  </script>
</body>
</html>
