<!DOCTYPE html>
<html>
<head>
  <title>Rider Signup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <div class="app-header">
      <div class="app-title">Rider Signup</div>
      <div class="app-subtitle">Create your account and verify with Persona</div>
    </div>

    <div class="card">
      <input class="input" id="name" placeholder="Full Name" />
      <input class="input" id="phone" placeholder="Phone Number" />
      <input class="input" id="email" placeholder="Email" />
      <input class="input" id="password" placeholder="Password" type="password" />
      <button class="button" onclick="signup()">Create Rider Account</button>
      <pre id="result"></pre>
      <div id="verify"></div>
    </div>
  </div>

  <script>
    async function signup() {
      const res = await fetch('/api/rider/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('name').value,
          phone: document.getElementById('phone').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      })

      const data = await res.json()
      document.getElementById('result').innerText = JSON.stringify(data, null, 2)

      if (data.success && data.user?.personaInquiryUrl) {
        document.getElementById('verify').innerHTML =
          `<a class="nav-link" href="${data.user.personaInquiryUrl}" target="_blank">Complete Persona Verification</a>`
      }
    }
  </script>
</body>
</html>
